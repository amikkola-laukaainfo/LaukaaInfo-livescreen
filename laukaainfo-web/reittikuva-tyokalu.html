<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reittikuva Editori – LaukaaInfo</title>
    <link rel="icon" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --primary-glow: rgba(0, 123, 255, 0.4);
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            background: var(--card);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            margin: 1rem 0;
            font-family: inherit;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 0 15px var(--primary-glow); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Point List */
        .point-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .point-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.2s;
        }
        .point-card:hover { border-color: var(--primary); }

        .point-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .point-title { font-weight: 700; font-family: 'Outfit', sans-serif; font-size: 1.1rem; }
        .point-id { font-size: 0.75rem; color: var(--text-muted); background: #334155; padding: 2px 8px; border-radius: 10px; }

        .preview-area {
            width: 100%;
            height: 160px;
            background: #0f172a;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px dashed var(--border);
            position: relative;
        }
        .preview-area img { width: 100%; height: 100%; object-fit: cover; }
        .preview-placeholder { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 1rem; }

        .upload-actions { display: grid; grid-template-columns: 1fr; gap: 8px; }
        
        .status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        .status-ok { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-none { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 10000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* Resize Info */
        .resize-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            text-align: center;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="font-family: 'Outfit';">Admin Kirjautuminen</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Syötä admin-token muokataksesi reittiä.</p>
            <input type="password" id="auth-token-input" placeholder="Syötä token (esim. ADMIN-99-LPS)">
            <button class="btn" onclick="checkAuth()">Avaa työkalu</button>
        </div>
    </div>

    <div class="container hidden" id="main-app">
        <header>
            <h1>Reittikuva Editori</h1>
            <p class="subtitle">Hallitse kävelyreittien valokuvia ImageKitin kautta</p>
            <div id="route-info" style="margin-top: 1rem; font-weight: 500; color: var(--primary);"></div>
        </header>

        <div id="point-list" class="point-grid">
            <!-- Points injected here -->
        </div>

        <div style="margin-top: 3rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2rem;">
            <button class="btn" style="background: #334155;" onclick="reloadRoute()">🔄 Päivitä lista</button>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">Muutokset tallentuvat automaattisesti reittitiedostoon jokaisen latauksen jälkeen.</p>
        </div>
    </div>

    <div id="toast">Tallennettu!</div>

    <script>
        let yritysId = '99';
        let token = '';
        let routeData = null;
        let routePath = 'reitix/route.geojson';

        // 1. AUTH LOGIC
        const params = new URLSearchParams(window.location.search);
        if (params.get('token')) {
            token = params.get('token');
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            initApp();
        }

        function checkAuth() {
            const input = document.getElementById('auth-token-input').value;
            if (input === 'ADMIN-99-LPS') {
                token = input;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initApp();
            } else {
                alert('Väärä token.');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 2. APP LOGIC
        async function initApp() {
            try {
                const res = await fetch(routePath + '?t=' + Date.now());
                routeData = await res.json();
                document.getElementById('route-info').textContent = `Tiedosto: ${routePath} (${routeData.features.length} kohdetta)`;
                renderPoints();
            } catch (err) {
                console.error(err);
                alert('Virhe ladattaessa reittiä: ' + err.message);
            }
        }

        function reloadRoute() {
            initApp();
            showToast('Lista päivitetty.');
        }

        function renderPoints() {
            const listEl = document.getElementById('point-list');
            listEl.innerHTML = '';

            const points = routeData.features.filter(f => f.geometry.type === 'Point');

            points.forEach((f, idx) => {
                const props = f.properties;
                const card = document.createElement('div');
                card.className = 'point-card';
                
                const hasImage = !!props.image;
                const imgUrl = hasImage ? (props.image.startsWith('http') ? props.image : `reitix/images/${props.image}`) : '';

                card.innerHTML = `
                    <div class="point-header">
                        <div class="point-title">${props.title || 'Nimetön piste'}</div>
                        <div class="point-id">#${idx + 1}</div>
                    </div>
                    <div class="status-badge ${hasImage ? 'status-ok' : 'status-none'}">
                        ${hasImage ? '✅ Kuva asetettu' : '❌ Ei kuvaa'}
                    </div>
                    <div class="preview-area" id="preview-${idx}">
                        ${hasImage ? `<img src="${imgUrl}?tr=w-400,h-300,fo-auto" alt="Preview">` : `<div class="preview-placeholder">Ei kuvaa ladattu</div>`}
                    </div>
                    <div class="upload-actions">
                        <button class="btn" onclick="triggerUpload(${idx})">📷 Lataa / Vaihda kuva</button>
                        <input type="file" id="file-input-${idx}" class="hidden" accept="image/*" onchange="handleFileUpload(event, ${idx})">
                        <div class="resize-info" id="info-${idx}">Max 1600px • Auto-resize</div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function triggerUpload(idx) {
            document.getElementById(`file-input-${idx}`).click();
        }

        // 3. IMAGE PROCESSING & UPLOAD
        async function handleFileUpload(event, idx) {
            const file = event.target.files[0];
            if (!file) return;

            const btn = event.target.previousElementSibling;
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '⌛ Käsitellään...';

                // A. Pienennys Canvasilla
                const resizedBlob = await resizeImage(file, 1600, 1600);
                
                btn.innerHTML = '🚀 Ladataan ImageKit...';

                // B. Hae ImageKit-autentikointi
                const authRes = await fetch(`imagekit-api.php?yritys=99&token=${token}&action=auth`);
                const authData = await authRes.json();
                
                if (authData.error) throw new Error(authData.message || authData.error);

                // C. Upload ImageKitiin
                const fileName = `reitti_piste_${idx + 1}_${Date.now()}.jpg`;
                const formData = new FormData();
                formData.append('file', resizedBlob, fileName);
                formData.append('fileName', fileName);
                formData.append('publicKey', authData.publicKey);
                formData.append('signature', authData.signature);
                formData.append('expire', authData.expire);
                formData.append('token', authData.token);
                formData.append('folder', '/reitix/images');
                formData.append('useUniqueFileName', 'false');

                const uploadRes = await fetch('https://upload.imagekit.io/api/v1/files/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const uploadData = await uploadRes.json();
                if (!uploadRes.ok) throw new Error(uploadData.message || 'Lataus epäonnistui');

                // D. Päivitä GeoJSON
                btn.innerHTML = '💾 Tallennetaan reittiä...';
                
                const pointIdxInFull = routeData.features.findIndex(f => f.geometry.type === 'Point' && f.properties.title === routeData.features.filter(p => p.geometry.type === 'Point')[idx].properties.title && JSON.stringify(f.geometry.coordinates) === JSON.stringify(routeData.features.filter(p => p.geometry.type === 'Point')[idx].geometry.coordinates));
                
                // Varmuuden vuoksi haetaan oikea feature index
                let pointCount = 0;
                let targetFeatureIdx = -1;
                for(let i=0; i<routeData.features.length; i++) {
                    if(routeData.features[i].geometry.type === 'Point') {
                        if(pointCount === idx) {
                            targetFeatureIdx = i;
                            break;
                        }
                        pointCount++;
                    }
                }

                if(targetFeatureIdx !== -1) {
                    routeData.features[targetFeatureIdx].properties.image = uploadData.url;
                    routeData.features[targetFeatureIdx].properties.mediaType = 'IMAGE';
                    
                    // Lähetä päivitys serverille
                    const saveFormData = new FormData();
                    saveFormData.append('path', routePath);
                    saveFormData.append('data', JSON.stringify(routeData));
                    
                    const saveRes = await fetch(`imagekit-api.php?yritys=99&token=${token}&action=save_geojson`, {
                        method: 'POST',
                        body: saveFormData
                    });
                    
                    const saveData = await saveRes.json();
                    if (saveData.result === 'ok') {
                        showToast('✅ Kuva päivitetty ja reitti tallennettu!');
                        renderPoints();
                    } else {
                        throw new Error(saveData.error || 'GeoJSON tallennus epäonnistui');
                    }
                }

            } catch (err) {
                console.error(err);
                alert('Virhe: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // Helper: Resize image using Canvas
        function resizeImage(file, maxWidth, maxHeight) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/jpeg', 0.85); // 85% quality
                };
                img.onerror = reject;
            });
        }
    </script>
</body>
</html>
