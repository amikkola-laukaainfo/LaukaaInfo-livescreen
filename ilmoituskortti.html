<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilmoitus | LaukaaInfo</title>
    <link rel="icon" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260708">
    
    <script src="translations.js?v=20260708"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>

    <style>
        .ad-single-container {
            max-width: 800px;
            margin: 3rem auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: none; /* Näytetään vasta kun data on ladattu */
        }

        .ad-single-header {
            padding: 2rem;
            color: white;
        }

        .ad-single-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .ad-single-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            line-height: 1.2;
        }

        .ad-single-body {
            padding: 2rem;
        }

        .ad-single-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
            color: #475569;
            font-weight: 600;
        }

        .ad-single-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ad-single-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #334155;
            margin-bottom: 2rem;
            white-space: pre-wrap;
        }

        .ad-single-price {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }

        .ad-single-price span {
            display: block;
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .ad-single-price strong {
            font-size: 2rem;
            color: #0f172a;
            font-family: 'Outfit', sans-serif;
        }

        .contact-btn {
            display: block;
            width: 100%;
            text-align: center;
            background: #0f172a;
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }

        .contact-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin: 1rem 0 0 1rem;
            font-weight: 600;
            color: #475569;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        /* ===== MODAALI ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            padding: 1rem;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
            transform: translateY(20px);
            transition: all 0.2s;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: #64748b;
        }
        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem; margin-top: 0; margin-bottom: 1.5rem; color: #0f172a;
        }
        .modal-form-group {
            margin-bottom: 1rem;
        }
        .modal-form-group label {
            display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; color: #334155;
        }
        .modal-form-control {
            width: 100%; padding: 0.7rem; border: 1.5px solid #cbd5e1; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.95rem; box-sizing: border-box;
        }
        .modal-form-control:focus {
            outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
        }
        .modal-submit {
            width: 100%; background: #0f172a; color: white; padding: 1rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s;
        }
        .modal-submit:hover { background: #1e293b; }
        .modal-submit:disabled { background: #94a3b8; cursor: not-allowed; }
        #modal-feedback {
            margin-top: 1rem; padding: 0.8rem; border-radius: 8px; display: none; font-weight: 600; font-size: 0.9rem;
        }
    </style>
</head>
<body class="bg-full-gray">

    <!-- Navigointi - Kopioitu ydinrakenteesta -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="LaukaaInfo Logo">
                <span>LaukaaInfo</span>
            </a>
            <button class="hamburger" id="hamburger-btn" aria-label="Avaa valikko">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar-menu" id="sidebar-menu">
        <div class="sidebar-header">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="LaukaaInfo Logo">
                <span>LaukaaInfo</span>
            </a>
            <button class="close-btn" id="close-sidebar-btn">&times;</button>
        </div>
    </aside>

    <main style="padding-top: 80px; min-height: 80vh;">
        <div style="max-width: 800px; margin: 0 auto;">
            <a href="kohtaamiset.html" class="back-link">&larr; Takaisin kohtaamisiin</a>
        </div>

        <div id="loading-spinner" style="text-align: center; padding: 4rem; color: #64748b;">
            Ladataan ilmoitusta...
        </div>

        <div class="ad-single-container" id="ad-single-container">
            <div class="ad-single-header" id="ad-header">
                <div class="ad-single-badge" id="ad-badge">Kategoria</div>
                <h1 class="ad-single-title" id="ad-title">Otsikko</h1>
            </div>
            
            <div class="ad-single-body">
                <div class="ad-single-meta">
                    <div class="ad-single-meta-item">
                        <span class="iconify" data-icon="lucide:map-pin"></span>
                        <span id="ad-location">Sijainti</span>
                    </div>
                    <div class="ad-single-meta-item">
                        <span class="iconify" data-icon="lucide:calendar"></span>
                        <span id="ad-date">Julkaistu</span>
                    </div>
                </div>

                <div class="ad-single-desc" id="ad-desc">
                    Kuvaus...
                </div>

                <div class="ad-single-price">
                    <span>Hinta / Palkkio</span>
                    <strong id="ad-price">0 €</strong>
                </div>

                <a href="#" class="contact-btn" id="ad-contact-btn">Ota yhteyttä ilmoittajaan</a>
            </div>
        </div>
    </main>

    <!-- Yhteydenottomodaali -->
    <div class="modal-overlay" id="contact-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeContactModal()">&times;</button>
            <h2 class="modal-title">Lähetä viesti ilmoittajalle</h2>
            <form id="contact-form">
                <input type="hidden" id="contact-ad-id">
                <!-- Honeypot: piilotettu kenttä, botit täyttävät tämän -->
                <input type="text" id="contact-website" name="website" style="display:none!important;" tabindex="-1" autocomplete="off">
                <div class="modal-form-group">
                    <label for="contact-name">Nimesi *</label>
                    <input type="text" id="contact-name" class="modal-form-control" required>
                </div>
                <div class="modal-form-group">
                    <label for="contact-email">Sähköpostiosoitteesi *</label>
                    <input type="email" id="contact-email" class="modal-form-control" required>
                </div>
                <div class="modal-form-group" id="contact-message-group">
                    <label for="contact-message">Viesti *</label>
                    <textarea id="contact-message" class="modal-form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="modal-submit" id="contact-submit-btn">Lähetä viesti</button>
                <div id="modal-feedback"></div>
            </form>
        </div>
    </div>

    <footer style="margin-top: 4rem; background-color: #f8f9fa;">
        <div class="footer-content" style="text-align: center; padding: 2rem;">
            <p>© 2026 LaukaaInfo – Kohtaamispaikka</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="kohtaamiset.js?v=20260710"></script>
    <script src="script.js"></script>
    <script src="nav-sync.js"></script>
</body>
</html>
