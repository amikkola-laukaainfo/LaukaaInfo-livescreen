<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yritysfeed | Selaa Laukaan yrityksiä</title>
    <meta name="description" content="Selaa Laukaan paikallisia yrityksiä feed-tyylisesti. Löydä uusia toimijoita ja palveluita läheltäsi.">
    <link rel="icon" href="../logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #0056b3; --secondary-blue: #007bff; --accent: #ff6b6b;
            --bg-light: #f5f7fb; --card-bg: #ffffff; --text-dark: #1a2a3a;
            --text-muted: #6c757d; --border-light: #e9ecef;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 12px 30px rgba(0,0,0,0.12);
            --radius-md: 16px; --radius-sm: 12px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); line-height: 1.5; }
        .feed-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white; padding: 2rem 1.5rem; text-align: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 2rem;
        }
        .feed-header h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .feed-header p { font-size: 1rem; opacity: 0.9; max-width: 500px; margin: 0 auto; }
        .stats-bar { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; font-size: 0.85rem; opacity: 0.85; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 1rem 3rem; }
        .feed-grid { display: flex; flex-direction: column; gap: 1.25rem; }
        .company-card {
            background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden;
            box-shadow: var(--shadow-md); transition: all 0.25s ease; cursor: pointer;
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            border: 1px solid var(--border-light);
        }
        .company-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--secondary-blue); }
        .card-media {
            background: linear-gradient(135deg, #f0f4fa 0%, #e8edf5 100%);
            padding: 1.5rem; display: flex; align-items: center; justify-content: center; min-height: 120px;
        }
        .company-logo { max-width: 100px; max-height: 80px; object-fit: contain; }
        .category-icon { font-size: 3rem; }
        .card-content { padding: 1.25rem; flex: 1; }
        .company-name { font-size: 1.2rem; font-weight: 700; color: var(--primary-blue); margin-bottom: 0.5rem; line-height: 1.3; }
        .company-category {
            display: inline-block; background: #e8f0fe; color: var(--primary-blue);
            font-size: 0.7rem; font-weight: 600; padding: 0.25rem 0.75rem;
            border-radius: 20px; margin-bottom: 0.75rem;
        }
        .company-slogan {
            font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .company-meta { display: flex; align-items: center; gap: 0.75rem; font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap; }
        .company-location { display: flex; align-items: center; gap: 4px; }
        .company-badge { background: #f0fdf4; color: #15803d; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .load-more-container { text-align: center; margin-top: 2rem; padding: 1rem; }
        .load-more-btn {
            background: white; border: 2px solid var(--primary-blue); color: var(--primary-blue);
            padding: 0.85rem 2rem; border-radius: 50px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .load-more-btn:hover { background: var(--primary-blue); color: white; transform: translateY(-2px); }
        .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .skeleton-card { background: white; border-radius: var(--radius-md); padding: 1rem; display: flex; gap: 1rem; box-shadow: var(--shadow-sm); }
        .skeleton-img {
            width: 80px; height: 80px; background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
            background-size: 200% 100%; border-radius: 12px; animation: shimmer 1.2s infinite;
        }
        .skeleton-text { flex: 1; }
        .skeleton-text div {
            height: 16px; background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
            background-size: 200% 100%; border-radius: 8px; margin-bottom: 10px; animation: shimmer 1.2s infinite;
        }
        .skeleton-text div:last-child { width: 60%; margin-bottom: 0; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .empty-state { text-align: center; padding: 4rem 2rem; background: white; border-radius: var(--radius-md); }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 1rem; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 1.5rem; color: var(--primary-blue); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
        footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border-light); margin-top: 2rem; }
        .loading-text { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 1rem; }
    </style>
</head>
<body>
    <div class="feed-header">
        <h1>📱 Yritysfeed</h1>
        <p>Selaa Laukaan paikallisia yrityksiä – löydä uusia suosikkeja!</p>
        <div class="stats-bar">
            <span>🔄 Päivittyy satunnaisesti</span>
            <span>🏢 Paikallisia toimijoita</span>
        </div>
    </div>
    <div class="container">
        <a href="../index.html" class="back-link">← Takaisin etusivulle</a>
        <div id="feed-container" class="feed-grid">
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div></div><div></div><div></div></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div></div><div></div><div></div></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div></div><div></div><div></div></div></div>
        </div>
        <div class="load-more-container">
            <button id="load-more-btn" class="load-more-btn">🔄 Lataa lisää yrityksiä</button>
        </div>
    </div>
    <footer><p>© 2026 LaukaaInfo – Paikalliset yritykset kootusti</p></footer>

    <script>
        var API_URL = 'https://www.mediazoo.fi/laukaainfo-web/get_companies.php';
        var allCompanies = [];
        var displayedCompanies = [];
        var isLoading = false;
        var currentOffset = 0;
        var PAGE_SIZE = 25;

        var categoryIcons = {
            'Ravintolat ja kahvilat': '🍽️', 'Majoitus': '🏨', 'Hyvinvointi ja kauneus': '💆',
            'Terveyspalvelut': '🏥', 'Rakentaminen ja remontointi': '🔨', 'Kodin ja talon huolto': '🏠',
            'Autopalvelut': '🚗', 'Myymälät ja kauppa': '🛍️', 'Tapahtumat ja viihde': '🎉',
            'Kulttuuri ja taide': '🎨', 'Liikunta ja ulkoilu': '🏃', 'Koulutus ja valmennus': '📚',
            'Digitaaliset palvelut': '💻', 'Siivous ja kiinteistöhuolto': '🧹', 'Logistiikka ja kuljetus': '🚚',
            'default': '🏢'
        };

        function getCategoryIcon(category) {
            if (!category) return categoryIcons.default;
            for (var key in categoryIcons) {
                if (category.toLowerCase().indexOf(key.toLowerCase()) !== -1) return categoryIcons[key];
            }
            return categoryIcons.default;
        }

        function shuffleArray(arr) {
            var shuffled = arr.slice();
            for (var i = shuffled.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = shuffled[i];
                shuffled[i] = shuffled[j];
                shuffled[j] = temp;
            }
            return shuffled;
        }

        // Hae yritykset - kokeillaan ensin API:a, sitten paikallista JSON:ia
        async function fetchCompanies() {
            // API (kevyt versio)
            try {
                var resp = await fetch(API_URL + '?ts=' + Date.now());
                if (resp.ok) {
                    var json = await resp.json();
                    var list = Array.isArray(json) ? json : (json.results || json.data || []);
                    if (list.length > 0) {
                        console.log('API OK, yrityksiä:', list.length);
                        return list;
                    }
                }
            } catch (e) {
                console.warn('API fail:', e);
            }
            
            // Fallback: absolute URL to companies_data.json
            try {
                console.log('Ladataan companies_data.json...');
                var resp = await fetch('https://www.laukaainfo.fi/companies_data.json');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var json = await resp.json();
                var list = Array.isArray(json) ? json : (json.results || []);
                console.log('JSON OK, yrityksiä:', list.length);
                return list;
            } catch (e) {
                console.error('JSON fail:', e);
                return [];
            }
        }

        function processCompanies(raw) {
            var arr = raw.filter(function(c) {
                var n = (c.nimi || '').toLowerCase();
                var d = (c.esittely || '').toLowerCase();
                return n.indexOf('testi') === -1 && d.indexOf('(demo)') === -1 && d.indexOf('demo)') === -1;
            });
            arr.forEach(function(c) {
                if (c.nimi) {
                    c.slug = c.nimi.toLowerCase().replace(/[äå]/g,'a').replace(/ö/g,'o').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
                }
            });
            return arr;
        }

        function escapeHtml(str) {
            if (!str) return '';
            var s = str;
            s = s.replace(/&/g, '&' + 'amp;');
            s = s.replace(/</g, '&' + 'lt;');
            s = s.replace(/>/g, '&' + 'gt;');
            s = s.replace(/"/g, '&' + 'quot;');
            s = s.replace(/'/g, '&' + '#39;');
            return s;
        }

        function renderCompanyCard(company) {
            var name = company.nimi || 'Nimetön yritys';
            var category = company.kategoria || 'Palveluyritys';
            var description = company.esittely || company.mainoslause || 'Tutustu yritykseen ja sen palveluihin.';
            var location = company.alue || company.kaupunki || 'Laukaa';
            var logo = company.logo && company.logo !== '-' ? company.logo : null;
            var icon = getCategoryIcon(category);
            var shortDesc = description.length > 120 ? description.substring(0, 120) + '...' : description;
            var isPremium = (company.paketti === 'premium' || company.paketti === 'pro' || company.tyyppi === 'premium');
            var url = '../yritys/' + company.slug + '.html';
            if (!company.slug || company.slug.length < 2) {
                url = '../yrityskortti.html?id=' + encodeURIComponent(company.nimi);
            }
            var mediaHtml = logo ? '<img src="' + logo + '" alt="' + escapeHtml(name) + '" class="company-logo" onerror="this.style.display=\'none\'">' : '<div class="category-icon">' + icon + '</div>';
            var badge = isPremium ? '<span class="company-badge">⭐ Premium</span>' : '';
            return '<a href="' + url + '" class="company-card">' +
                '<div class="card-media">' + mediaHtml + '</div>' +
                '<div class="card-content">' +
                    '<div class="company-name">' + escapeHtml(name) + '</div>' +
                    '<div class="company-category">' + escapeHtml(category) + '</div>' +
                    '<div class="company-slogan">' + escapeHtml(shortDesc) + '</div>' +
                    '<div class="company-meta"><span class="company-location">📍 ' + escapeHtml(location) + '</span>' + badge + '</div>' +
                '</div>' +
            '</a>';
        }

        function displayNextPage() {
            var container = document.getElementById('feed-container');
            var loadBtn = document.getElementById('load-more-btn');
            if (isLoading) return;
            if (displayedCompanies.length === 0) {
                if (container) container.innerHTML = '<div class="empty-state"><span>🏢</span><p>Yrityksiä ei l&ouml;ytynyt.</p></div>';
                return;
            }
            var start = currentOffset;
            var end = Math.min(start + PAGE_SIZE, displayedCompanies.length);
            var batch = displayedCompanies.slice(start, end);
            if (batch.length === 0) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '&#10024; Kaikki yritykset n&auml;ytetty &#10024;';
                return;
            }
            if (currentOffset === 0) container.innerHTML = '';
            batch.forEach(function(c) { container.insertAdjacentHTML('beforeend', renderCompanyCard(c)); });
            currentOffset = end;
            if (currentOffset >= displayedCompanies.length) {
                loadBtn.disabled = true;
                loadBtn.innerHTML = '&#127937; Kaikki yritykset n&auml;ytetty &#127937;';
            } else {
                loadBtn.innerHTML = '&#128260; Lataa lis&auml;&auml; (' + (displayedCompanies.length - currentOffset) + ' j&auml;ljell&auml;)';
                loadBtn.disabled = false;
            }
        }

        async function initFeed() {
            var container = document.getElementById('feed-container');
            var loadBtn = document.getElementById('load-more-btn');
            isLoading = true;
            if (loadBtn) loadBtn.disabled = true;
            
            container.innerHTML = '<p class="loading-text">&#128259; Ladataan yrityksi&auml;...</p>';
            
            var raw = await fetchCompanies();
            allCompanies = processCompanies(raw);
            
            if (allCompanies.length === 0) {
                container.innerHTML = '<div class="empty-state"><span>&#9888;&#65039;</span><p>Yrityksi&auml; ei ladattu. Yrit&auml; my&ouml;hemmin uudelleen.</p></div>';
                if (loadBtn) loadBtn.style.display = 'none';
                isLoading = false;
                return;
            }
            
            displayedCompanies = shuffleArray(allCompanies);
            currentOffset = 0;
            displayNextPage();
            isLoading = false;
        }

        document.getElementById('load-more-btn').addEventListener('click', function() {
            if (!isLoading) displayNextPage();
        });

        initFeed();
    </script>
</body>
</html>
