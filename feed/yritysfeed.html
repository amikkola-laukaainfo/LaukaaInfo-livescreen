<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yritysfeed | Satunnaiset yritykset Laukaasta</title>
    <meta name="description" content="Tutustu satunnaisiin laukaalaisiin yrityksiin – joka latauskerralla uusi kokoelma. Löydä uusia suosikkeja!">
    <link rel="icon" href="../logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #0056b3;
            --secondary-blue: #007bff;
            --accent: #ff6b6b;
            --bg-light: #f5f7fb;
            --card-bg: #ffffff;
            --text-dark: #1a2a3a;
            --text-muted: #6c757d;
            --border-light: #e9ecef;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 12px 30px rgba(0,0,0,0.12);
            --radius-md: 16px;
            --radius-sm: 12px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); line-height: 1.5; }
        
        /* Header */
        .feed-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            margin-bottom: 2rem;
        }
        .feed-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .feed-header p {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.85;
        }
        .stats-bar span {
            background: rgba(255,255,255,0.15);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }
        
        /* Refresh button */
        .refresh-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        .refresh-btn {
            background: white;
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 0.85rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .refresh-btn:hover {
            background: var(--primary-blue);
            color: white;
            transform: translateY(-2px);
        }
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Company grid */
        .feed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.75rem;
        }
        
        /* Company card */
        .company-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.25s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
            height: 100%;
        }
        .company-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--secondary-blue);
        }
        .card-media {
            background: linear-gradient(135deg, #f0f4fa 0%, #e8edf5 100%);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }
        .company-logo {
            max-width: 100px;
            max-height: 80px;
            object-fit: contain;
        }
        .category-icon {
            font-size: 3.5rem;
        }
        .card-content {
            padding: 1.25rem;
            flex: 1;
        }
        .company-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .company-category {
            display: inline-block;
            background: #e8f0fe;
            color: var(--primary-blue);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            margin-bottom: 0.75rem;
        }
        .company-slogan {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .company-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            margin-top: auto;
        }
        .company-location {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .company-badge {
            background: #f0fdf4;
            color: #15803d;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        /* Skeleton loading */
        .skeleton-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 1rem;
            box-shadow: var(--shadow-sm);
        }
        .skeleton-img {
            width: 100%;
            height: 120px;
            background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
            background-size: 200% 100%;
            border-radius: 12px;
            animation: shimmer 1.2s infinite;
            margin-bottom: 1rem;
        }
        .skeleton-text {
            height: 16px;
            background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
            background-size: 200% 100%;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: shimmer 1.2s infinite;
        }
        .skeleton-text-sm {
            width: 60%;
            height: 14px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: var(--radius-md);
        }
        .empty-state span {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 1.5rem;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-light);
            margin-top: 3rem;
        }
        
        @media (max-width: 768px) {
            .feed-grid {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }
            .feed-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="feed-header">
        <h1>🎲 Yritysfeed</h1>
        <p>Joka kerta uusi kokoelma laukaalaisia yrityksiä – löydä yllättäviä helmiä!</p>
        <div class="stats-bar">
            <span>🔄 Päivittyy satunnaisesti</span>
            <span>🏢 Paikallisia toimijoita</span>
            <span id="company-count-badge">✨ Ladataan...</span>
        </div>
    </div>
    
    <div class="container">
        <a href="../index.html" class="back-link">← Takaisin etusivulle</a>
        
        <div class="refresh-container">
            <button id="refresh-btn" class="refresh-btn">
                🎲 Sekoita uudet yritykset
            </button>
        </div>
        
        <div id="feed-container" class="feed-grid">
            <!-- 6 skeleton-korttia -->
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text skeleton-text-sm"></div></div>
        </div>
    </div>
    
    <footer>
        <p>© 2026 LaukaaInfo – Paikalliset yritykset kootusti</p>
    </footer>

    <script>
        // Kategoria-ikonit
        const categoryIcons = {
            'Ravintolat ja kahvilat': '🍽️', 'Majoitus': '🏨', 'Hyvinvointi ja terveys': '💆',
            'Terveyspalvelut': '🏥', 'Rakentaminen ja remontointi': '🔨', 'Kodin ja talon huolto': '🏠',
            'Autopalvelut': '🚗', 'Myymälät ja kauppa': '🛍️', 'Tapahtumat ja viihde': '🎉',
            'Kulttuuri ja taide': '🎨', 'Liikunta ja ulkoilu': '🏃', 'Koulutus ja valmennus': '📚',
            'Digitaaliset palvelut': '💻', 'Siivous ja kiinteistöhuolto': '🧹', 'Logistiikka ja kuljetus': '🚚',
            'Auto ja kuljetus': '🚗', 'Elintarvikkeet': '🍎', 'default': '🏢'
        };
        
        // Hae kategoria-ikoni
        function getCategoryIcon(category) {
            if (!category) return categoryIcons.default;
            for (let key in categoryIcons) {
                if (category.toLowerCase().includes(key.toLowerCase())) return categoryIcons[key];
            }
            return categoryIcons.default;
        }
        
        // Muodosta slug (URL-ystävällinen nimi)
        function slugify(text) {
            if (!text) return "";
            return text.toString().toLowerCase().trim()
                .replace(/[äå]/g, 'a')
                .replace(/ö/g, 'o')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+/, '')
                .replace(/-+$/, '');
        }
        
        // HTML-escape
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;');
        }
        
        // Lyhennä tekstiä
        function truncate(text, maxLength) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }
        
        // Sekoita taulukko (Fisher-Yates)
        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        
        // Luo yrityskortti HTML
        function renderCompanyCard(company) {
            const name = company.nimi || 'Nimetön yritys';
            const category = company.kategoria || 'Palveluyritys';
            
            // Kuvaus: mainoslause tai esittely
            let description = company.mainoslause || company.esittely || '';
            if (!description) description = 'Tutustu yritykseen ja sen palveluihin.';
            // Poista @@ erottimet ja hashtagit
            description = description.replace(/@@/g, '').replace(/#[a-zA-Z0-9åäöÅÄÖ]+/g, '').trim();
            
            const location = company.alue || company.alue_slug || company.kaupunki || 'Laukaa';
            const logo = (company.logo && company.logo !== '-' && company.logo !== '') ? company.logo : null;
            const icon = getCategoryIcon(category);
            const shortDesc = truncate(description, 100);
            
            // Tarkista onko premium
            const isPremium = (company.tyyppi === 'maksu' || company.tyyppi === 'premium' || 
                              company.paketti === 'premium' || company.package === 'premium');
            
            // Muodosta slug ja URL (suhteellinen polku yrityskorttiin)
            const slug = slugify(name);
            const url = `../yrityskortti.html?id=${encodeURIComponent(slug)}`;
            
            // Media-osa (logo tai ikoni)
            let mediaHtml = '';
            if (logo) {
                mediaHtml = `<img src="${logo}" alt="${escapeHtml(name)}" class="company-logo" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\"category-icon\">${icon}</div>'">`;
            } else {
                mediaHtml = `<div class="category-icon">${icon}</div>`;
            }
            
            const premiumBadge = isPremium ? '<span class="company-badge">⭐ Premium</span>' : '';
            
            return `
                <a href="${url}" class="company-card">
                    <div class="card-media">${mediaHtml}</div>
                    <div class="card-content">
                        <div class="company-name">${escapeHtml(name)}</div>
                        <div class="company-category">${escapeHtml(category)}</div>
                        <div class="company-slogan">${escapeHtml(shortDesc)}</div>
                        <div class="company-meta">
                            <span class="company-location">📍 ${escapeHtml(location)}</span>
                            ${premiumBadge}
                        </div>
                    </div>
                </a>
            `;
        }
        
        // Hae yritykset ja näytä 25 satunnaista
        async function loadRandomCompanies() {
            const container = document.getElementById('feed-container');
            const badge = document.getElementById('company-count-badge');
            const refreshBtn = document.getElementById('refresh-btn');
            
            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.innerHTML = '⏳ Ladataan uusia yrityksiä...';
            }
            
            // Näytä skeletonit
            if (container) {
                container.innerHTML = Array(12).fill(`
                    <div class="skeleton-card">
                        <div class="skeleton-img"></div>
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text skeleton-text-sm"></div>
                    </div>
                `).join('');
            }
            
            try {
                // KORJATTU: Haetaan JSON sivuston JUURESTA (ei feed-kansiosta)
                const response = await fetch('/companies_data.json?t=' + Date.now());
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const data = await response.json();
                
                // Etsi yritystaulukko
                let companies = null;
                if (data.results && Array.isArray(data.results)) {
                    companies = data.results;
                } else if (Array.isArray(data)) {
                    companies = data;
                } else {
                    for (let key in data) {
                        if (Array.isArray(data[key]) && data[key].length > 0 && data[key][0].nimi) {
                            companies = data[key];
                            break;
                        }
                    }
                }
                
                if (!companies || companies.length === 0) {
                    throw new Error('Yrityksiä ei löytynyt');
                }
                
                // Suodatetaan testiyritykset
                const validCompanies = companies.filter(c => {
                    if (!c.nimi) return false;
                    const name = c.nimi.toLowerCase();
                    const desc = (c.mainoslause || c.esittely || '').toLowerCase();
                    if (name.includes('testi')) return false;
                    if (desc.includes('(demo)') || desc.includes('demo)')) return false;
                    return true;
                });
                
                console.log(`Löytyi ${validCompanies.length} yritystä`);
                
                // Ota 25 satunnaista (tai vähemmän jos ei ole tarpeeksi)
                const shuffled = shuffleArray(validCompanies);
                const randomCompanies = shuffled.slice(0, 25);
                
                // Päivitä badge
                if (badge) {
                    badge.textContent = `🎲 ${randomCompanies.length} yritystä`;
                }
                
                // Renderöi kortit
                if (container) {
                    container.innerHTML = randomCompanies.map(renderCompanyCard).join('');
                }
                
            } catch (error) {
                console.error('Virhe:', error);
                if (container) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <span>⚠️</span>
                            <p>Yritysten lataaminen epäonnistui.</p>
                            <p style="font-size:0.8rem;margin-top:0.5rem;">Tarkista että /companies_data.json löytyy sivuston juuresta.</p>
                        </div>
                    `;
                }
                if (badge) badge.textContent = '❌ Virhe';
            } finally {
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.innerHTML = '🎲 Sekoita uudet yritykset';
                }
            }
        }
        
        // Sivun lataus ja refresh-nappi
        document.addEventListener('DOMContentLoaded', () => {
            loadRandomCompanies();
            
            const refreshBtn = document.getElementById('refresh-btn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    loadRandomCompanies();
                });
            }
        });
    </script>
</body>
</html>
