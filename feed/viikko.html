<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viikon nostot | LaukaaInfo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --accent: #ff6b6b;
            --bg: #f5f7fa;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.15);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            padding: 80px 0 40px;
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #e9ecef 100%);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Grid */
        .ad-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            padding-bottom: 80px;
        }

        @media (min-width: 768px) {
            .ad-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .ad-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Card */
        .ad-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .ad-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .ad-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 66%; /* 3:2 Aspect Ratio */
            overflow: hidden;
            background-color: #eee;
        }

        .ad-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .ad-card:hover .ad-image {
            transform: scale(1.05);
        }

        .ad-content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .ad-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.25;
            color: var(--text-dark);
        }

        .ad-description {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ad-cta {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            transition: var(--transition);
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2);
            margin-top: auto;
        }

        .ad-cta:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
        }

        /* Footer */
        footer {
            padding: 60px 0;
            text-align: center;
            background: #fff;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            padding-bottom: 4px;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: var(--primary);
            transition: var(--transition);
        }

        .footer-link:hover::after {
            width: 100%;
        }

        /* Misc */
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Tilarivi */
        .status-msg {
            text-align: center;
            padding: 40px;
            font-size: 1.25rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>Viikon nostot Laukaassa</h1>
            <p class="subtitle">Katso ajankohtaiset asiat, tarjoukset ja menovinkit suoraan paikallisilta yrittäjiltä.</p>
        </div>
    </header>

    <main class="container">
        <div id="feed-container" class="ad-grid">
            <div class="status-msg">Ladataan viikon nostoja... <br><small>Odota hetki</small></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <a href="https://laukaainfo.fi" class="footer-link">Lisää ilmoituksia LaukaaInfossa</a>
        </div>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const feedContainer = document.getElementById('feed-container');

        // Haetaan data MediaZoon palvelimelta LaukaaInfon JS-sovellukseen
        const apiUrl = 'https://www.mediazoo.fi/laukaainfo-web/api.php?limit=50';

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Verkkovirhe: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                // api.php palauttaa tyypillisesti objektin, jossa data-taulukko 'data' -avaimella
                const items = result.data || result;
                
                // Tyhjennetään loaderi
                feedContainer.innerHTML = '';
                
                if (!Array.isArray(items) || items.length === 0) {
                    feedContainer.innerHTML = '<div class="status-msg">Ei nostoja tällä hetkellä.</div>';
                    return;
                }

                items.forEach(item => {
                    // Mäppäys JSON -> Kortin tiedot
                    // Tuetaan sekä pyydettyjä että nykyisessä API:ssa olevia nimeämisiä
                    const title = item.title || 'Ilman otsikkoa';
                    const excerpt = item.excerpt || item.description || '';
                    const link = item.link || item.website_url || '#';
                    const image = item.image || '';
                    const pubDate = item.date || item.publish_at || '';
                    
                    // Formatoi päivämäärä suomalaiseksi, jos sellainen on
                    let badgeHtml = '';
                    if (pubDate) {
                        try {
                            const d = new Date(pubDate);
                            if (!isNaN(d.getTime())) {
                                const fiDate = d.toLocaleDateString('fi-FI');
                                badgeHtml = `<div class="badge">${fiDate}</div>`;
                            } else {
                                badgeHtml = `<div class="badge">${pubDate}</div>`;
                            }
                        } catch(e) {
                            badgeHtml = `<div class="badge">${pubDate}</div>`;
                        }
                    }

                    // Card wrapper
                    const article = document.createElement('article');
                    article.className = 'ad-card';

                    // Image Html
                    let imgHtml = '';
                    if (image && image.trim() !== '') {
                        imgHtml = `
                        <div class="ad-image-wrapper">
                            <img src="${image}" alt="${title}" class="ad-image" onerror="this.style.display='none'">
                        </div>`;
                    } else {
                        // Tyylikäs harmaa paikkalaatikko jos kuvaa ei ole
                        imgHtml = `
                        <div class="ad-image-wrapper">
                            <img src="data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22800%22%20height%3D%22533%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20800%20533%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3Cstyle%20type%3D%22text%2Fcss%22%3E%23holder_1%20text%20%7B%20fill%3A%23aaaaaa%3Bfont-weight%3Abold%3Bfont-family%3AArial%2C%20Helvetica%2C%20Open%20Sans%2C%20sans-serif%2C%20monospace%3Bfont-size%3A40pt%20%7D%20%3C%2Fstyle%3E%3C%2Fdefs%3E%3Cg%20id%3D%22holder_1%22%3E%3Crect%20width%3D%22800%22%20height%3D%22533%22%20fill%3D%22%23eeeeee%22%3E%3C%2Frect%3E%3Cg%3E%3Ctext%20x%3D%22295.5%22%20y%3D%22283.5%22%3EEi%20kuvaa%3C%2Ftext%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E" alt="Ei kuvaa" class="ad-image">
                        </div>`;
                    }

                    // Render HTML sisäkkäin
                    article.innerHTML = `
                        ${badgeHtml}
                        ${imgHtml}
                        <div class="ad-content">
                            <h2 class="ad-title">${title}</h2>
                            <p class="ad-description">${excerpt}</p>
                            <a href="${link}" class="ad-cta" target="_blank" rel="noopener noreferrer">Lue lisää</a>
                        </div>
                    `;

                    feedContainer.appendChild(article);
                });

            })
            .catch(error => {
                console.error("Virhe ladattaessa syötettä:", error);
                feedContainer.innerHTML = '<div class="status-msg">Sisällön lataaminen epäonnistui.<br><small>Yritä myöhemmin uudelleen.</small></div>';
            });
    });
    </script>
</body>
</html>
