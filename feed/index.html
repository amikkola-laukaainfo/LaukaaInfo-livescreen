<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tämän viikon tarjoukset Laukaassa</title>
    <meta property="og:title" content="Tämän viikon tarjoukset Laukaassa" />
    <meta property="og:description" content="Katso ajankohtaiset asiat, tarjoukset ja menovinkit suoraan paikallisilta yrittäjiltä." />
    <meta property="og:image" content="https://laukaainfo.fi/og-viikkonostot.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://laukaainfo.fi/feed/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --accent: #ff6b6b;
            --bg: #f5f7fa;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 25px 50px rgba(0, 0, 0, 0.2); 
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header Banner */
        .hero-banner {
            position: relative;
            padding: 120px 0 80px;
            text-align: center;
            background: url('../taivas_tausta.png') no-repeat center center;
            background-size: cover;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); /* Tumma kalvo kuvan päälle */
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -1px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.95);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* Grid */
        .ad-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            padding-bottom: 80px;
        }

        @media (min-width: 768px) {
            .ad-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .ad-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Card - mainosbannerimainen */
        .ad-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .ad-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        /* Image Wrapper with 4:3 Banner Ratio */
        .ad-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 80%; /* Bannerin suhde */
            overflow: hidden;
            background-color: #eee;
        }

        .ad-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Zoom behavior only for images, not video iframes */
        .ad-card:hover img.ad-image {
            transform: scale(1.08);
        }

        /* Gradient Overlay */
        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
            z-index: 1;
            transition: var(--transition);
            pointer-events: none;
        }

        .ad-card:hover .gradient-overlay {
            height: 70%;
        }

        /* Titles over Image */
        .ad-title-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
            z-index: 2;
            line-height: 1.25;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: var(--transition);
            pointer-events: none;
        }

        .ad-card:hover .ad-title-overlay {
            transform: translateY(-2px);
        }

        .ad-content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .ad-title-inline {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.25;
            color: var(--text-dark);
        }

        .ad-description {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Enhanced CTA Button */
        .ad-cta {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            display: block;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.25);
        }

        .ad-cta:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.35);
        }

        /* Footer */
        footer {
            padding: 60px 0;
            text-align: center;
            background: #fff;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            padding-bottom: 4px;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: var(--primary);
            transition: var(--transition);
        }

        .footer-link:hover::after {
            width: 100%;
        }

        /* Badges */
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: var(--text-dark);
            pointer-events: none;
        }

        .category-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Tilarivi */
        .status-msg {
            text-align: center;
            padding: 40px;
            font-size: 1.25rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .share-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            background: rgba(0,0,0,0.04);
            transition: var(--transition);
        }
        .share-icon:hover {
            transform: scale(1.1);
            background: rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

    <header class="hero-banner">
        <div class="hero-content container">
            <h1>Tämän viikon tarjoukset Laukaassa</h1>
            <p class="subtitle">Katso ajankohtaiset asiat, tarjoukset ja menovinkit suoraan paikallisilta yrittäjiltä.</p>
        </div>
    </header>

    <main class="container">
        <div id="feed-container" class="ad-grid">
            <div class="status-msg">Ladataan viikon nostoja... <br><small>Odota hetki</small></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <a href="https://laukaainfo.fi" class="footer-link">Lisää ilmoituksia LaukaaInfossa</a>
        </div>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const feedContainer = document.getElementById('feed-container');

        // Apufunktio YouTube-videon ID:n poimimiseen linkistä tai thumbnail-kuvasta
        function getYouTubeId(url) {
            if (!url) return null;
            
            // Perinteiset videolinkit (youtube.com, youtu.be)
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) return match[2];
            
            // Thumbnail-kuvalinkit (img.youtube.com/vi/...)
            const imgMatch = url.match(/img\.youtube\.com\/vi\/([^\/]+)/);
            if (imgMatch && imgMatch[1].length === 11) return imgMatch[1];
            
            return null;
        }

        // URL Parametrit
        const urlParams = new URLSearchParams(window.location.search);
        const yritys = urlParams.get('yritys');
        const range = urlParams.get('range') || 'week'; // week tai month
        const category = urlParams.get('category') || ''; // esim. tarjoukset, tapahtumat

        // Haetaan data MediaZoon palvelimelta LaukaaInfon JS-sovellukseen
        let apiUrl = 'https://www.mediazoo.fi/laukaainfo-web/api.php?limit=50';
        
        const headerTitle = document.querySelector('header h1');
        if (headerTitle) {
            let rangeText = range === 'month' ? 'Kuukauden' : 'Viikon';
            let categoryText = 'nostot';
            if (category === 'tarjoukset') categoryText = 'tarjoukset';
            else if (category === 'tapahtumat') categoryText = 'tapahtumat';
            else if (category === 'uutiset') categoryText = 'uutiset';
            
            let baseTitle = `${rangeText} ${categoryText}`;
            
            if (yritys) {
                const yritysNimi = yritys.charAt(0).toUpperCase() + yritys.slice(1);
                headerTitle.textContent = `${baseTitle}: ${yritysNimi}`;
                document.title = `${baseTitle}: ${yritysNimi} | LaukaaInfo`;
            } else {
                headerTitle.textContent = `${baseTitle} Laukaassa`;
                // Ensimmäinen kirjain isoksi titleen
                document.title = `${baseTitle.charAt(0).toUpperCase() + baseTitle.slice(1)} | LaukaaInfo`;
            }
        }
        
        if (yritys) {
            apiUrl += '&yritys=' + encodeURIComponent(yritys);
        }

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Verkkovirhe: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                let items = result.data || result;
                
                if (Array.isArray(items)) {
                    const now = new Date();
                    let dateLimit = new Date(now.getTime() - (7 * 24 * 60 * 60 * 1000)); // viikko
                    
                    if (range === 'month') {
                        dateLimit = new Date();
                        dateLimit.setMonth(dateLimit.getMonth() - 1);
                    }
                    
                    items = items.filter(item => {
                        const pubDateStr = item.date || item.publish_at || '';
                        if (!pubDateStr) return false;
                        
                        const pubDate = new Date(pubDateStr);
                        if (isNaN(pubDate.getTime())) return false;
                        
                        return pubDate >= dateLimit && pubDate <= now;
                    });

                    // Kategoriafiltteröinti
                    if (category) {
                        items = items.filter(item => {
                            const map = {
                                'tarjoukset': ['ad', 'offer'],
                                'tapahtumat': ['event'],
                                'uutiset': ['article', 'news']
                            };
                            
                            const catLower = category.toLowerCase();
                            const allowedTypes = map[catLower] || [catLower];
                            return item.type && allowedTypes.includes(item.type.toLowerCase());
                        });
                    }
                }
                
                feedContainer.innerHTML = '';
                
                if (!Array.isArray(items) || items.length === 0) {
                    feedContainer.innerHTML = '<div class="status-msg">Ei nostoja kuluneelta viikolta.</div>';
                    return;
                }

                items.forEach(item => {
                    // Mäppäys JSON -> Kortin tiedot
                    const title = item.title || 'Ilman otsikkoa';
                    const excerpt = item.excerpt || item.description || '';
                    const link = item.link || item.website_url || '#';
                    const image = item.image || '';
                    const videoUrl = item.video || item.youtube_url || item.video_url || '';
                    const pubDate = item.date || item.publish_at || '';
                    const phone = item.phone || item.puhelin || item.puhelinnumero || '';
                    const facebookUrl = item.facebook || item.facebook_url || '';
                    
                    let videoId = item.video_id || getYouTubeId(videoUrl);
                    if (!videoId && image) videoId = getYouTubeId(image);
                    
                    // Formatoi päivämäärä
                    let badgeHtml = '';
                    if (pubDate) {
                        try {
                            const d = new Date(pubDate);
                            if (!isNaN(d.getTime())) {
                                badgeHtml = `<div class="badge">${d.toLocaleDateString('fi-FI')}</div>`;
                            } else {
                                badgeHtml = `<div class="badge">${pubDate}</div>`;
                            }
                        } catch(e) {
                            badgeHtml = `<div class="badge">${pubDate}</div>`;
                        }
                    }

                    // Kategoria Badge
                    const categoryMap = {
                        'ad': 'Tarjous',
                        'event': 'Tapahtuma',
                        'article': 'Uutinen',
                        'notice': 'Ilmoitus',
                        'job': 'Työpaikka',
                        'offer': 'Tarjous'
                    };
                    const categoryTxt = item.type ? (categoryMap[item.type] || item.type) : 'Nosto';
                    const categoryBadgeHtml = `<div class="category-badge">${categoryTxt}</div>`;

                    const article = document.createElement('article');
                    article.className = 'ad-card';

                    // Image tai Video Html
                    let mediaHtml = '';
                    let isVideo = false;
                    
                    if (videoId) {
                        isVideo = true;
                        mediaHtml = `<iframe src="https://www.youtube.com/embed/${videoId}" class="ad-image" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                    } else if (image && image.trim() !== '') {
                        mediaHtml = `<img src="${image}" alt="${title}" class="ad-image" onerror="this.style.display='none'">`;
                    } else {
                        // Tyylikäs harmaa paikkalaatikko
                        mediaHtml = `<img src="data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22800%22%20height%3D%22533%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20800%20533%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3Cstyle%20type%3D%22text%2Fcss%22%3E%23holder_1%20text%20%7B%20fill%3A%23aaaaaa%3Bfont-weight%3Abold%3Bfont-family%3AArial%2C%20Helvetica%2C%20Open%20Sans%2C%20sans-serif%2C%20monospace%3Bfont-size%3A40pt%20%7D%20%3C%2Fstyle%3E%3C%2Fdefs%3E%3Cg%20id%3D%22holder_1%22%3E%3Crect%20width%3D%22800%22%20height%3D%22533%22%20fill%3D%22%23eeeeee%22%3E%3C%2Frect%3E%3Cg%3E%3Ctext%20x%3D%22295.5%22%20y%3D%22283.5%22%3EEi%20kuvaa%3C%2Ftext%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E" alt="Ei kuvaa" class="ad-image">`;
                    }

                    // Kuvakortin yläosa
                    const wrapperHtml = `
                        <div class="ad-image-wrapper">
                            ${mediaHtml}
                            ${!isVideo ? '<div class="gradient-overlay"></div>' : ''}
                            ${categoryBadgeHtml}
                            ${badgeHtml}
                            ${!isVideo ? `<h2 class="ad-title-overlay">${title}</h2>` : ''}
                        </div>
                    `;

                    // Yhteystietopainikkeet
                     let whatsappBtnHtml = '';
                     if (phone) {
                         let cleanPhone = phone.replace(/[^0-9\+]/g, '');
                         if (cleanPhone.startsWith('0')) cleanPhone = '+358' + cleanPhone.substring(1);
                         cleanPhone = cleanPhone.replace('+', ''); // wa.me haluaa muodon ilman plussaa
                         whatsappBtnHtml = `
                             <a href="https://wa.me/${cleanPhone}" target="_blank" class="share-icon" title="Ota yhteyttä WhatsAppilla">
                                 <svg width="24" height="24" viewBox="0 0 24 24" fill="#25D366"><path d="M12.031 0C5.397 0 .013 5.385.013 12.019c0 2.12.552 4.186 1.599 6.007L0 24l6.113-1.604c1.761.968 3.754 1.48 5.918 1.48 6.634 0 12.018-5.385 12.018-12.02S18.665 0 12.031 0zM12 21.84c-1.801 0-3.564-.486-5.111-1.404l-.367-.217-3.791.994.996-3.687-.238-.37A9.873 9.873 0 0 1 2.05 12C2.05 6.494 6.536 2.015 12 2.015S21.95 6.494 21.95 12 17.464 21.84 12 21.84zm5.558-7.587c-.305-.153-1.806-.893-2.085-.995-.28-.103-.484-.154-.688.153-.204.307-.791.995-.97 1.201-.178.205-.357.23-.663.077-.306-.154-1.288-.475-2.454-1.517-.905-.811-1.516-1.815-1.694-2.122-.178-.306-.019-.472.134-.625.138-.138.306-.356.46-.534.152-.178.203-.306.305-.512.102-.205.051-.383-.025-.536-.076-.153-.688-1.66-.944-2.274-.249-.597-.502-.516-.688-.526-.178-.01-.383-.01-.587-.01-.204 0-.536.077-.816.383-.281.307-1.07 1.045-1.07 2.545s1.096 2.951 1.25 3.155c.153.205 2.15 3.284 5.205 4.603.725.313 1.291.5 1.733.642.729.231 1.393.198 1.916.12.585-.088 1.806-.738 2.06-1.45.255-.712.255-1.321.179-1.45-.077-.128-.281-.205-.587-.358z"/></svg>
                             </a>`;
                     }

                     let facebookBtnHtml = '';
                     if (facebookUrl) {
                         facebookBtnHtml = `
                             <a href="${facebookUrl}" target="_blank" class="share-icon" title="Ota yhteyttä Facebookissa">
                                 <svg width="24" height="24" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                             </a>`;
                     }

                    // Kortin alaosa
                    article.innerHTML = `
                        ${wrapperHtml}
                        <div class="ad-content">
                            ${isVideo ? `<h2 class="ad-title-inline">${title}</h2>` : ''}
                            <p class="ad-description">${excerpt}</p>
                            <div class="ad-bottom-row" style="margin-top: auto; display: flex; gap: 12px; align-items: center;">
                                <a href="${link}" class="ad-cta" target="_blank" rel="noopener noreferrer" style="flex-grow: 1;">Lue lisää</a>
                                ${whatsappBtnHtml}
                                ${facebookBtnHtml}
                            </div>
                        </div>
                    `;

                    feedContainer.appendChild(article);
                });

            })
            .catch(error => {
                console.error("Virhe ladattaessa syötettä:", error);
                feedContainer.innerHTML = '<div class="status-msg">Sisällön lataaminen epäonnistui.<br><small>Yritä myöhemmin uudelleen.</small></div>';
            });
    });
    </script>
</body>
</html>
