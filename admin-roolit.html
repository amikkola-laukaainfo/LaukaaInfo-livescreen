<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Roolien hallinta | LaukaaInfo</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 2rem; margin: 0; color: #0f172a; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { font-family: 'Outfit', sans-serif; margin-top: 0; color: #1e293b; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, select { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background: #0ea5e9; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { background: #0284c7; }
        .error { color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem; }
        .success { color: #10b981; font-size: 0.9rem; margin-top: 0.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; font-size: 0.9rem; }
        td { font-size: 0.9rem; }
        .btn-delete { background: #ef4444; padding: 0.25rem 0.5rem; font-size: 0.8rem; }
        .btn-delete:hover { background: #dc2626; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge.mod { background: #fee2e2; color: #991b1b; }
        .badge.admin { background: #e0e7ff; color: #3730a3; }
        #status-msg { background: #f0f9ff; border: 1px solid #bae6fd; color: #0369a1; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; font-size: 0.9rem; }
        #unauthorized { display: none; text-align: center; padding: 3rem; }
        #unauthorized code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.82rem; }
        #app { display: none; }
    </style>
</head>
<body>

<div style="max-width:800px; margin: 0 auto;">
    <div id="status-msg"></div>
</div>

<div id="unauthorized" style="max-width:800px; margin: 0 auto; background:#fff; padding:2rem; border-radius:12px;">
</div>

<div id="app" class="container">
    <h1>Roolien hallinta</h1>
    <p style="color:#64748b; font-size:0.9rem;">Lisää tai poista rooleja (moderaattori tai yrityksen admin).</p>
    
    <div style="background: #f8fafc; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #e2e8f0;">
        <h3 style="margin-top:0;">Anna uusi rooli</h3>
        <form id="role-form">
            <div class="form-group">
                <label>Käyttäjän sähköposti</label>
                <input type="email" id="user-email" required placeholder="esim. matti@yritys.fi">
            </div>
            <div class="form-group">
                <label>Rooli</label>
                <select id="role-select" required>
                    <option value="2">🏢 Yrityksen ylläpitäjä (company_admin)</option>
                    <option value="4">📍 Kohteen ylläpitäjä (location_admin)</option>
                    <option value="3">🛡️ Moderaattori (moderator)</option>
                </select>
            </div>
            <div class="form-group" id="target-id-group">
                <label id="target-id-label">Yrityksen ID</label>
                <input type="text" id="target-id" placeholder="esim. c489c6d...">
                <p style="font-size:0.8rem; color:#64748b; margin-top:4px;">Kopioi ID companies_data.json-tiedostosta tai Supabasesta.</p>
            </div>
            <button type="submit" id="btn-submit">Tallenna rooli</button>
            <div id="form-msg"></div>
        </form>
    </div>

    <h3>Nykyiset roolit</h3>
    <table id="roles-table">
        <thead>
            <tr>
                <th>Sähköposti</th>
                <th>Rooli</th>
                <th>Kohde (Target)</th>
                <th>Toiminto</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="4" style="text-align:center;">Ladataan...</td></tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js?v=20260713"></script>
<script>
    const statusEl = document.getElementById('status-msg');

    function showStatus(msg, isError) {
        statusEl.style.display = 'block';
        statusEl.style.background = isError ? '#fef2f2' : '#f0f9ff';
        statusEl.style.borderColor = isError ? '#fecaca' : '#bae6fd';
        statusEl.style.color = isError ? '#991b1b' : '#0369a1';
        statusEl.textContent = msg;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        showStatus('⏳ Ladataan...');

        // 1. Tarkista Supabase
        if (!window.LaukaaAuth || !window.LaukaaSupabase) {
            showStatus('❌ Supabase-yhteys puuttuu. Tarkista että supabase-config.js on ladattu oikein.', true);
            return;
        }

        // 2. Tarkista kirjautuminen
        const user = await window.LaukaaAuth.getUser();
        if (!user) {
            showStatus('', false);
            statusEl.style.display = 'none';
            document.getElementById('unauthorized').style.display = 'block';
            document.getElementById('unauthorized').innerHTML = `
                <h2>Et ole kirjautunut sisään</h2>
                <p>Kirjaudu ensin osoitteessa <a href="kirjaudu.html" style="color:#0ea5e9;">kirjaudu.html</a>.</p>
            `;
            return;
        }

        showStatus(`⏳ Tarkistetaan rooli... (${user.email})`);

        // 3. Tarkista roolit
        const roles = await window.LaukaaAuth.getRoles();
        console.log('[admin] käyttäjä:', user.email, '| roolit:', roles);

        const isMod = roles.some(r => r.role_name === 'moderator');

        if (!isMod) {
            statusEl.style.display = 'none';
            document.getElementById('unauthorized').style.display = 'block';
            document.getElementById('unauthorized').innerHTML = `
                <h2>Ei moderaattorin oikeuksia</h2>
                <p>Kirjautunut: <strong>${user.email}</strong></p>
                <p>Nykyiset roolit: <strong>${roles.length > 0 ? roles.map(r => r.role_name).join(', ') : '(ei yhtään)'}</strong></p>
                <hr style="border:none;border-top:1px solid #e2e8f0; margin:1.5rem 0;">
                <p style="font-size:0.88rem; color:#475569; text-align:left;">
                    Lisää moderaattoriasema Supabasen <strong>Table Editor</strong> -näkymästä:<br><br>
                    Taulu: <code>user_roles</code><br>
                    Uusi rivi:<br>
                    &nbsp;• <code>user_id</code> = <code>${user.id}</code><br>
                    &nbsp;• <code>role_id</code> = <code>3</code>
                </p>
            `;
            return;
        }

        statusEl.style.display = 'none';
        document.getElementById('app').style.display = 'block';
        
        const roleSelect = document.getElementById('role-select');
        const targetGroup = document.getElementById('target-id-group');
        const targetLabel = document.getElementById('target-id-label');

        const ROLES_NEEDING_TARGET = ['2', '4']; // company_admin, location_admin
        const TARGET_LABELS = {
            '2': 'Yrityksen ID (companies_data.json → "id"-kenttä)',
            '4': 'Kohteen ID (location_id)'
        };
        const TARGET_ROLE_NAMES = {
            '2': 'company_admin', '4': 'location_admin'
        };

        function updateTargetField() {
            const v = roleSelect.value;
            const needsTarget = ROLES_NEEDING_TARGET.includes(v);
            targetGroup.style.display = needsTarget ? 'block' : 'none';
            if (TARGET_LABELS[v]) targetLabel.textContent = TARGET_LABELS[v];
        }

        roleSelect.addEventListener('change', updateTargetField);
        updateTargetField(); // Näytä heti oikea tila latauksen yhteydessä

        loadRoles();

        document.getElementById('role-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('user-email').value.trim();
            const roleId = parseInt(roleSelect.value);
            const needsTarget = ROLES_NEEDING_TARGET.includes(String(roleId));
            const targetId = needsTarget ? document.getElementById('target-id').value.trim() : null;
            const msg = document.getElementById('form-msg');

            if (needsTarget && !targetId) {
                msg.className = 'error';
                msg.textContent = `${TARGET_ROLE_NAMES[roleId] || 'Tämä'} -roolille ID on pakollinen.`;
                return;
            }
            
            document.getElementById('btn-submit').disabled = true;
            msg.textContent = '';
            
            try {
                const { data: userId, error: rpcError } = await window.LaukaaSupabase.rpc('get_user_id_by_email', { email_input: email });
                
                if (rpcError || !userId) {
                    throw new Error('Käyttäjää ei löydy sähköpostilla "' + email + '". (Onko hän kirjautunut sisään kerran?)');
                }

                const { error: insertError } = await window.LaukaaSupabase
                    .from('user_roles')
                    .insert([{ user_id: userId, role_id: roleId, target_id: targetId, granted_by: user.id }]);
                    
                if (insertError) throw insertError;
                
                msg.className = 'success';
                msg.textContent = '✅ Rooli lisätty!';
                document.getElementById('role-form').reset();
                targetGroup.style.display = 'none';
                loadRoles();
                
            } catch (err) {
                msg.className = 'error';
                msg.textContent = '❌ ' + (err.message || 'Virhe tallennuksessa');
            } finally {
                document.getElementById('btn-submit').disabled = false;
            }
        });
    });

    async function loadRoles() {
        const tbody = document.querySelector('#roles-table tbody');
        try {
            const { data, error } = await window.LaukaaSupabase.rpc('get_all_roles_admin');
            if (error) throw error;
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Ei rooleja asetettu.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.email}</td>
                    <td><span class="badge ${r.role_name === 'moderator' ? 'mod' : 'admin'}">${r.role_name}</span></td>
                    <td>${r.target_id || '-'}</td>
                    <td><button class="btn-delete" onclick="deleteRole(${r.id})">Poista</button></td>
                </tr>
            `).join('');
        } catch (err) {
            console.error('[admin] loadRoles virhe:', err);
            tbody.innerHTML = `<tr><td colspan="4" style="color:red;">Virhe: ${err.message || 'get_all_roles_admin RPC puuttuu'}</td></tr>`;
        }
    }
    
    async function deleteRole(id) {
        if (!confirm('Poista rooli?')) return;
        await window.LaukaaSupabase.from('user_roles').delete().eq('id', id);
        loadRoles();
    }
</script>
</body>
</html>
