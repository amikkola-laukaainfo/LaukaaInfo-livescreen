<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reittikuva Editori – LaukaaInfo</title>
    <link rel="icon" href="../logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --primary-glow: rgba(0, 123, 255, 0.4);
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            background: var(--card);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 1rem;
            background: #0f172a;
            border: 2px solid var(--border);
            border-radius: 12px;
            color: white;
            margin: 1.5rem 0;
            font-family: inherit;
            font-size: 1.1rem;
            text-align: center;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 1rem;
            width: 100%;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 0 20px var(--primary-glow); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Point List */
        .point-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .point-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.2s;
        }
        .point-card:hover { border-color: var(--primary); background: rgba(15, 23, 42, 0.6); }

        .point-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .point-title { font-weight: 700; font-family: 'Outfit', sans-serif; font-size: 1.1rem; }
        .point-id { font-size: 0.75rem; color: var(--text-muted); background: #334155; padding: 2px 8px; border-radius: 10px; }

        .preview-area {
            width: 100%;
            height: 160px;
            background: #0f172a;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px dashed var(--border);
            position: relative;
        }
        .preview-area img { width: 100%; height: 100%; object-fit: cover; }
        .preview-placeholder { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 1rem; }

        .status-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 0.75rem;
        }
        .status-ok { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-none { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .status-old { background: rgba(234, 179, 8, 0.15); color: #eab308; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #0f172a;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 10000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="font-family: 'Outfit'; margin-top:0;">Admin Kirjautuminen</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Syötä admin-token muokataksesi reittiä.</p>
            <input type="password" id="auth-token-input" placeholder="ADMIN-99-LPS" autocomplete="current-password">
            <button class="btn" onclick="checkAuth()">Avaa työkalu</button>
        </div>
    </div>

    <div class="container hidden" id="main-app">
        <header>
            <h1>Reittikuva Editori</h1>
            <p class="subtitle">Hallitse kävelyreittien valokuvia ImageKitin kautta</p>
            <div id="route-info" style="margin-top: 1.5rem; font-weight: 600; color: var(--primary); background: rgba(0,123,255,0.1); padding: 8px 16px; border-radius: 50px; display: inline-block;"></div>
        </header>

        <div id="point-list" class="point-grid">
            <!-- Points injected here -->
        </div>

        <div style="margin-top: 4rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2.5rem;">
            <button class="btn" style="background: #334155; max-width: 250px;" onclick="reloadRoute()">🔄 Päivitä lista</button>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 1rem;">Kuvat tallentuvat automaattisesti reittitiedostoon.</p>
        </div>
    </div>

    <div id="toast">Tallennettu!</div>

    <script>
        let yritysId = '99';
        let token = '';
        let routeData = null;
        let routePath = 'reitix/route.geojson';

        // 1. AUTH LOGIC
        window.addEventListener('DOMContentLoaded', () => {
            console.log("App loaded, checking URL params...");
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken === 'ADMIN-99-LPS') {
                console.log("Token found in URL, auto-login...");
                token = urlToken;
                document.getElementById('auth-token-input').value = token;
                checkAuth();
            }
        });

        // Enter key support
        document.getElementById('auth-token-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });

        async function checkAuth() {
            const input = document.getElementById('auth-token-input').value.trim();
            const btn = document.querySelector('#auth-overlay .btn');
            
            if (input === 'ADMIN-99-LPS') {
                token = input;
                btn.innerHTML = '⌛ Ladataan tietoja...';
                btn.disabled = true;
                
                const success = await initApp();
                if (success) {
                    console.log("Auth success, hiding overlay");
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                } else {
                    btn.innerHTML = 'Avaa työkalu';
                    btn.disabled = false;
                }
            } else {
                alert('Väärä token. Käytä ADMIN-99-LPS');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 2. APP LOGIC
        async function initApp() {
            console.log("Initializing App, fetching GeoJSON via API...");
            try {
                const apiUrl = `imagekit-api.php?yritys=99&token=${token}&action=get_geojson&path=${routePath}&t=${Date.now()}`;
                const res = await fetch(apiUrl);
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || `Palvelinvirhe ${res.status}`);
                }
                
                routeData = await res.json();
                console.log("GeoJSON loaded successfully:", routeData);
                document.getElementById('route-info').textContent = `Reitti: ${routePath} (${routeData.features.filter(f=>f.geometry.type==='Point').length} pistettä)`;
                renderPoints();
                return true;
            } catch (err) {
                console.error("Init Error:", err);
                alert('VIRHE: Reittitiedostoa ei voitu ladata.\n\nSyy: ' + err.message + '\n\nVarmista että reitix/route.geojson on paikallaan.');
                return false;
            }
        }

        function reloadRoute() {
            initApp();
            showToast('Lista päivitetty.');
        }

        function renderPoints() {
            const listEl = document.getElementById('point-list');
            listEl.innerHTML = '';

            const points = routeData.features.filter(f => f.geometry.type === 'Point');

            points.forEach((f, idx) => {
                const props = f.properties;
                const card = document.createElement('div');
                card.className = 'point-card';
                
                const hasImage = !!props.image;
                const isImageKit = hasImage && props.image.includes('ik.imagekit.io');
                const hasVideo = !!props.video;
                
                // Rakennetaan esikatselu-URL
                let imgUrl = '';
                if (isImageKit) {
                    imgUrl = `${props.image}?tr=w-400,h-300,fo-auto`;
                } else if (hasImage) {
                    imgUrl = `../reitix/${props.image}`;
                }

                card.innerHTML = `
                    <div class="point-header">
                        <div class="point-title">${props.title || 'Nimetön piste'}</div>
                        <div class="point-id">#${idx + 1}</div>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:0.75rem;">
                        <div class="status-badge ${isImageKit ? 'status-ok' : (hasImage ? 'status-old' : 'status-none')}">
                            ${isImageKit ? '✅ Kuva pilvessä' : (hasImage ? '⚠️ Vanha kuva' : '❌ Ei kuvaa')}
                        </div>
                        <div class="status-badge ${hasVideo ? 'status-ok' : 'status-none'}">
                            ${hasVideo ? '🎬 Video asetettu' : '🎬 Ei videota'}
                        </div>
                    </div>
                    <div class="preview-area" id="preview-${idx}">
                        ${hasImage ? `<img src="${imgUrl}" alt="Preview" onerror="this.parentElement.innerHTML='<div class=\'preview-placeholder\'>Kuva ei lataudu</div>'">` : `<div class="preview-placeholder">Lataa uusi kuva ImageKitiin</div>`}
                    </div>
                    <div class="upload-actions">
                        <button class="btn" style="margin-bottom:1rem;" onclick="triggerUpload(${idx})">📷 Lataa / Vaihda kuva</button>
                        <input type="file" id="file-input-${idx}" class="hidden" accept="image/*" onchange="handleFileUpload(event, ${idx})">
                        
                        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.75rem;">
                            <div>
                                <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem; text-align:left;">Kuvaus / Teksti</label>
                                <textarea id="desc-input-${idx}" style="width:100%; height:60px; background:#0f172a; border:2px solid var(--border); border-radius:8px; color:white; padding:0.6rem; font-family:inherit; font-size:0.9rem; resize:vertical;">${props.description || ''}</textarea>
                            </div>
                            
                            <div>
                                <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem; text-align:left;">YouTube Video</label>
                                <input type="text" id="video-input-${idx}" value="${props.video || ''}" placeholder="https://..." style="margin:0; font-size:0.9rem; text-align:left; padding:0.6rem; width:100%;">
                            </div>

                            <div>
                                <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem; text-align:left;">Lisätietolinkki (URL)</label>
                                <input type="text" id="info-input-${idx}" value="${props.info_url || ''}" placeholder="https://..." style="margin:0; font-size:0.9rem; text-align:left; padding:0.6rem; width:100%;">
                            </div>

                            <div>
                                <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem; text-align:left;">Äänitiedoston linkki (URL)</label>
                                <input type="text" id="audio-input-${idx}" value="${props.audio_url || ''}" placeholder="https://..." style="margin:0; font-size:0.9rem; text-align:left; padding:0.6rem; width:100%;">
                            </div>

                            <button class="btn" style="padding: 0.8rem;" onclick="saveProperties(${idx})">💾 Tallenna tiedot</button>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function triggerUpload(idx) {
            document.getElementById(`file-input-${idx}`).click();
        }

        async function saveProperties(idx) {
            const videoUrl = document.getElementById(`video-input-${idx}`).value.trim();
            const description = document.getElementById(`desc-input-${idx}`).value.trim();
            const infoUrl = document.getElementById(`info-input-${idx}`).value.trim();
            const audioUrl = document.getElementById(`audio-input-${idx}`).value.trim();
            
            const btn = document.activeElement;
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = '⌛ Tallennetaan...';

                let pointCount = 0;
                let targetFeatureIdx = -1;
                for(let i=0; i<routeData.features.length; i++) {
                    if(routeData.features[i].geometry.type === 'Point') {
                        if(pointCount === idx) {
                            targetFeatureIdx = i;
                            break;
                        }
                        pointCount++;
                    }
                }

                if(targetFeatureIdx !== -1) {
                    const props = routeData.features[targetFeatureIdx].properties;
                    props.video = videoUrl;
                    props.description = description;
                    props.info_url = infoUrl;
                    props.audio_url = audioUrl;

                    // Update mediaType if needed
                    if (videoUrl) {
                        props.mediaType = 'VIDEO';
                    } else if (props.image) {
                        props.mediaType = 'IMAGE';
                    }
                    
                    const saveFormData = new FormData();
                    saveFormData.append('path', routePath);
                    saveFormData.append('data', JSON.stringify(routeData));
                    
                    const saveRes = await fetch(`imagekit-api.php?yritys=99&token=${token}&action=save_geojson`, {
                        method: 'POST',
                        body: saveFormData
                    });
                    
                    const saveData = await saveRes.json();
                    if (saveData.result === 'ok') {
                        showToast('✅ Tiedot tallennettu!');
                        renderPoints();
                    } else {
                        throw new Error(saveData.error || 'Tallennus epäonnistui');
                    }
                }
            } catch (err) {
                alert('VIRHE: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        async function handleFileUpload(event, idx) {
            const file = event.target.files[0];
            if (!file) return;

            const btn = event.target.parentElement.querySelector('.btn');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '⌛ Käsitellään...';

                // A. Pienennys Canvasilla
                const resizedBlob = await resizeImage(file, 1600, 1600);
                btn.innerHTML = '🚀 Ladataan...';

                // B. Hae ImageKit-autentikointi
                const authRes = await fetch(`imagekit-api.php?yritys=99&token=${token}&action=auth`);
                const authData = await authRes.json();
                
                if (authData.error) throw new Error(authData.message || authData.error);

                // C. Upload ImageKitiin
                const fileName = `reitti_piste_${idx + 1}_${Date.now()}.jpg`;
                const formData = new FormData();
                formData.append('file', resizedBlob, fileName);
                formData.append('fileName', fileName);
                formData.append('publicKey', authData.publicKey);
                formData.append('signature', authData.signature);
                formData.append('expire', authData.expire);
                formData.append('token', authData.token);
                formData.append('folder', '/reitix/images');
                formData.append('useUniqueFileName', 'false');

                const uploadRes = await fetch('https://upload.imagekit.io/api/v1/files/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const uploadData = await uploadRes.json();
                if (!uploadRes.ok) throw new Error(uploadData.message || 'Lataus epäonnistui');

                btn.innerHTML = '💾 Tallennetaan...';
                
                let pointCount = 0;
                let targetFeatureIdx = -1;
                for(let i=0; i<routeData.features.length; i++) {
                    if(routeData.features[i].geometry.type === 'Point') {
                        if(pointCount === idx) {
                            targetFeatureIdx = i;
                            break;
                        }
                        pointCount++;
                    }
                }

                if(targetFeatureIdx !== -1) {
                    const props = routeData.features[targetFeatureIdx].properties;
                    props.image = uploadData.url;
                    
                    // Myös muut kentät talteen samalla
                    props.description = document.getElementById(`desc-input-${idx}`).value.trim();
                    props.video = document.getElementById(`video-input-${idx}`).value.trim();
                    props.info_url = document.getElementById(`info-input-${idx}`).value.trim();
                    props.audio_url = document.getElementById(`audio-input-${idx}`).value.trim();

                    // Jos asetetaan kuva, ja videota ei ole, asetetaan IMAGE
                    if (!props.video) {
                        props.mediaType = 'IMAGE';
                    } else {
                        props.mediaType = 'VIDEO';
                    }
                    
                    const saveFormData = new FormData();
                    saveFormData.append('path', routePath);
                    saveFormData.append('data', JSON.stringify(routeData));
                    
                    const saveRes = await fetch(`imagekit-api.php?yritys=99&token=${token}&action=save_geojson`, {
                        method: 'POST',
                        body: saveFormData
                    });
                    
                    const saveData = await saveRes.json();
                    if (saveData.result === 'ok') {
                        showToast('✅ Tallennettu onnistuneesti!');
                        renderPoints();
                    } else {
                        throw new Error(saveData.error || 'Tallennus epäonnistui');
                    }
                }

            } catch (err) {
                console.error("Upload Error:", err);
                alert('VIRHE LATAUKSESSA: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function resizeImage(file, maxWidth, maxHeight) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    } else {
                        if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.85);
                };
                img.onerror = reject;
            });
        }
    </script>
</body>
</html>
