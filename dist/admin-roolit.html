<!DOCTYPE html><html lang="fi"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin – Roolien hallinta | LaukaaInfo</title><meta name="robots" content="noindex, nofollow"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet"><script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script><style>body{font-family:Inter,sans-serif;background:#f1f5f9;padding:2rem;margin:0;color:#0f172a}.container{max-width:800px;margin:0 auto;background:#fff;padding:2rem;border-radius:12px;box-shadow:0 4px 6px -1px rgb(0 0 0 / .1)}h1{font-family:Outfit,sans-serif;margin-top:0;color:#1e293b}.form-group{margin-bottom:1rem}label{display:block;font-weight:600;margin-bottom:.5rem;font-size:.9rem}input,select{width:100%;padding:.5rem;border:1px solid #cbd5e1;border-radius:6px;box-sizing:border-box}button{background:#0ea5e9;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-weight:600}button:hover{background:#0284c7}.error{color:#ef4444;font-size:.9rem;margin-top:.5rem}.success{color:#10b981;font-size:.9rem;margin-top:.5rem}table{width:100%;border-collapse:collapse;margin-top:2rem}td,th{text-align:left;padding:.75rem;border-bottom:1px solid #e2e8f0}th{background:#f8fafc;font-weight:600;font-size:.9rem}td{font-size:.9rem}.btn-delete{background:#ef4444;padding:.25rem .5rem;font-size:.8rem}.btn-delete:hover{background:#dc2626}.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.75rem;font-weight:600}.badge.mod{background:#fee2e2;color:#991b1b}.badge.admin{background:#e0e7ff;color:#3730a3}#unauthorized{display:none;text-align:center;padding:3rem}#app{display:none}</style></head><body><div id="unauthorized"><h2>Ei oikeuksia</h2><p>Tämä sivu on tarkoitettu vain moderaattoreille.</p><a href="kirjaudu.html" style="color:#0ea5e9">Kirjaudu sisään</a></div><div id="app" class="container"><h1>Roolien hallinta</h1><p style="color:#64748b;font-size:.9rem">Lisää tai poista rooleja (moderaattori tai yrityksen admin).</p><div style="background:#f8fafc;padding:1.5rem;border-radius:8px;margin-bottom:2rem;border:1px solid #e2e8f0"><h3 style="margin-top:0">Anna uusi rooli</h3><form id="role-form"><div class="form-group"><label>Käyttäjän sähköposti</label> <input type="email" id="user-email" required placeholder="esim. matti@yritys.fi"></div><div class="form-group"><label>Rooli</label> <select id="role-select" required><option value="2">Yrityksen ylläpitäjä (company_admin)</option><option value="3">Moderaattori (moderator)</option></select></div><div class="form-group" id="target-id-group"><label>Yrityksen ID (vain jos company_admin)</label> <input type="text" id="target-id" placeholder="esim. c489c6d..."><p style="font-size:.8rem;color:#64748b;margin-top:4px">Kopioi tämä Yritykset-hallinnasta tai Supabasesta.</p></div><button type="submit" id="btn-submit">Tallenna rooli</button><div id="form-msg"></div></form></div><h3>Nykyiset roolit</h3><table id="roles-table"><thead><tr><th>Sähköposti</th><th>Rooli</th><th>Kohde (Target)</th><th>Toiminto</th></tr></thead><tbody><tr><td colspan="4" style="text-align:center">Ladataan...</td></tr></tbody></table></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.75bd7966.js?v=20260713"></script><script>async function loadRoles(){const e=document.querySelector("#roles-table tbody");try{const{data:t,error:n}=await window.LaukaaSupabase.rpc("get_all_roles_admin");if(n)throw n;if(!t||0===t.length)return void(e.innerHTML='<tr><td colspan="4">Ei rooleja asetettu.</td></tr>');e.innerHTML=t.map(e=>`\n                <tr>\n                    <td>${e.email}</td>\n                    <td>\n                        <span class="badge ${"moderator"===e.role_name?"mod":"admin"}">\n                            ${e.role_name}\n                        </span>\n                    </td>\n                    <td>${e.target_id||"-"}</td>\n                    <td>\n                        <button class="btn-delete" onclick="deleteRole(${e.id})">Poista</button>\n                    </td>\n                </tr>\n            `).join("")}catch(t){console.error(t),e.innerHTML='<tr><td colspan="4" style="color:red;">Virhe ladattaessa. (Vaatii get_all_roles_admin RPC:n)</td></tr>'}}async function deleteRole(e){confirm("Poista rooli?")&&(await window.LaukaaSupabase.from("user_roles").delete().eq("id",e),loadRoles())}document.addEventListener("DOMContentLoaded",async()=>{if(!window.LaukaaAuth)return;if(!await window.LaukaaAuth.isModerator())return void(document.getElementById("unauthorized").style.display="block");document.getElementById("app").style.display="block";const e=document.getElementById("role-select"),t=document.getElementById("target-id-group");e.addEventListener("change",()=>{t.style.display="2"===e.value?"block":"none"}),loadRoles(),document.getElementById("role-form").addEventListener("submit",async t=>{t.preventDefault();const n=document.getElementById("user-email").value.trim(),a=parseInt(e.value),o=2===a?document.getElementById("target-id").value.trim():null,r=document.getElementById("form-msg");if(2===a&&!o)return r.className="error",void(r.textContent="Yrityksen ID on pakollinen company_admin -roolille.");document.getElementById("btn-submit").disabled=!0;try{const{data:e,error:t}=await window.LaukaaSupabase.rpc("get_user_id_by_email",{email_input:n});if(t||!e)throw new Error("Käyttäjää ei löydy tällä sähköpostilla. (Onko hän kirjautunut sisään kerran?)");const{error:l}=await window.LaukaaSupabase.from("user_roles").insert([{user_id:e,role_id:a,target_id:o,granted_by:(await window.LaukaaAuth.getUser()).id}]);if(l)throw l;r.className="success",r.textContent="Rooli lisätty!",document.getElementById("role-form").reset(),loadRoles()}catch(e){r.className="error",r.textContent=e.message||"Virhe tallennuksessa"}finally{document.getElementById("btn-submit").disabled=!1}})})</script></body></html>
