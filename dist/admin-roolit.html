ad><tr><th>Sähköposti</th><th>Rooli</th><th>Kohde (Target)</th><th>Toiminto</th></tr></thead><tbody><tr><td colspan="4" style="text-align:center">Ladataan...</td></tr></tbody></table></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.f20c47b1.js?v=20260713"></script><script>const statusEl=document.getElementById("status-msg");function showStatus(e,t){statusEl.style.display="block",statusEl.style.background=t?"#fef2f2":"#f0f9ff",statusEl.style.borderColor=t?"#fecaca":"#bae6fd",statusEl.style.color=t?"#991b1b":"#0369a1",statusEl.textContent=e}async function loadRoles(){const e=document.querySelector("#roles-table tbody");try{const{data:t,error:n}=await window.LaukaaSupabase.rpc("get_all_roles_admin");if(n)throw n;if(!t||0===t.length)return void(e.innerHTML='<tr><td colspan="4">Ei rooleja asetettu.</td></tr>');e.innerHTML=t.map(e=>`\n                <tr>\n                    <td>${e.email}</td>\n                    <td><span class="badge ${"moderator"===e.role_name?"mod":"admin"}">${e.role_name}</span></td>\n                    <td>${e.target_id||"-"}</td>\n                    <td><button class="btn-delete" onclick="deleteRole(${e.id})">Poista</button></td>\n                </tr>\n            `).join("")}catch(t){console.error("[admin] loadRoles virhe:",t),e.innerHTML=`<tr><td colspan="4" style="color:red;">Virhe: ${t.message||"get_all_roles_admin RPC puuttuu"}</td></tr>`}}async function deleteRole(e){confirm("Poista rooli?")&&(await window.LaukaaSupabase.from("user_roles").delete().eq("id",e),loadRoles())}document.addEventListener("DOMContentLoaded",async()=>{if(showStatus("⏳ Ladataan..."),!window.LaukaaAuth||!window.LaukaaSupabase)return void showStatus("❌ Supabase-yhteys puuttuu. Tarkista että supabase-config.js on ladattu oikein.",!0);const e=await window.LaukaaAuth.getUser();if(!e)return showStatus("",!1),statusEl.style.display="none",document.getElementById("unauthorized").style.display="block",void(document.getElementById("unauthorized").innerHTML='\n                <h2>Et ole kirjautunut sisään</h2>\n                <p>Kirjaudu ensin osoitteessa <a href="kirjaudu.html" style="color:#0ea5e9;">kirjaudu.html</a>.</p>\n            ');showStatus(`⏳ Tarkistetaan rooli... (${e.email})`);const t=await window.LaukaaAuth.getRoles();console.log("[admin] käyttäjä:",e.email,"| roolit:",t);if(!t.some(e=>"moderator"===e.role_name))return statusEl.style.display="none",document.getElementById("unauthorized").style.display="block",void(document.getElementById("unauthorized").innerHTML=`\n                <h2>Ei moderaattorin oikeuksia</h2>\n                <p>Kirjautunut: <strong>${e.email}</strong></p>\n                <p>Nykyiset roolit: <strong>${t.length>0?t.map(e=>e.role_name).join(", "):"(ei yhtään)"}</strong></p>\n                <hr style="border:none;border-top:1px solid #e2e8f0; margin:1.5rem 0;">\n                <p style="font-size:0.88rem; color:#475569; text-align:left;">\n                    Lisää moderaattoriasema Supabasen <strong>Table Editor</strong> -näkymästä:<br><br>\n                    Taulu: <code>user_roles</code><br>\n                    Uusi rivi:<br>\n                    &nbsp;• <code>user_id</code> = <code>${e.id}</code><br>\n                    &nbsp;• <code>role_id</code> = <code>3</code>\n                </p>\n            `);statusEl.style.display="none",document.getElementById("app").style.display="block";const n=document.getElementById("role-select"),o=document.getElementById("target-id-group"),a=document.getElementById("target-id-label"),s=["2","4","5"],l={2:'Yrityksen ID (companies_data.json → "id"-kenttä)',4:"Kohteen ID (location_id)",5:"Yhdistyksen ID (association_id)"},r={2:"company_admin",4:"location_admin",5:"association_admin"};function i(){const e=n.value,t=s.includes(e);o.style.display=t?"block":"none",l[e]&&(a.textContent=l[e])}n.addEventListener("change",i),i(),loadRoles(),document.getElementById("role-form").addEventListener("submit",async t=>{t.preventDefault();const a=document.getElementById("user-email").value.trim(),l=parseInt(n.value),i=s.includes(String(l)),d=i?document.getElementById("target-id").value.trim():null,u=document.getElementById("form-msg");if(i&&!d)return u.className="error",void(u.textContent=`${r[l]||"Tämä"} -roolille ID on pakollinen.`);document.getElementById("btn-submit").disabled=!0,u.textContent="";try{const{data:t,error:n}=await window.LaukaaSupabase.rpc("get_user_id_by_email",{email_input:a});if(n||!t)throw new Error('Käyttäjää ei löydy sähköpostilla "'+a+'". (Onko hän kirjautunut sisään kerran?)');const{error:s}=await window.LaukaaSupabase.from("user_roles").insert([{user_id:t,role_id:l,target_id:d,granted_by:e.id}]);if(s)throw s;u.className="success",u.textContent="✅ Rooli lisätty!",document.getElementById("role-form").reset(),o.style.display="none",loadRoles()}catch(e){u.className="error",u.textContent="❌ "+(e.message||"Virhe tallennuksessa")}finally{document.getElementById("btn-submit").disabled=!1}})})</script></body></html>
