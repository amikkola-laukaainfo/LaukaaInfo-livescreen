<!DOCTYPE html><html lang="fi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pienet vinkit</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet"><style>:root{--primary-blue:#0066cc;--secondary-blue:#004d99;--accent-font:'Outfit',sans-serif;--main-font:'Inter',sans-serif}body{font-family:var(--main-font);margin:0;padding:20px;background:0 0;color:#334155}h2{font-family:var(--accent-font);color:var(--primary-blue);text-align:center;font-size:1.5rem;margin-top:0;margin-bottom:20px}.tips-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;max-width:1000px;margin:0 auto}.tip-card{background:#fff;border-radius:16px;padding:15px;border:2px solid #eef2f6;box-shadow:0 4px 6px -1px rgba(0,0,0,.05);transition:transform .2s,border-color .2s;display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;box-sizing:border-box}.tip-card:hover{transform:translateY(-3px);border-color:var(--primary-blue)}.tip-title{font-weight:800;font-size:1.1rem;color:#0f172a;margin:0}.tip-desc{font-size:.9rem;line-height:1.4;margin:8px 0;color:#334155}.tip-details{margin-top:auto;background:#f8fafc;padding:10px;border-radius:8px;font-size:.85rem;color:#475569;border:1px solid #e2e8f0}.tip-details strong{color:#1e293b}.tip-extra{font-style:italic;font-size:.8rem;margin-top:5px;color:#64748b}.tip-link-raw{font-size:.85rem;color:var(--primary-blue);text-decoration:underline;word-break:break-all}.no-tips{text-align:center;color:#64748b;font-style:italic}</style></head><body><div id="tips-wrapper"><h2 id="tips-header">💡 Pieniä vinkkejä sinulle</h2><div id="tips-container" class="tips-grid"></div></div><script>let urlParams=new URLSearchParams(window.location.search),filesParam=urlParams.get("files"),maxTips=parseInt(urlParams.get("limit"))||3;async function loadTips(){var i,e,a=document.getElementById("tips-container"),s=document.getElementById("tips-wrapper");if(filesParam){let t=[];for(i of filesParam.split(","))try{var n,o=(new Date).getTime(),r=await fetch(i.trim()+".json?v="+o);r.ok?(n=await r.json(),Array.isArray(n)&&(t=t.concat(n))):console.warn(`Vinkkitiedostoa ${i}.json ei löytynyt.`)}catch(t){console.error(`Virhe ladattaessa tiedostoa ${i}.json`,t)}0===t.length?s.style.display="none":(e=t.sort(()=>.5-Math.random()).slice(0,maxTips),a.innerHTML=e.map(t=>`
                <div class="tip-card">
                    <div class="tip-title">${t.nimi}</div>
                    ${t.nettilinkki?`<div><a href="${t.nettilinkki}" target="_blank" class="tip-link-raw">${t.nettilinkki}</a></div>`:""}
                    ${t.kuvaus?`<div class="tip-desc">${t.kuvaus.replace(/@@/g,"")}</div>`:""}
                    <div class="tip-details">
                        ${t.paikka?`<div><strong>Paikka:</strong> ${t.paikka}</div>`:""}
                        ${t.yhteystiedot?`<div><strong>Yhteystiedot:</strong> ${t.yhteystiedot}</div>`:""}
                        ${t.lisatiedot?`<div class="tip-extra">(${t.lisatiedot})</div>`:""}
                    </div>
                </div>
            `).join(""),setTimeout(()=>{var t=document.documentElement.scrollHeight;window.parent.postMessage({type:"resizeTipsIframe",height:t},"*")},100))}else s.style.display="none"}document.addEventListener("DOMContentLoaded",loadTips)</script></body></html>
