<!DOCTYPE html><html lang="fi"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pienet vinkit</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet"><style>:root{--primary-blue:#0066cc;--secondary-blue:#004d99;--accent-font:'Outfit',sans-serif;--main-font:'Inter',sans-serif}body{font-family:var(--main-font);margin:0;padding:20px;background:0 0;color:#334155}h2{font-family:var(--accent-font);color:var(--primary-blue);text-align:center;font-size:1.5rem;margin-top:0;margin-bottom:20px}.tips-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;max-width:1000px;margin:0 auto}.tip-card{background:#fff;border-radius:16px;padding:15px;border:2px solid #eef2f6;box-shadow:0 4px 6px -1px rgba(0,0,0,.05);transition:transform .2s,border-color .2s;display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;box-sizing:border-box}.tip-card:hover{transform:translateY(-3px);border-color:var(--primary-blue)}.tip-title{font-weight:800;font-size:1.1rem;color:#0f172a;margin:0}.tip-desc{font-size:.9rem;line-height:1.4;margin:8px 0;color:#334155}.tip-details{margin-top:auto;background:#f8fafc;padding:10px;border-radius:8px;font-size:.85rem;color:#475569;border:1px solid #e2e8f0}.tip-details strong{color:#1e293b}.tip-extra{font-style:italic;font-size:.8rem;margin-top:5px;color:#64748b}.tip-link-raw{font-size:.85rem;color:var(--primary-blue);text-decoration:underline;word-break:break-all}.no-tips{text-align:center;color:#64748b;font-style:italic}</style></head><body><div id="tips-wrapper"><h2 id="tips-header">💡 Pieniä vinkkejä sinulle</h2><div id="tips-container" class="tips-grid"></div></div><script>const urlParams=new URLSearchParams(window.location.search),filesParam=urlParams.get("files"),maxTips=parseInt(urlParams.get("limit"))||3,lang=urlParams.get("lang")||"fi",translations={fi:{header:"💡 Pieniä vinkkejä sinulle",place:"Paikka",contact:"Yhteystiedot"},en:{header:"💡 Small tips for you",place:"Place",contact:"Contact"}},t=translations[lang]||translations.fi;async function loadTips(){const e=document.getElementById("tips-container"),i=document.getElementById("tips-wrapper"),n=document.getElementById("tips-header");if(n&&(n.textContent=t.header),!filesParam)return void(i.style.display="none");const a=filesParam.split(",");let s=[];for(const t of a)try{const e=(new Date).getTime(),i=await fetch(`${t.trim()}.json?v=${e}`);if(i.ok){const t=await i.json();Array.isArray(t)&&t.length>0&&s.push(t.sort(()=>.5-Math.random()))}else console.warn(`Vinkkitiedostoa ${t}.json ei löytynyt.`)}catch(e){console.error(`Virhe ladattaessa tiedostoa ${t}.json`,e)}if(0===s.length)return void(i.style.display="none");let o=[],l=0;for(;o.length<maxTips&&s.some(t=>t.length>0);){const t=s[l%s.length];t.length>0&&o.push(t.shift()),l++}o.sort(()=>.5-Math.random()),e.innerHTML=o.map(e=>`\n                <div class="tip-card">\n                    <div class="tip-title">${e.nimi}</div>\n                    ${e.nettilinkki?`<div><a href="${e.nettilinkki}" target="_blank" class="tip-link-raw">${e.nettilinkki}</a></div>`:""}\n                    ${e.kuvaus?`<div class="tip-desc">${e.kuvaus.replace(/@@/g,"")}</div>`:""}\n                    <div class="tip-details">\n                        ${e.paikka?`<div><strong>${t.place}:</strong> ${e.paikka}</div>`:""}\n                        ${e.yhteystiedot?`<div><strong>${t.contact}:</strong> ${e.yhteystiedot}</div>`:""}\n                        ${e.lisatiedot?`<div class="tip-extra">(${e.lisatiedot})</div>`:""}\n                    </div>\n                </div>\n            `).join(""),setTimeout(()=>{const t=document.documentElement.scrollHeight;window.parent.postMessage({type:"resizeTipsIframe",height:t},"*")},100)}document.addEventListener("DOMContentLoaded",loadTips)</script></body></html>
