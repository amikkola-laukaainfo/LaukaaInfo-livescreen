<!DOCTYPE html><html lang="fi"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Omat sivut – LaukaaInfo Kohtaamiset</title><meta name="robots" content="noindex"><link rel="icon" href="logo.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.75bd7966.css?v=20260713"><script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script><style>body{background:#f1f5f9}.page-wrap{max-width:900px;margin:3rem auto 5rem;padding:0 1rem}.dashboard-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}.dashboard-title h1{font-family:Outfit,sans-serif;font-size:2.2rem;font-weight:900;color:#0f172a;margin:0 0 .5rem}.dashboard-title p{color:#64748b;font-size:.95rem;margin:0;display:flex;align-items:center;gap:8px}.btn-logout{background:#fff;border:1.5px solid #e2e8f0;color:#475569;padding:.6rem 1rem;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}.btn-logout:hover{background:#f8fafc;border-color:#cbd5e1;color:#0f172a}.section-card{background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.06);padding:2rem;margin-bottom:2rem}.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;border-bottom:2px solid #f1f5f9;padding-bottom:1rem}.section-header h2{font-family:Outfit,sans-serif;font-size:1.4rem;color:#0f172a;margin:0}.btn-primary-sm{background:#0ea5e9;color:#fff;padding:.5rem 1rem;border-radius:8px;text-decoration:none;font-weight:600;font-size:.85rem;display:inline-flex;align-items:center;gap:5px;transition:background .2s}.btn-primary-sm:hover{background:#0284c7}.ad-list{display:flex;flex-direction:column;gap:1rem}.ad-item{border:1.5px solid #e2e8f0;border-radius:12px;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s,box-shadow .2s;background:#f8fafc}.ad-item:hover{border-color:#cbd5e1;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.03)}.ad-info h3{margin:0 0 .25rem;font-size:1.05rem;color:#0f172a}.ad-meta{font-size:.82rem;color:#64748b;display:flex;gap:12px;align-items:center}.ad-status{padding:2px 8px;border-radius:20px;font-size:.75rem;font-weight:700}.status-active{background:#dcfce7;color:#166534}.status-closed{background:#f1f5f9;color:#475569}.ad-actions{display:flex;gap:8px}.btn-action{padding:.4rem .8rem;border-radius:6px;font-size:.8rem;font-weight:600;text-decoration:none;border:1.5px solid transparent;transition:all .2s}.btn-view{background:#f1f5f9;color:#334155}.btn-view:hover{background:#e2e8f0}.btn-edit{background:#e0f2fe;color:#0369a1;border-color:#bae6fd}.btn-edit:hover{background:#bae6fd}.empty-state{text-align:center;padding:3rem 1rem;color:#64748b}.empty-state-icon{font-size:2.5rem;margin-bottom:1rem;color:#cbd5e1}.admin-section{display:none;border:2px solid #e2e8f0;background:#f8fafc}.admin-section .section-header h2{color:#334155}#loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#f1f5f9;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:Outfit,sans-serif;color:#64748b}.spinner{width:40px;height:40px;border:4px solid #cbd5e1;border-top-color:#0ea5e9;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}@keyframes spin{to{transform:rotate(360deg)}}@media (max-width:600px){.ad-item{flex-direction:column;align-items:flex-start;gap:1rem}.ad-actions{width:100%;justify-content:flex-start}}</style></head><body><div id="loading-overlay"><div class="spinner"></div><div>Ladataan tietoja...</div></div><nav class="top-nav"><div class="nav-container"><a href="index.html" class="nav-logo"><img src="logo.png" alt="LaukaaInfo Logo"><span>LaukaaInfo</span> </a><button class="hamburger" id="hamburger-btn" aria-label="Avaa valikko"><span></span><span></span><span></span></button></div></nav><div class="sidebar-overlay" id="sidebar-overlay"></div><aside class="sidebar-menu" id="sidebar-menu"><div class="sidebar-header"><a href="index.html" class="nav-logo"><img src="logo.png" alt="LaukaaInfo Logo"><span>LaukaaInfo</span> </a><button class="close-btn" id="close-sidebar-btn">&times;</button></div></aside><main style="padding-top:80px;min-height:80vh"><div class="page-wrap"><div class="dashboard-header"><div class="dashboard-title"><h1>Omat sivut</h1><p><span class="iconify" data-icon="lucide:user"></span> <span id="user-email">...</span></p></div><button class="btn-logout" id="btn-logout"><span class="iconify" data-icon="lucide:log-out"></span> Kirjaudu ulos</button></div><div class="section-card"><div class="section-header"><h2>Omat ilmoitukseni</h2><a href="jata-ilmoitus.html" class="btn-primary-sm"><span class="iconify" data-icon="lucide:plus"></span> Jätä uusi</a></div><div id="my-ads-list" class="ad-list"></div></div><div id="company-admin-section" class="section-card admin-section"><div class="section-header"><h2>Yrityksen ilmoitukset <span style="font-size:.85rem;font-weight:400;color:#64748b">(Ylläpitäjä)</span></h2><a href="jata-ilmoitus.html?company_id=me" id="btn-add-company-ad" class="btn-primary-sm" style="background:#334155"><span class="iconify" data-icon="lucide:building"></span> Jätä yritysilmoitus</a></div><div id="company-ads-list" class="ad-list"></div></div></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.75bd7966.js?v=20260713"></script><script>let currentUser=null,userRoles=[];async function initDashboard(){if(!window.LaukaaAuth)return void alert("Tietokantayhteys puuttuu.");if(currentUser=await window.LaukaaAuth.getUser(),!currentUser)return void(window.location.href="kirjaudu.html");document.getElementById("user-email").textContent=currentUser.email,userRoles=await window.LaukaaAuth.getRoles(),await loadMyAds();const t=userRoles.filter(t=>"company_admin"===t.role_name);t.length>0&&(document.getElementById("company-admin-section").style.display="block",await loadCompanyAds(t.map(t=>t.target_id))),document.getElementById("loading-overlay").style.display="none"}async function loadMyAds(){const t=document.getElementById("my-ads-list");t.innerHTML='<div style="text-align:center; padding:2rem;"><span class="iconify spinner" data-icon="lucide:loader-2"></span></div>';try{const{data:a,error:e}=await window.LaukaaSupabase.from("encounters").select("*").eq("user_id",currentUser.id).order("created_at",{ascending:!1});if(e)throw e;renderAdsList(a,t,"Et ole vielä jättänyt yhtään ilmoitusta.")}catch(a){console.error(a),t.innerHTML='<div class="empty-state">Virhe haettaessa ilmoituksia.</div>'}}async function loadCompanyAds(t){const a=document.getElementById("company-ads-list");try{const e=[];t.forEach(t=>{e.push(t),e.push(`company-${t}`)});const{data:n,error:i}=await window.LaukaaSupabase.from("encounters").select("*").in("company_id",e).order("created_at",{ascending:!1});if(i)throw i;t.length>0&&(document.getElementById("btn-add-company-ad").href=`jata-ilmoitus.html?company_id=${t[0]}`),renderAdsList(n,a,"Yrityksellä ei ole aktiivisia ilmoituksia.")}catch(t){console.error(t)}}function renderAdsList(t,a,e){if(!t||0===t.length)return void(a.innerHTML=`\n                <div class="empty-state">\n                    <div class="iconify empty-state-icon" data-icon="lucide:inbox"></div>\n                    <p>${e}</p>\n                </div>\n            `);let n="";t.forEach(t=>{const a=new Date(t.created_at).toLocaleDateString("fi-FI"),e="active"===t.status,i=e?"status-active":"status-closed",s=e?"Aktiivinen":"Suljettu";n+=`\n                <div class="ad-item">\n                    <div class="ad-info">\n                        <h3>${escapeHtml(t.title)}</h3>\n                        <div class="ad-meta">\n                            <span class="ad-status ${i}">${s}</span>\n                            <span>${a}</span>\n                            ${t.location?`<span>📍 ${escapeHtml(t.location)}</span>`:""}\n                        </div>\n                    </div>\n                    <div class="ad-actions">\n                        <a href="ilmoituskortti.html?id=${t.id}" class="btn-action btn-view" target="_blank">Näytä</a>\n                        <a href="muokkaa-ilmoitus.html?id=${t.id}" class="btn-action btn-edit">Muokkaa</a>\n                    </div>\n                </div>\n            `}),a.innerHTML=n}function escapeHtml(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}document.getElementById("btn-logout").addEventListener("click",async()=>{confirm("Haluatko varmasti kirjautua ulos?")&&(await window.LaukaaAuth.signOut(),window.location.href="kirjaudu.html")}),document.addEventListener("DOMContentLoaded",initDashboard)</script><script src="script.75bd7966.js"></script><script src="nav-sync.75bd7966.js"></script></body></html>
