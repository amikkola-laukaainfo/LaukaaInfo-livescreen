<!DOCTYPE html><html lang="fi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Latauslinkki-generaattori – LaukaaInfo</title><link rel="icon" href="logo.png"><style>:root{--primary-blue:#0056b3;--light-blue:#e1efff;--success-green:#10b981}body{font-family:Inter,sans-serif;background-color:#f4f7f6;margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh}.container{background:#fff;padding:2rem;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.05);max-width:500px;width:100%}h1{color:var(--primary-blue);font-size:1.5rem;margin-bottom:1.5rem;text-align:center}.form-group{margin-bottom:1.5rem}label{display:block;margin-bottom:.5rem;font-weight:600;color:#374151}input[type=text]{width:100%;padding:.8rem;border:1px solid #d1d5db;border-radius:8px;font-size:1rem;box-sizing:border-box}input[type=text]:focus{outline:0;border-color:var(--primary-blue);box-shadow:0 0 0 3px var(--light-blue)}button{width:100%;padding:1rem;background-color:var(--primary-blue);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background-color .2s}button:hover{background-color:#004494}.result-box{margin-top:2rem;padding:1.5rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;display:none}.result-box h3{margin-top:0;font-size:1.1rem;color:#1e293b}.link-display{word-break:break-all;background:#e2e8f0;padding:.8rem;border-radius:6px;font-family:monospace;margin:1rem 0;font-size:.9rem}.copy-btn{background-color:var(--success-green)}.copy-btn:hover{background-color:#059669}</style></head><body><div class="container"><h1>Luo tarjouskuvien latauslinkki</h1><div class="form-group"><label for="yritys-id">Yrityksen ID (esim. numero)</label> <input type="text" id="yritys-id" placeholder="Syötä yrityksen ID tähän..." autocomplete="off"></div><button id="generate-btn">Luo henkilökohtainen linkki</button><div class="result-box" id="result-container"><h3>Valmis linkki yrittäjälle:</h3><p style="font-size:.9rem;color:#64748b">Kopioi alla oleva linkki ja lähetä se asiakkaalle. Vain tällä linkillä hän pääsee muokkaamaan omia kuviaan.</p><div class="link-display" id="generated-link"></div><button class="copy-btn" id="copy-btn">Kopioi linkki leikepöydälle</button></div></div><script>let SECRET_SALT="LaukaaInfo2026!Secret";async function generateToken(e){e=(new TextEncoder).encode(e+SECRET_SALT),e=await crypto.subtle.digest("SHA-256",e);return Array.from(new Uint8Array(e)).map(e=>e.toString(16).padStart(2,"0")).join("").substring(0,8)}document.getElementById("generate-btn").addEventListener("click",async()=>{var t=document.getElementById("yritys-id").value.trim();if(t){var n=await generateToken(t);let e=window.location.href;(e=e.substring(0,e.lastIndexOf("/"))).endsWith("/")||(e+="/");t=`${e}upload.html?yritys=${encodeURIComponent(t)}&token=`+n,n=(document.getElementById("generated-link").textContent=t,document.getElementById("result-container").style.display="block",document.getElementById("copy-btn"));n.textContent="Kopioi linkki leikepöydälle",n.style.backgroundColor="var(--success-green)"}else alert("Syötä ensin yrityksen ID!")}),document.getElementById("copy-btn").addEventListener("click",()=>{var e=document.getElementById("generated-link").textContent;navigator.clipboard.writeText(e).then(()=>{var e=document.getElementById("copy-btn");e.textContent="Kopioitu! ✓",e.style.backgroundColor="#059669"}).catch(e=>{console.error("Kopiointi epäonnistui",e),alert("Kopiointi leikepöydälle epäonnistui. Kopioi linkki manuaalisesti maalaamalla se.")})}),document.getElementById("yritys-id").addEventListener("keypress",function(e){"Enter"===e.key&&document.getElementById("generate-btn").click()})</script></body></html>
