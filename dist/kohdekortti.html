<!DOCTYPE html><html lang="fi"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kohdekortti – LaukaaInfo</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet"><script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script><link rel="stylesheet" href="style.bd39cada.css?v=20260420-2"><style>:root{--primary-blue:#0056b3;--secondary-blue:#003366;--accent-blue:#00a8ff;--light-blue:#f0f7ff;--dark-text:#1a202c;--light-text:#4a5568;--card-shadow:0 4px 20px rgba(0, 0, 0, 0.08);--premium-shadow:0 10px 40px rgba(0, 0, 0, 0.06);--border-radius:24px}body{background-color:#f1f5f9;font-family:Inter,sans-serif}.demo-bar{background:#fff3cd;color:#856404;padding:15px;text-align:center;border-bottom:2px solid #ffeeba;font-weight:700;display:flex;align-items:center;justify-content:center;gap:15px}.demo-bar select{padding:8px 12px;border-radius:8px;border:1px solid #ccc;font-family:inherit}.entity-card-container{max-width:1100px;margin:3rem auto;padding:0 1.5rem}.card-header{display:flex;gap:2rem;align-items:center;background:#fff;padding:3rem;border-radius:var(--border-radius);box-shadow:var(--premium-shadow);margin-bottom:2rem;position:relative;overflow:hidden}.card-header::before{content:'';position:absolute;top:0;left:0;width:100%;height:8px;background:linear-gradient(90deg,#10b981,#3b82f6)}.type-badge{display:inline-block;background:var(--light-blue);color:var(--primary-blue);padding:.5rem 1.25rem;border-radius:50px;font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem;font-family:Outfit,sans-serif}.card-title h1{font-size:3rem;font-family:Outfit,sans-serif;color:var(--secondary-blue);margin:0 0 1rem 0;line-height:1.1}.card-short-desc{font-size:1.25rem;color:var(--light-text);line-height:1.5;margin:0}.card-grid{display:grid;grid-template-columns:2fr 1fr;gap:2rem}.main-section{display:flex;flex-direction:column;gap:2rem}.image-banner{width:100%;height:400px;border-radius:var(--border-radius);object-fit:cover;box-shadow:var(--card-shadow)}.content-box{background:#fff;padding:2.5rem;border-radius:var(--border-radius);box-shadow:var(--premium-shadow)}.content-box h2{font-family:Outfit,sans-serif;font-size:1.8rem;color:var(--secondary-blue);margin-top:0;margin-bottom:1.5rem}.content-box p{font-size:1.1rem;line-height:1.8;color:#2d3748;white-space:pre-wrap}.sidebar{display:flex;flex-direction:column;gap:2rem}.info-panel{background:#fff;padding:2rem;border-radius:var(--border-radius);box-shadow:var(--premium-shadow)}.info-panel h3{font-family:Outfit,sans-serif;margin-top:0;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #f1f5f9}.info-row{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.2rem}.info-row .icon{font-size:1.5rem;color:var(--primary-blue);margin-top:2px}.info-row .details strong{display:block;font-size:.85rem;color:#a0aec0;text-transform:uppercase;margin-bottom:.2rem}.info-row .details a,.info-row .details span{font-size:1.05rem;color:var(--dark-text);text-decoration:none}.tag-container{display:flex;flex-wrap:wrap;gap:.5rem}.tag{background:#e2e8f0;color:#475569;padding:5px 12px;border-radius:20px;font-size:.85rem;font-weight:600}.relation-item{display:flex;align-items:center;gap:1rem;padding:1rem;background:#f8fafc;border-radius:12px;margin-bottom:1rem;border-left:4px solid var(--accent-blue)}.relation-item:last-child{margin-bottom:0}.relation-content{font-size:.95rem}.relation-content .rel-type{font-size:.75rem;color:var(--primary-blue);font-weight:700;text-transform:uppercase;display:block}.specific-fields{background:#f0fdf4;border:1px solid #bbf7d0;padding:1.5rem;border-radius:16px;margin-top:1.5rem}.specific-fields h4{margin-top:0;color:#166534;font-family:Outfit,sans-serif}@media (max-width:768px){.card-grid{grid-template-columns:1fr}}</style></head><body><div class="demo-bar"><span>Katselutila: Kohdekortti Demo</span> <select id="demo-selector"><option value="">Ladataan kohteita...</option></select></div><div class="entity-card-container" id="card-container" style="display:none"><div class="card-header"><div class="card-title"><span class="type-badge" id="el-type">Tyyppi</span><h1 id="el-name">Kohteen Nimi</h1><p class="card-short-desc" id="el-shortdesc">Lyhyt kuvaus kohteesta.</p></div></div><div class="card-grid"><div class="main-section"><img id="el-image" class="image-banner" src="" alt="Kohdekuva" style="display:none"><div class="content-box"><h2>Tietoa kohteesta</h2><p id="el-desc">Koko kuvaus tulee tähän.</p><div id="el-specific-fields" class="specific-fields" style="display:none"></div></div><div class="content-box" id="relations-box" style="display:none"><h2>Verkosto ja Kytkökset</h2><div id="el-relations"></div></div></div><div class="sidebar"><div class="info-panel"><h3>Yhteystiedot ja Sijainti</h3><div class="info-row" id="row-address"><span class="icon iconify" data-icon="mdi:map-marker"></span><div class="details"><strong>Osoite</strong> <span id="el-address">-</span></div></div><div class="info-row" id="row-email"><span class="icon iconify" data-icon="mdi:email"></span><div class="details"><strong>Sähköposti</strong> <a href="#" id="el-email">-</a></div></div><div class="info-row" id="row-phone"><span class="icon iconify" data-icon="mdi:phone"></span><div class="details"><strong>Puhelin</strong> <a href="#" id="el-phone">-</a></div></div><div class="info-row" id="row-website"><span class="icon iconify" data-icon="mdi:web"></span><div class="details"><strong>Verkkosivut</strong> <a href="#" target="_blank" id="el-website">-</a></div></div></div><div class="info-panel"><h3>Profiili ja Luokittelu</h3><div class="tag-container" id="el-tags"></div></div></div></div></div><script>let kohteet=[],suhteet=[];const typeTranslations={event:"Tapahtuma",association:"Yhdistys",service:"Palvelu",product:"Tuote",business:"Yritys",offer:"Tarjous"};async function init(){try{const[e,t,n]=await Promise.all([fetch("kohdekortit/kohteet.json"),fetch("kohdekortit/suhteet.json"),fetch("kohdekortit/tarjoukset.json")]),o=await e.json();suhteet=await t.json();const s=await n.json();kohteet=[...o,...s];const a=document.getElementById("demo-selector");a.innerHTML="",kohteet.forEach(e=>{const t=document.createElement("option");t.value=e.id,t.textContent=`${e.name} (${typeTranslations[e.type]||e.type})`,a.appendChild(t)}),a.addEventListener("change",e=>{renderEntity(e.target.value)});const i=new URLSearchParams(window.location.search).get("id");i&&kohteet.find(e=>e.id===i)?(a.value=i,renderEntity(i)):kohteet.length>0&&renderEntity(kohteet[0].id)}catch(e){console.error("Virhe ladattaessa dataa:",e)}}function renderEntity(e){const t=kohteet.find(t=>t.id===e);if(!t)return;document.getElementById("card-container").style.display="block",document.getElementById("el-type").textContent=typeTranslations[t.type]||t.type,document.getElementById("el-name").textContent=t.name,document.getElementById("el-shortdesc").textContent=t.shortDescription,document.getElementById("el-desc").textContent=t.description;const n=document.getElementById("el-image");t.images&&t.images.length>0?(n.src=t.images[0],n.style.display="block"):n.style.display="none",document.getElementById("el-address").textContent=`${t.location.address||""}, ${t.location.postalCode||""} ${t.location.municipality||""}`;const o=document.getElementById("el-email");t.contact.email?(o.textContent=t.contact.email,o.href=`mailto:${t.contact.email}`,o.parentElement.parentElement.style.display="flex"):o.parentElement.parentElement.style.display="none";const s=document.getElementById("el-phone");t.contact.phone?(s.textContent=t.contact.phone,s.href=`tel:${t.contact.phone}`,s.parentElement.parentElement.style.display="flex"):s.parentElement.parentElement.style.display="none";const a=document.getElementById("el-website");t.contact.website?(a.textContent="Avaa sivusto",a.href=t.contact.website,a.parentElement.parentElement.style.display="flex"):a.parentElement.parentElement.style.display="none";const i=document.getElementById("el-tags");i.innerHTML="";[...t.tags||[],...t.profiles||[]].forEach(e=>{const t=document.createElement("span");t.className="tag",t.textContent=e,i.appendChild(t)});const r=document.getElementById("el-specific-fields");if(r.innerHTML="","event"===t.type&&t.event)r.style.display="block",r.innerHTML=`\n                    <h4>Tapahtuman tiedot</h4>\n                    <p><strong>Aika:</strong> ${new Date(t.event.startDate).toLocaleString("fi-FI")} - ${new Date(t.event.endDate).toLocaleString("fi-FI")}</p>\n                    <p><strong>Järjestäjä:</strong> ${t.event.organizer}</p>\n                    <p><strong>Paikka:</strong> ${t.event.venue}</p>\n                `;else if("association"===t.type&&t.association)r.style.display="block",r.innerHTML=`\n                    <h4>Yhdistyksen tiedot</h4>\n                    <p><strong>Perustettu:</strong> ${t.association.founded}</p>\n                    <p><strong>Puheenjohtaja:</strong> ${t.association.chairperson}</p>\n                    <p><strong>Jäsenyys:</strong> ${t.association.membershipInfo}</p>\n                `;else if("service"===t.type&&t.service)r.style.display="block",r.innerHTML=`\n                    <h4>Palvelun tiedot</h4>\n                    <p><strong>Tarjoaja:</strong> ${t.service.provider}</p>\n                    <p><strong>Hinta/Tieto:</strong> ${t.service.priceInfo}</p>\n                    ${t.service.bookingUrl?`<p><a href="${t.service.bookingUrl}" target="_blank" style="color:var(--primary-blue); font-weight:bold;">Siirry varaukseen &rarr;</a></p>`:""}\n                `;else if("offer"===t.type&&t.offer){r.style.display="block";const e="free"===t.offer.discountType;r.innerHTML=`\n                    <h4>Tarjouksen tiedot</h4>\n                    <p><strong>Edun tyyppi:</strong> ${e?"Ilmainen kokeilu":t.offer.discountValue+" % alennus"}</p>\n                    ${t.offer.couponCode?`<p><strong>Alennuskoodi:</strong> <span style="background:var(--primary-blue); color:white; padding:2px 8px; border-radius:4px; font-family:monospace;">${t.offer.couponCode}</span></p>`:""}\n                    <p><strong>Voimassa:</strong> ${t.offer.validUntil}</p>\n                `}else r.style.display="none";const l=document.getElementById("relations-box"),c=document.getElementById("el-relations");c.innerHTML="";const d=suhteet.filter(e=>e.sourceId===t.id||e.targetId===t.id);d.length>0?(l.style.display="block",d.forEach(e=>{const n=e.sourceId===t.id,o=n?e.targetType:e.sourceType,s=n?e.targetId:e.sourceId,a=document.createElement("div");a.className="relation-item",a.innerHTML=`\n                        <span class="icon iconify" data-icon="mdi:link-variant" style="font-size: 1.5rem; color: #94a3b8;"></span>\n                        <div class="relation-content">\n                            <span class="rel-type">${e.relationType} (${typeTranslations[o]||o})</span>\n                            <span>${e.description}</span>\n                            ${s.startsWith("yritys_")?'<br><span style="font-size:0.85rem; color:#64748b;">(Viittaa yrityskorttiin)</span>':`<br><a href="?id=${s}" style="font-size:0.85rem; color:var(--primary-blue);">Tarkastele kohdetta</a>`}\n                        </div>\n                    `,c.appendChild(a)})):l.style.display="none"}window.addEventListener("DOMContentLoaded",init)</script></body></html>
