<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yritysfeed | Selaa Laukaan yrityksiä</title>
    <meta name="description" content="Selaa Laukaan paikallisia yrityksiä feed-tyylisesti. Löydä uusia toimijoita ja palveluita läheltäsi.">
    <link rel="icon" href="../logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #0056b3; --secondary-blue: #007bff; --accent: #ff6b6b;
            --bg-light: #f5f7fb; --card-bg: #ffffff; --text-dark: #1a2a3a;
            --text-muted: #6c757d; --border-light: #e9ecef;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 12px 30px rgba(0,0,0,0.12);
            --radius-md: 16px; --radius-sm: 12px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); line-height: 1.5; }
        .feed-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white; padding: 2rem 1.5rem; text-align: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 2rem;
        }
        .feed-header h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .feed-header p { font-size: 1rem; opacity: 0.9; max-width: 500px; margin: 0 auto; }
        .stats-bar { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1rem; font-size: 0.85rem; opacity: 0.85; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 1rem 3rem; }
        .feed-grid { display: flex; flex-direction: column; gap: 1.25rem; }
        .company-card {
            background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden;
            box-shadow: var(--shadow-md); transition: all 0.25s ease; cursor: pointer;
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            border: 1px solid var(--border-light);
        }
        .company-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--secondary-blue); }
        .card-media {
            background: linear-gradient(135deg, #f0f4fa 0%, #e8edf5 100%);
            padding: 1.5rem; display: flex; align-items: center; justify-content: center; min-height: 120px;
        }
        .company-logo { max-width: 100px; max-height: 80px; object-fit: contain; }
        .category-icon { font-size: 3rem; }
        .card-content { padding: 1.25rem; flex: 1; }
        .company-name { font-size: 1.2rem; font-weight: 700; color: var(--primary-blue); margin-bottom: 0.5rem; line-height: 1.3; }
        .company-category {
            display: inline-block; background: #e8f0fe; color: var(--primary-blue);
            font-size: 0.7rem; font-weight: 600; padding: 0.25rem 0.75rem;
            border-radius: 20px; margin-bottom: 0.75rem;
        }
        .company-slogan {
            font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .company-meta { display: flex; align-items: center; gap: 0.75rem; font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap; }
        .company-location { display: flex; align-items: center; gap: 4px; }
        .company-badge { background: #f0fdf4; color: #15803d; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .load-more-container { text-align: center; margin-top: 2rem; padding: 1rem; }
        .load-more-btn {
            background: white; border: 2px solid var(--primary-blue); color: var(--primary-blue);
            padding: 0.85rem 2rem; border-radius: 50px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .load-more-btn:hover { background: var(--primary-blue); color: white; transform: translateY(-2px); }
        .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .skeleton-card { background: white; border-radius: var(--radius-md); padding: 1rem; display: flex; gap: 1rem; box-shadow: var(--shadow-sm); }
        .skeleton-img {
            width: 80px; height: 80px; background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
            background-size: 200% 100%; border-radius: 12px; animation: shimmer 1.2s infinite;
        }
        .skeleton-text { flex: 1; }
        .skeleton-text div {
            height: 16px; background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
            background-size: 200% 100%; border-radius: 8px; margin-bottom: 10px; animation: shimmer 1.2s infinite;
        }
        .skeleton-text div:last-child { width: 60%; margin-bottom: 0; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .empty-state { text-align: center; padding: 4rem 2rem; background: white; border-radius: var(--radius-md); }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 1rem; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 1.5rem; color: var(--primary-blue); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
        footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border-light); margin-top: 2rem; }
        .loading-text { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 1rem; }
    </style>
</head>
<body>
    <div class="feed-header">
        <h1>📱 Yritysfeed</h1>
        <p>Selaa Laukaan paikallisia yrityksiä – löydä uusia suosikkeja!</p>
        <div class="stats-bar">
            <span>🔄 Päivittyy satunnaisesti</span>
            <span>🏢 Paikallisia toimijoita</span>
        </div>
    </div>
    <div class="container">
        <a href="../index.html" class="back-link">← Takaisin etusivulle</a>
        <div id="feed-container" class="feed-grid"></div>
        <div class="load-more-container">
            <button id="load-more-btn" class="load-more-btn">🔄 Lataa lisää yrityksiä</button>
        </div>
    </div>
    <footer><p>© 2026 LaukaaInfo – Paikalliset yritykset kootusti</p></footer>

    <script>
        // HAETAAN TIEDOSTO SAMASTA PALVELIMESTA - EI CORS-ONGELMAA
        // Tiedosto sijaitsee sivuston juuressa, tämä sivu on /feed/-kansiossa
        var JSON_URL = '../companies_data.json';
        
        var kaikkiYritykset = [];
        var naytettavatYritykset = [];
        var latausKaynnissa = false;
        var nykyinenSivu = 0;
        var YRITYKSIA_PER_SIVU = 20;

        // Kategoria-ikonit
        var kategoriaIkonit = {
            'Ravintolat ja kahvilat': '🍽️', 'Majoitus': '🏨', 'Hyvinvointi ja terveys': '💆',
            'Terveyspalvelut': '🏥', 'Rakentaminen ja remontointi': '🔨', 'Kodin ja talon huolto': '🏠',
            'Autopalvelut': '🚗', 'Myymälät ja kauppa': '🛍️', 'Tapahtumat ja viihde': '🎉',
            'Kulttuuri ja taide': '🎨', 'Liikunta ja ulkoilu': '🏃', 'Koulutus ja valmennus': '📚',
            'Digitaaliset palvelut': '💻', 'Siivous ja kiinteistöhuolto': '🧹', 'Logistiikka ja kuljetus': '🚚',
            'Auto ja kuljetus': '🚗', 'Elintarvikkeet': '🍎', 'default': '🏢'
        };

        function haeKategoriaIkon(kategoria) {
            if (!kategoria) return kategoriaIkonit.default;
            for (var avain in kategoriaIkonit) {
                if (kategoria.toLowerCase().indexOf(avain.toLowerCase()) !== -1) return kategoriaIkonit[avain];
            }
            return kategoriaIkonit.default;
        }

        function sekoitaTaulukko(arr) {
            var sekoitettu = arr.slice();
            for (var i = sekoitettu.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var vaihto = sekoitettu[i];
                sekoitettu[i] = sekoitettu[j];
                sekoitettu[j] = vaihto;
            }
            return sekoitettu;
        }

        // Hae yritykset JSON-tiedostosta
        async function lataaYritykset() {
            try {
                console.log('Haetaan yrityksiä polusta:', JSON_URL);
                var vastaus = await fetch(JSON_URL + '?aika=' + Date.now());
                
                if (!vastaus.ok) {
                    throw new Error('HTTP-virhe: ' + vastaus.status);
                }
                
                var data = await vastaus.json();
                console.log('JSON ladattu, tyyppi:', typeof data);
                
                // Etsitään yritystaulukko
                var yritykset = null;
                if (data.results && Array.isArray(data.results)) {
                    yritykset = data.results;
                    console.log('Löytyi results-taulu, pituus:', yritykset.length);
                } else if (Array.isArray(data)) {
                    yritykset = data;
                    console.log('Data on suoraan taulu, pituus:', yritykset.length);
                } else {
                    // Tarkistetaan kaikki kentät
                    for (var avain in data) {
                        if (Array.isArray(data[avain]) && data[avain].length > 0 && data[avain][0] && data[avain][0].nimi) {
                            yritykset = data[avain];
                            console.log('Löytyi taulukko avaimesta "' + avain + '", pituus:', yritykset.length);
                            break;
                        }
                    }
                }
                
                if (!yritykset || yritykset.length === 0) {
                    console.error('Yrityksiä ei löytynyt');
                    return [];
                }
                
                // Suodatetaan pois testiyritykset
                var suodatetut = yritykset.filter(function(y) {
                    if (!y.nimi) return false;
                    var nimi = y.nimi.toLowerCase();
                    var kuvaus = (y.mainoslause || y.esittely || '').toLowerCase();
                    if (nimi.indexOf('testi') !== -1) return false;
                    if (kuvaus.indexOf('(demo)') !== -1 || kuvaus.indexOf('demo)') !== -1) return false;
                    return true;
                });
                
                console.log('Suodatuksen jälkeen:', suodatetut.length, 'yritystä');
                return suodatetut;
                
            } catch (virhe) {
                console.error('JSON-haku epäonnistui:', virhe);
                return [];
            }
        }

        function piirraYrityskortti(yritys) {
            var nimi = yritys.nimi || 'Nimetön yritys';
            var kategoria = yritys.kategoria || 'Palveluyritys';
            var kuvaus = yritys.mainoslause || yritys.esittely || 'Tutustu yritykseen ja sen palveluihin.';
            var sijainti = yritys.alue || yritys.alue_slug || yritys.kaupunki || 'Laukaa';
            var logo = (yritys.logo && yritys.logo !== '-' && yritys.logo !== '') ? yritys.logo : null;
            var ikoni = haeKategoriaIkon(kategoria);
            
            // Lyhennetään kuvausta tarvittaessa
            if (kuvaus.length > 120) kuvaus = kuvaus.substring(0, 120) + '...';
            
            // Onko premium?
            var onPremium = (yritys.tyyppi === 'maksu' || yritys.tyyppi === 'premium' || yritys.paketti === 'premium' || yritys.package === 'premium');
            
            // Tehdään URL
            var polku = '';
            if (yritys.slug && yritys.slug.length > 2) {
                polku = '../yritys/' + yritys.slug + '.html';
            } else if (yritys.id) {
                polku = '../yrityskortti.html?id=' + encodeURIComponent(yritys.id);
            } else {
                // Tehdään slug nimestä
                var slug = nimi.toLowerCase().replace(/[äå]/g, 'a').replace(/ö/g, 'o').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                polku = '../yritys/' + slug + '.html';
            }
            
            var mediaHtml = logo ? 
                '<img src="' + logo + '" alt="' + nimi.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '" class="company-logo" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div class=\"category-icon\">' + ikoni + '</div>\'">' : 
                '<div class="category-icon">' + ikoni + '</div>';
            
            var premiumBadge = onPremium ? '<span class="company-badge">⭐ Premium</span>' : '';
            
            return '<a href="' + polku + '" class="company-card">' +
                '<div class="card-media">' + mediaHtml + '</div>' +
                '<div class="card-content">' +
                    '<div class="company-name">' + nimi.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
                    '<div class="company-category">' + kategoria.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
                    '<div class="company-slogan">' + kuvaus.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
                    '<div class="company-meta"><span class="company-location">📍 ' + sijainti.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>' + premiumBadge + '</div>' +
                '</div>' +
            '</a>';
        }

        function naytaSeuraavaSivu() {
            var container = document.getElementById('feed-container');
            var nappi = document.getElementById('load-more-btn');
            
            if (latausKaynnissa) return;
            
            if (!naytettavatYritykset || naytettavatYritykset.length === 0) {
                if (container) container.innerHTML = '<div class="empty-state"><span>🏢</span><p>Yrityksiä ei löytynyt.</p></div>';
                if (nappi) nappi.style.display = 'none';
                return;
            }
            
            var alku = nykyinenSivu;
            var loppu = Math.min(alku + YRITYKSIA_PER_SIVU, naytettavatYritykset.length);
            var eraLisa = naytettavatYritykset.slice(alku, loppu);
            
            if (eraLisa.length === 0) {
                if (nappi) {
                    nappi.disabled = true;
                    nappi.innerHTML = '✨ Kaikki yritykset näytetty ✨';
                }
                return;
            }
            
            // Ensimmäisellä sivulla tyhjennetään container
            if (nykyinenSivu === 0 && container) {
                container.innerHTML = '';
            }
            
            // Lisätään yrityskortit
            for (var i = 0; i < eraLisa.length; i++) {
                if (container) {
                    container.insertAdjacentHTML('beforeend', piirraYrityskortti(eraLisa[i]));
                }
            }
            
            nykyinenSivu = loppu;
            
            if (nappi) {
                if (nykyinenSivu >= naytettavatYritykset.length) {
                    nappi.disabled = true;
                    nappi.innerHTML = '✨ Kaikki ' + naytettavatYritykset.length + ' yritystä näytetty ✨';
                } else {
                    nappi.innerHTML = '🔄 Lataa lisää (' + (naytettavatYritykset.length - nykyinenSivu) + ' jäljellä)';
                    nappi.disabled = false;
                }
            }
        }

        async function kaynnistaFeed() {
            var container = document.getElementById('feed-container');
            var nappi = document.getElementById('load-more-btn');
            
            latausKaynnissa = true;
            if (nappi) {
                nappi.disabled = true;
                nappi.innerHTML = '⏳ Ladataan...';
            }
            
            if (container) {
                container.innerHTML = '<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div></div><div></div><div></div></div></div>' +
                                      '<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div></div><div></div><div></div></div></div>' +
                                      '<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div></div><div></div><div></div></div></div>';
            }
            
            var raakaData = await lataaYritykset();
            
            if (!raakaData || raakaData.length === 0) {
                if (container) {
                    container.innerHTML = '<div class="empty-state"><span>⚠️</span><p>Yrityksiä ei ladattu. Tarkista että <strong>companies_data.json</strong> löytyy sivuston juuresta.</p><p style="font-size:0.8rem;margin-top:1rem;">Haettu polku: ' + JSON_URL + '</p></div>';
                }
                if (nappi) nappi.style.display = 'none';
                latausKaynnissa = false;
                return;
            }
            
            kaikkiYritykset = raakaData;
            naytettavatYritykset = sekoitaTaulukko(kaikkiYritykset);
            nykyinenSivu = 0;
            
            naytaSeuraavaSivu();
            
            latausKaynnissa = false;
            if (nappi) {
                nappi.disabled = (nykyinenSivu >= naytettavatYritykset.length);
                nappi.style.display = 'inline-flex';
            }
        }
        
        // Latausnapin toiminto
        var latausNappi = document.getElementById('load-more-btn');
        if (latausNappi) {
            var uusiNappi = latausNappi.cloneNode(true);
            latausNappi.parentNode.replaceChild(uusiNappi, latausNappi);
            uusiNappi.addEventListener('click', function() {
                if (!latausKaynnissa) naytaSeuraavaSivu();
            });
        }
        
        // Käynnistä
        kaynnistaFeed();
    </script>
</body>
</html>
