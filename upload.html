<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lataa tarjouskuva – LaukaaInfo</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        .upload-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .btn-upload {
            display: inline-block;
            margin: 1rem;
            padding: 1rem 2rem;
            background: var(--primary-blue, #0056b3);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
        }

        #status-message {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 10px;
            display: none;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>

<body>
    <div class="upload-container" id="main-content">
        <h1>Päivitä tarjouskuvat</h1>
        <p id="company-name-display"></p>

        <div id="upload-buttons" style="display: none;">
            <button id="upload-widget-1" class="btn-upload">Lataa tarjouskuva 1</button>
            <button id="upload-widget-2" class="btn-upload">Lataa tarjouskuva 2</button>
        </div>

        <div id="status-message"></div>
    </div>

    <script>
        // Security: Simple token-based access control
        // For production, these tokens should ideally be generated or stored more securely
        const VALID_TOKENS = {
            'test-yritys': 'secret123',
            'mediazoo': 'mz2026',
            'demo': 'demo'
            // Add more companies and tokens here or fetch from an API
        };

        const params = new URLSearchParams(window.location.search);
        const yritysId = params.get('yritys');
        const token = params.get('token');

        const statusElem = document.getElementById('status-message');
        const buttonsElem = document.getElementById('upload-buttons');

        function showMessage(msg, type) {
            statusElem.textContent = msg;
            statusElem.className = type;
            statusElem.style.display = 'block';
        }

        // Validate Access
        if (!yritysId || !token) {
            showMessage('Virheellinen URL. Puuttuvat parametrit.', 'error');
        } else if (VALID_TOKENS[yritysId] !== token) {
            showMessage('Ei käyttöoikeutta. Token on virheellinen.', 'error');
        } else {
            // Authorized
            buttonsElem.style.display = 'block';
            document.getElementById('company-name-display').textContent = `Yritys: ${yritysId}`;

            setupWidget(1, "upload-widget-1");
            setupWidget(2, "upload-widget-2");
        }

        function setupWidget(index, buttonId) {
            const myWidget = cloudinary.createUploadWidget({
                cloudName: 'dfigif5il',
                uploadPreset: 'tarjoukset_unsigned',
                publicId: `tarjoukset/${yritysId}/${index}`,
                overwrite: true,
                resourceType: 'image',
                clientAllowedFormats: ['jpg', 'png', 'webp', 'jpeg'],
                maxFileSize: 5000000, // 5MB limit
                sources: ['local', 'camera'],
                language: 'fi',
                text: {
                    "fi": {
                        "menu": {
                            "files": "Omat tiedostot",
                            "camera": "Kamera"
                        },
                        "local": {
                            "browse": "Selaa tiedostoja",
                            "dd_title_single": "Vedä kuva tähän"
                        }
                    }
                }
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    console.log('Done! Here is the image info: ', result.info);
                    showMessage(`Kuva ${index} päivitetty onnistuneesti!`, 'success');
                }
            });

            document.getElementById(buttonId).addEventListener("click", function () {
                myWidget.open();
            }, false);
        }
    </script>
</body>

</html>
