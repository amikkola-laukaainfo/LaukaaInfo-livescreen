<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lataa tarjouskuva – LaukaaInfo</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        .upload-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .btn-upload {
            display: inline-block;
            margin: 1rem;
            padding: 1rem 2rem;
            background: var(--primary-blue, #0056b3);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
        }

        #status-message {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 10px;
            display: none;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>

<body>
    <div class="upload-container" id="main-content">
        <h1>Päivitä tarjouskuvat</h1>
        <p id="company-name-display"></p>

        <div id="upload-buttons" style="display: none;">
            <button id="upload-widget-1" class="btn-upload">Lataa tarjouskuva 1</button>
            <button id="upload-widget-2" class="btn-upload">Lataa tarjouskuva 2</button>
        </div>

        <div id="status-message"></div>
    </div>

    <script>
        // Configuration: Change this 'SECRET_SALT' to something unique and keep it secret!
        const SECRET_SALT = 'LaukaaInfo2026!Secret'; 

        async function validateToken(id, token) {
            // Check legacy hardcoded tokens first (for compatibility)
            const legacy = { '2': 'mz2026', 'demo': 'demo' };
            if (legacy[id] === token) return true;

            // Generate expected token: first 8 chars of SHA-256(id + salt)
            const encoder = new TextEncoder();
            const data = encoder.encode(id + SECRET_SALT);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            return hashHex.substring(0, 8) === token;
        }

        const params = new URLSearchParams(window.location.search);
        const yritysId = params.get('yritys');
        const token = params.get('token');

        const statusElem = document.getElementById('status-message');
        const buttonsElem = document.getElementById('upload-buttons');

        function showMessage(msg, type) {
            statusElem.textContent = msg;
            statusElem.className = type;
            statusElem.style.display = 'block';
        }

        // Validate Access
        async function init() {
            if (!yritysId || !token) {
                showMessage('Virheellinen URL. Puuttuvat parametrit.', 'error');
                return;
            }
            
            const isValid = await validateToken(yritysId, token);
            
            if (!isValid) {
                showMessage('Ei käyttöoikeutta. Token on virheellinen.', 'error');
            } else {
                // Authorized
                buttonsElem.style.display = 'block';
                document.getElementById('company-name-display').textContent = `Yritys: ${yritysId}`;

                setupWidget(1, "upload-widget-1");
                setupWidget(2, "upload-widget-2");
            }
        }

        init();

        async function setupWidget(index, buttonId) {
            const button = document.getElementById(buttonId);

            button.addEventListener("click", async function () {
                try {
                    button.disabled = true;
                    button.textContent = 'Valmistellaan...';

                    // 1. Get signature from PHP backend
                    const signRes = await fetch(`cloudinary-sign.php?yritys=${yritysId}&token=${token}&slot=${index}`);
                    if (!signRes.ok) throw new Error('Allekirjoituksen haku epäonnistui');

                    const data = await signRes.json();
                    console.log('Signature Data:', data);

                    if (data.error) throw new Error(data.error);
                    if (!data.signature) throw new Error('Palvelin ei palauttanut allekirjoitusta.');

                    // 2. Open signed widget
                    cloudinary.openUploadWidget({
                        cloudName: data.cloudName,
                        apiKey: data.apiKey,
                        uploadPreset: data.uploadPreset,
                        publicId: data.publicId,
                        timestamp: data.timestamp,
                        signature: data.signature,
                        resourceType: 'image',
                        multiple: false,
                        sources: ['local', 'camera'],
                        clientAllowedFormats: ['jpg', 'png', 'webp', 'jpeg'],
                        maxFileSize: 5000000,
                        language: 'fi',
                        text: {
                            "fi": {
                                "menu": { "files": "Omat tiedostot", "camera": "Kamera" },
                                "local": { "browse": "Selaa tiedostoja", "dd_title_single": "Vedä kuva tähän" }
                            }
                        }
                    }, (error, result) => {
                        button.disabled = false;
                        button.textContent = `Lataa tarjouskuva ${index}`;

                        if (!error && result && result.event === "success") {
                            console.log('Done! Image info: ', result.info);
                            showMessage(`Kuva ${index} päivitetty onnistuneesti!`, 'success');
                            // Optional: pre-cache bust notification if needed
                        } else if (error) {
                            console.error('Upload Error:', error);
                            // Stringify error object if it's not a string
                            const errorMsg = typeof error === 'object' ? JSON.stringify(error) : error;
                            showMessage('Virhe lähetyksessä: ' + errorMsg, 'error');
                        }
                    });
                } catch (err) {
                    console.error('Setup Error:', err);
                    showMessage('Virhe valmistelussa: ' + err.message, 'error');
                    button.disabled = false;
                    button.textContent = `Lataa tarjouskuva ${index}`;
                }
            }, false);
        }
    </script>
</body>

</html>
