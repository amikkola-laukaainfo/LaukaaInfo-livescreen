<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="network_map_title">Semanttinen Verkostokartta | LaukaaInfo</title>
    <link rel="icon" href="logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=20260512">
    <link rel="stylesheet" href="modal.css">
    <link rel="stylesheet" href="verkostokartta.css">

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script src="translations.js?v=20260512"></script>
</head>
<body>

    <div id="loader">
        <div class="loader-spinner"></div>
        <p data-i18n="loading_network">Ladataan verkostoa...</p>
    </div>

    <main id="network-container">
        <a href="palveluverkostot.html" class="back-link">
            <span>&larr;</span> <span data-i18n="btn_back">Takaisin</span>
        </a>

        <div class="legend">
            <div class="legend-item"><span class="dot group"></span> <span data-i18n="legend_group">Pääkategoria</span></div>
            <div class="legend-item"><span class="dot intent"></span> <span data-i18n="legend_intent">Tunniste</span></div>
            <div class="legend-item"><span class="dot company"></span> <span data-i18n="legend_company">Yritys</span></div>
        </div>

        <div id="cy"></div>

        <div class="network-controls">
            <button class="control-btn" id="zoom-in" title="Lähennä">+</button>
            <button class="control-btn" id="zoom-out" title="Loitonna">-</button>
            <button class="control-btn" id="fit-view" title="Sovita näyttöön">⛶</button>
            <button class="control-btn" id="refresh-layout" title="Järjestä uudelleen">↺</button>
        </div>

        <aside class="network-sidebar">
            <div class="sidebar-header">
                <h2 data-i18n="explore_network">Tutki verkostoa</h2>
                <p style="font-size: 0.85rem; color: #64748b; margin-top: 4px;" data-i18n="network_help">Valitse kohteita rakentaaksesi verkoston.</p>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-section">
                    <h3 data-i18n="header_categories">Kategoriat</h3>
                    <div id="category-list" class="selection-list">
                        <!-- Categories populated via JS -->
                    </div>
                </div>

                <div class="sidebar-section" id="intent-section" style="display: none;">
                    <h3 data-i18n="header_tags">Tunnisteet</h3>
                    <div id="intent-list" class="selection-list">
                        <!-- Intents populated via JS -->
                    </div>
                </div>

                <div class="sidebar-section" id="company-section" style="display: none;">
                    <h3 data-i18n="header_companies">Yritykset</h3>
                    <div id="company-list" class="selection-list">
                        <!-- Companies populated via JS -->
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Modal structure for company details -->
    <div id="company-modal" class="lki-modal-overlay">
        <!-- Reusing modal.js logic -->
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="modal.js"></script>
    <script src="verkostokartta.js"></script>
</body>
</html>
