<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Generator – LaukaaInfo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gen-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-blue, #0056b3);
        }
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            display: none;
        }
        .url-text {
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            background: #fff;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin: 10px 0;
            display: block;
        }
        .btn-copy {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="gen-container">
        <h1>Linkkigeneraattori</h1>
        <p>Luo suojattu latauslinkki yritykselle.</p>

        <div class="form-group">
            <label>Secret Salt (Sama kuin upload.html:ssä)</label>
            <input type="text" id="salt" value="LaukaaInfo2026!Secret" placeholder="Syötä suola...">
        </div>

        <div class="form-group">
            <label>Yrityksen ID (Vain numero, esim. 2)</label>
            <input type="number" id="yritys-id" placeholder="Esim. 25">
        </div>

        <button onclick="generateLink()" class="btn-primary" style="width: 100%;">Luo linkki</button>

        <div id="result" class="result-box">
            <label>Valmis linkki:</label>
            <span id="final-url" class="url-text"></span>
            <button onclick="copyToClipboard()" class="btn-copy">Kopioi linkki</button>
        </div>
    </div>

    <script>
        async function generateLink() {
            const id = document.getElementById('yritys-id').value;
            const salt = document.getElementById('salt').value;
            
            if (!id || !salt) {
                alert('Täytä molemmat kentät!');
                return;
            }

            // SHA-256 Hash
            const encoder = new TextEncoder();
            const data = encoder.encode(id + salt);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            const token = hashHex.substring(0, 8);
            
            // Get base URL
            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            const finalUrl = `${baseUrl}upload.html?yritys=${id}&token=${token}`;
            
            document.getElementById('final-url').textContent = finalUrl;
            document.getElementById('result').style.display = 'block';
        }

        function copyToClipboard() {
            const text = document.getElementById('final-url').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Linkki kopioitu leikepöydälle!');
            });
        }
    </script>
</body>
</html>
