<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palveluohjaus | LaukaaInfo</title>
    <link rel="icon" href="logo.png">

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=20260426">
    <style>
        .palvelu-hero {
            background: linear-gradient(135deg, var(--secondary-blue) 0%, var(--primary-blue) 100%);
            color: white;
            padding: 4rem 1.5rem;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: 3rem;
        }

        .palvelu-hero h1 {
            font-family: var(--accent-font);
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .palvelu-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        #results-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }


        .back-nav {
            max-width: 1200px;
            margin: 2rem auto 0;
            padding: 0 1.5rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 700;
            transition: transform 0.2s;
        }

        .btn-back:hover {
            transform: translateX(-5px);
        }
        
        /* Multi-select styles */
        .option-checkbox {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 1.2rem;
            background: white;
            border-radius: 16px;
            border: 2px solid #eef2f6;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-weight: 600;
        }

        .option-checkbox:hover {
            border-color: var(--primary-blue);
            background: #f8fafc;
        }

        .option-checkbox input {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .option-checkbox.selected {
            background: #e0f2fe;
            border-color: var(--primary-blue);
        }

        .group-title {
            grid-column: 1 / -1;
            font-family: var(--accent-font);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin: 3rem 0 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #eef2f6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-title:first-child {
            margin-top: 0;
        }

        .btn-continue {
            margin-top: 2rem;
            width: 100%;
            max-width: 300px;
        }

        /* Step transition animation */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        
        /* Selection Summary */
        .selection-summary {
            max-width: 800px;
            margin: 0 auto 2rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .summary-tag {
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            color: var(--secondary-blue);
            font-weight: 600;
        }

        .next-steps-section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 32px;
            border: 2px dashed #cbd5e1;
        }

        .next-steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .next-step-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .next-step-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-blue);
        }

        .match-explanation {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 8px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Location Bar Styles */
        .location-bar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .location-bar input {
            background: transparent;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            width: 180px;
            outline: none;
        }

        .location-bar input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .location-bar .btn-locate {
            background: white;
            color: var(--primary-blue);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            font-size: 1.2rem;
        }

        .location-bar .btn-locate:hover {
            transform: scale(1.1);
        }

        #location-status {
            font-size: 0.75rem;
            margin-top: 8px;
            opacity: 0.8;
            min-height: 1.2em;
        }

        /* Interactive Categorization Styles */
        .selected-anchor {
            border: 3px solid var(--primary-blue) !important;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 102, 204, 0.3) !important;
            transition: all 0.3s ease;
        }

        .btn-select-anchor {
            display: inline-block;
            margin: 10px;
            padding: 8px 16px;
            background: #e0f2fe;
            color: var(--primary-blue);
            font-weight: 700;
            border-radius: 8px;
            border: 1px solid var(--primary-blue);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.85rem;
            width: calc(100% - 20px);
        }

        .btn-select-anchor:hover {
            background: var(--primary-blue);
            color: white;
        }
        
        .selected-anchor .btn-select-anchor {
            background: var(--primary-blue);
            color: white;
        }

        /* Print styles */
        @media print {
            .top-nav, .palvelu-hero, .btn-back, .step-progress, 
            .selection-summary, .next-steps-section, footer, 
            .btn-radar, .card-arrow, .dist-badge {
                display: none !important;
            }
            
            body {
                background: white;
                color: black;
                padding: 0;
            }

            main {
                margin: 0;
                padding: 20px;
            }

            .group-title {
                border-bottom: 1px solid #ccc;
                margin-top: 20px;
                color: black;
            }

            .company-result-card {
                border: 1px solid #eee;
                break-inside: avoid;
                margin-bottom: 15px;
                box-shadow: none;
            }
            
            .solution-package {
                box-shadow: none;
                border: 1px solid #ccc;
                margin-bottom: 40px;
                break-inside: avoid;
            }
        }
        /* Card Actions */
        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eef2f6;
        }
        .card-actions.has-three {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .btn-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 5px;
            background: #f8fafc;
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary-blue);
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-action:hover {
            background: #e0f2fe;
            border-color: var(--primary-blue);
        }
        .btn-action.primary-action {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        .btn-action.primary-action:hover {
            background: var(--secondary-blue);
        }
        .btn-action i {
            font-size: 1.1rem;
            font-style: normal;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }
        .inquiry-modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
        }
        .inquiry-modal h2 {
            margin-top: 0;
            color: var(--primary-blue);
            font-family: var(--accent-font);
        }
        .close-modal {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: #64748b;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; box-sizing: border-box;
        }

        /* Show more button styles */
        .show-more-container {
            grid-column: 1 / -1;
            text-align: center;
            margin: 20px 0 40px;
            padding-top: 10px;
        }

        .btn-show-more {
            background: white;
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-show-more:hover {
            background: var(--primary-blue);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 102, 204, 0.2);
        }

        .btn-show-more i {
            font-style: normal;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="LaukaaInfo Logo">
                <span>LaukaaInfo</span>
            </a>
        </div>
    </nav>

    <div class="back-nav">
        <a href="index.html" class="btn-back">&larr; Takaisin etusivulle</a>
    </div>

    <header id="palvelu-header" class="palvelu-hero">
        <div class="icon-large" id="hero-icon" style="font-size: 4rem; margin-bottom: 1rem;"></div>
        <h1 id="hero-title">Ladataan...</h1>
        <p id="hero-desc"></p>
        
        <div class="location-bar">
            <span>📍</span>
            <input type="text" id="user-location-input" placeholder="Sijaintisi (esim. Laukaa)" autocomplete="off">
            <button class="btn-locate" id="locate-me-btn" title="Hae sijaintini">🎯</button>
        </div>
        <div id="location-status"></div>
    </header>

    <main>
        <section id="step-section" class="step-container">
            <div id="selection-summary" class="selection-summary" style="display: none;"></div>
            <div class="step-progress" id="step-progress"></div>
            <div id="step-content" class="fade-in">
                <!-- Dynaaminen sisältö -->
            </div>
        </section>

        <section id="results-container" style="display: none;">
            <div class="need-header">
                <h2>Suositellut palvelut</h2>
                <p id="results-count"></p>
            </div>
            <div id="results-list" class="results-grid">
                <!-- Tulokset ladataan tästän -->
            </div>

            <div id="next-steps-container" class="next-steps-section" style="display: none;">
                <h3 style="text-align: center; font-family: var(--accent-font); font-size: 1.5rem;">Seuraavaksi saatat tarvita myös näitä:</h3>
                <div id="next-steps-list" class="next-steps-grid"></div>
            </div>

            <div id="tips-container" style="max-width: 1200px; margin: 3rem auto; display: none;"></div>
            
            <div style="text-align: center; margin-top: 4rem; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                <button onclick="resetPalvelu()" class="btn-radar" style="background: var(--secondary-blue);">Aloita alusta</button>
                <button onclick="printResults()" class="btn-radar" style="background: var(--primary-blue);">Tulosta PDF / Paperille 🖨️</button>
            </div>
        </section>
    </main>

    <!-- Inquiry Modal -->
    <div id="inquiry-overlay" class="modal-overlay">
        <div class="inquiry-modal">
            <button class="close-modal" onclick="closeInquiryModal()">&times;</button>
            <h2 id="inquiry-title">Pyydä tarjous</h2>
            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">LaukaaInfo Venuu-tyylinen demo. Oikeassa versiossa tämä lähettää tiedot suoraan yritykselle.</p>
            <form id="inquiry-form" onsubmit="submitInquiry(event)">
                <input type="hidden" id="inquiry-company-id">

                    <label>Nimi</label>
                    <input type="text" required placeholder="Matti Meikäläinen">
                </div>
                <div class="form-group">
                    <label>Sähköposti</label>
                    <input type="email" required placeholder="matti@esimerkki.fi">
                </div>
                <div class="form-group">
                    <label>Puhelin</label>
                    <input type="tel" placeholder="040 123 4567">
                </div>
                <div class="form-group">
                    <label>Tilaisuuden ajankohta</label>
                    <input type="date" required>
                </div>
                <div class="form-group">
                    <label>Arvioitu henkilömäärä</label>
                    <input type="number" min="1" placeholder="Esim. 50">
                </div>
                <div class="form-group">
                    <label>Lisätiedot</label>
                    <textarea rows="4" placeholder="Kerro tarkemmin tarpeistasi..."></textarea>
                </div>
                <button type="submit" class="btn-radar" style="width: 100%; background: var(--primary-blue);">Lähetä tarjouspyyntö</button>
            </form>
        </div>
    </div>

    <footer style="margin-top: 6rem;">
        <div class="footer-content">
            <p>© 2026 LaukaaInfo – Palvelua ylläpitää Mediazoo.fi</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="needs_config.js"></script>
    <script src="script.js"></script>
    <script>
        let currentNeedId = new URLSearchParams(window.location.search).get('id');
        let currentStepIndex = 0;
        let selections = {};
        let filteredCompanies = [];

        async function initPalvelu() {
            console.log("initPalvelu started. currentNeedId:", currentNeedId);
            
            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            if (!config) {
                console.error("NEEDS_CONFIG not found!");
                return;
            }

            const need = config[currentNeedId];
            if (!need) {
                console.warn("Need not found in config:", currentNeedId);
                // window.location.href = 'index.html'; 
                return;
            }

            console.log("Found need:", need.title);
            document.getElementById('hero-title').textContent = need.title;
            document.getElementById('hero-desc').textContent = need.description;
            document.getElementById('hero-icon').textContent = need.icon;
            document.title = `${need.title} | LaukaaInfo`;

            // Ladataan yritysdata jos sitä ei vielä ole
            try {
                // Odota että script.js on ladannut loadCompanyData-funktion
                let retries = 0;
                const maxRetries = 15;
                while (typeof loadCompanyData !== 'function' && retries < maxRetries) {
                    console.log("Waiting for loadCompanyData... retry:", retries);
                    await new Promise(r => setTimeout(r, 400));
                    retries++;
                }

                if (typeof loadCompanyData === 'function') {
                    // Käytetään window-etuliitettä selvyyden vuoksi
                    if (!window.allCompanies || window.allCompanies.length === 0) {
                        console.log("allCompanies is empty, starting loadCompanyData...");
                        await loadCompanyData();
                    }
                } else {
                    console.warn("loadCompanyData is still not available, trying to proceed anyway...");
                }
                
                console.log("Companies check:", (window.allCompanies) ? window.allCompanies.length : 'null/undefined');
            } catch (e) {
                console.error("Error loading companies in initPalvelu:", e);
            }

            const filterProfiling = new URLSearchParams(window.location.search).get('filter_profiling');
            if (filterProfiling) {
                showResults();
            } else {
                renderStep();
            }
        }

        function renderStep() {
            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            const need = config[currentNeedId];
            if (!need || !need.steps) return;
            
            const step = need.steps[currentStepIndex];
            
            if (!step) {
                console.error("Step not found at index:", currentStepIndex);
                return;
            }

            const content = document.getElementById('step-content');
            const progress = document.getElementById('step-progress');

            // Render summary
            updateSelectionSummary();

            // Render progress
            progress.innerHTML = '';
            need.steps.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${i === currentStepIndex ? 'active' : ''}`;
                progress.appendChild(dot);
            });

            // Render step content
            if (step.multiple) {
                content.innerHTML = `
                    <div class="step-header">
                        <h2>${step.question}</h2>
                        <p>Voit valita useamman vaihtoehdon.</p>
                    </div>
                    <div class="step-options" style="grid-template-columns: 1fr;">
                        ${step.options.map((opt, i) => `
                            <label class="option-checkbox ${selections[step.id]?.some(s => s.label === opt.label) ? 'selected' : ''}" id="label-${i}">
                                <input type="checkbox" onchange="toggleOption(${i})" ${selections[step.id]?.some(s => s.label === opt.label) ? 'checked' : ''}>
                                ${opt.label}
                            </label>
                        `).join('')}
                    </div>
                    <div style="text-align: center;">
                        <button class="btn-radar btn-continue" onclick="nextStep()" style="background: var(--primary-blue);">Jatka &raquo;</button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="step-header">
                        <h2>${step.question}</h2>
                    </div>
                    <div class="step-options">
                        ${step.options.map((opt, i) => `
                            <button class="option-btn" onclick="selectOption(${i})">
                                ${opt.label}
                                <span>&rarr;</span>
                            </button>
                        `).join('')}
                    </div>
                `;
            }
            
            content.classList.remove('fade-in');
            void content.offsetWidth; // Trigger reflow
            content.classList.add('fade-in');
        }

        function updateSelectionSummary() {
            const summaryEl = document.getElementById('selection-summary');
            const summaryTags = [];
            
            for (let stepId in selections) {
                if (stepId.startsWith('_')) continue;
                const val = selections[stepId];
                if (Array.isArray(val)) {
                    val.forEach(v => summaryTags.push(v.label));
                } else if (val && val.label) {
                    summaryTags.push(val.label);
                }
            }

            if (summaryTags.length > 0) {
                summaryEl.innerHTML = summaryTags.map(tag => `<span class="summary-tag">${tag}</span>`).join('');
                summaryEl.style.display = 'flex';
            } else {
                summaryEl.style.display = 'none';
            }
        }

        function toggleOption(optionIndex) {
            const need = NEEDS_CONFIG[currentNeedId];
            const step = need.steps[currentStepIndex];
            const option = step.options[optionIndex];
            
            if (!selections[step.id]) selections[step.id] = [];
            
            const idx = selections[step.id].findIndex(s => s.label === option.label);
            if (idx > -1) {
                selections[step.id].splice(idx, 1);
                document.getElementById(`label-${optionIndex}`).classList.remove('selected');
            } else {
                selections[step.id].push(option);
                document.getElementById(`label-${optionIndex}`).classList.add('selected');
            }
        }

        function selectOption(optionIndex) {
            const need = NEEDS_CONFIG[currentNeedId];
            const step = need.steps[currentStepIndex];
            const option = step.options[optionIndex];

            selections[step.id] = option;
            
            // Tallenneteaan sub_context jos se on määritelty (TASO 2)
            if (option.sub_context) {
                if (!selections._sub_contexts) selections._sub_contexts = [];
                if (!selections._sub_contexts.includes(option.sub_context)) {
                    selections._sub_contexts.push(option.sub_context);
                }
            }
            
            nextStep();
        }

        function nextStep() {
            const need = NEEDS_CONFIG[currentNeedId];
            if (currentStepIndex < need.steps.length - 1) {
                currentStepIndex++;
                // Tarkistetaan skipIf — hypytään askel jos ehto täyttyy
                const step = need.steps[currentStepIndex];
                if (step && step.skipIf) {
                    try {
                        // Evaluoidaan skipIf-lauseke turvallisesti
                        const shouldSkip = evaluateSkipIf(step.skipIf);
                        if (shouldSkip) {
                            console.log(`Skipping step '${step.id}': ${step.skipMessage || 'skipIf condition met'}`);
                            showSkipNotice(step.skipMessage);
                            setTimeout(() => nextStep(), 1200);
                            return;
                        }
                    } catch(e) {
                        console.warn('skipIf evaluation failed:', e);
                    }
                }
                renderStep();
            } else {
                showResults();
            }
        }

        // Arvioi skipIf-lauseke tukien loogisia operaattoreita ja profilointitarkistuksia
        function evaluateSkipIf(skipIfStr) {
            if (!skipIfStr) return false;
            
            let evalStr = skipIfStr;
            
            // 1. Korvataan getSelectedCompanyProfilointi-kutsut niiden tuloksilla
            const profilointiRegex = /getSelectedCompanyProfilointi\('([^']+)',\s*'([^']+)',\s*'([^']+)'\)/g;
            evalStr = evalStr.replace(profilointiRegex, (match, stepId, section, field) => {
                return getSelectedCompanyProfilointi(stepId, section, field);
            });

            // 2. Lisätään tuki isSelected('stepId', 'label') -kutsulle
            const selectedRegex = /isSelected\('([^']+)',\s*'([^']+)'\)/g;
            evalStr = evalStr.replace(selectedRegex, (match, stepId, label) => {
                const sel = selections[stepId];
                if (!sel) return false;
                if (Array.isArray(sel)) {
                    return sel.some(s => s.label.toLowerCase().includes(label.toLowerCase()));
                }
                return sel.label.toLowerCase().includes(label.toLowerCase());
            });
            
            // 3. Korvataan selections.stepId-viittaukset (onko jotain valittu kyseisessä stepissä)
            evalStr = evalStr.replace(/selections\.(\w+)/g, (match, stepId) => {
                return !!selections[stepId];
            });

            // 3.5 Lisätään tuki hasNodeLink('stepId', 'nodeId') -kutsulle
            const nodeLinkRegex = /hasNodeLink\('([^']+)',\s*'([^']+)'\)/g;
            evalStr = evalStr.replace(nodeLinkRegex, (match, stepId, nodeId) => {
                return hasSelectedCompanyNodeLink(stepId, nodeId);
            });

            // 4. Suoritetaan looginen arviointi turvallisesti
            try {
                // Sallitaan vain perus-boolean-logiikka
                const safeEval = new Function('return ' + evalStr);
                return safeEval();
            } catch(e) {
                console.warn('evaluateSkipIf failed for:', evalStr, e);
                return false;
            }
        }

        // Hakee valitun yrityksen profilointiarvo tietystä osiosta
        function getSelectedCompanyProfilointi(stepId, section, field) {
            const sel = selections[stepId];
            if (!sel) return false;
            const opt = Array.isArray(sel) ? sel[0] : sel;
            if (!opt || !opt._companyRef) return false;
            return opt._companyRef?.profiling?.[section]?.[field] === true;
        }

        // Tarkistaa onko valitulla yrityksellä tietty node_link
        function hasSelectedCompanyNodeLink(stepId, nodeId) {
            const sel = selections[stepId];
            if (!sel) return false;
            const opt = Array.isArray(sel) ? sel[0] : sel;
            const company = opt._companyRef;
            if (!company || !company.profiling || !company.profiling.core) return false;
            const links = company.profiling.core.node_links || [];
            return links.includes(nodeId);
        }

        // Näytetään lyhyt ilmoitus kun askel hypytään
        function showSkipNotice(message) {
            const content = document.getElementById('step-content');
            if (!message) return;
            content.innerHTML = `
                <div class="step-header fade-in" style="text-align:center;">
                    <div style="font-size:2.5rem;margin-bottom:1rem;">✅</div>
                    <h2 style="color:var(--primary-blue);">${message}</h2>
                    <p style="opacity:0.7;">Jatketaan automaattisesti...</p>
                </div>
            `;
        }

        let currentResultsGroups = []; // Tallennetaan tulokset tulostusta varten

        let matchingGroupsData = [];
        let selectedAnchorCompanyId = null;
        let expandedGroups = {}; // Seuraa mitkä ryhmät on laajennettu
        let globalProfilingKey = '';
        let globalRequestedCapacity = 0;
        let globalRequestedFeatures = {};
        let globalActiveCollaboratorsSet = new Set();

        // Helper to get profiling data correctly (mapping legacy keys to new schema)
        function getCategoryData(c, key) {
            if (!c || !c.profiling) return null;
            const keyMap = {
                'weddings_and_parties': 'events_and_celebrations',
                'corporate_parties_and_events': 'events_and_celebrations',
                'meetings_and_seminars': 'business_events',
                'starting_a_business': 'startup_services',
                'business_growth_and_dev': 'business_growth',
                'construction_and_renovation': 'construction_and_maintenance',
                'housing_companies_and_real_estate': 'housing_company_and_contracts'
            };
            const mappedKey = keyMap[key] || key;
            const underscoreKey = mappedKey.replace(/-/g, '_');
            const hyphenKey = mappedKey.replace(/_/g, '-');
            return c.profiling[underscoreKey] || c.profiling[hyphenKey] || c.profiling[mappedKey] || c.profiling[key];
        }

        function getFitsForScore(c, profilingKey) {
            if (!c || !c.profiling || !c.profiling.core || !c.profiling.core.fits_for) return 0;
            const fits = c.profiling.core.fits_for;
            
            const finnishMap = {
                'events_and_celebrations': 'häät',
                'business_events': 'yritysjuhlat',
                'funerals_and_memorials': 'hautajaiset',
                'startup_services': 'yrityksen perustaminen',
                'business_growth': 'yrityksen kehittäminen'
            };
            
            let score = fits[profilingKey] || fits[profilingKey.replace(/_/g, '-')] || 0;
            
            if (score === 0 && finnishMap[profilingKey]) {
                const finKey = finnishMap[profilingKey];
                score = fits[finKey] || fits[finKey.replace(/ /g, '-')] || 0;
            }
            
            return score;
        }

        // Helper to get all collaborators of a company across all profiling categories
        function getCompanyCollaborators(c) {
            if (!c || !c.profiling) return [];
            let collaborators = [];
            for (let k in c.profiling) {
                if (c.profiling[k] && Array.isArray(c.profiling[k].collaborated_with)) {
                    collaborators = collaborators.concat(c.profiling[k].collaborated_with);
                }
            }
            return collaborators;
        }

        async function showResults() {
            console.log("showResults() active. Selections:", selections);
            currentResultsGroups = [];

            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            const need = config[currentNeedId];
            const activeSteps = need ? need.steps : [];
            
            const stepSection = document.getElementById('step-section');
            const resultsContainer = document.getElementById('results-container');
            const list = document.getElementById('results-list');
            const countEl = document.getElementById('results-count');

            if (stepSection) stepSection.style.display = 'none';
            if (resultsContainer) resultsContainer.style.display = 'block';
            if (list) list.innerHTML = '';
            document.getElementById('next-steps-container').style.display = 'none';

            if (!window.allCompanies || window.allCompanies.length === 0) {
                if (typeof loadCompanyData === 'function') await loadCompanyData();
                if (!window.allCompanies || window.allCompanies.length === 0) {
                    if (countEl) countEl.textContent = "Virhe: Yritystietoja ei voitu ladata.";
                    return;
                }
            }

            let selectedOptions = [];
            for (let stepId in selections) {
                if (stepId.startsWith('_')) continue;
                const val = selections[stepId];
                if (Array.isArray(val)) selectedOptions = selectedOptions.concat(val);
                else if (val && typeof val === 'object') selectedOptions.push(val);
            }

            let filterProfiling = new URLSearchParams(window.location.search).get('filter_profiling');
            if (filterProfiling && selectedOptions.length === 0) {
                selectedOptions.push({ label: "Tarkennettu haku", tags: [] });
            }

            const needToProfilingMap = {
                'haat': 'events_and_celebrations',
                'yritysjuhlat': 'events_and_celebrations',
                'yritystilaisuudet': 'business_events',
                'syntymapaivat': 'events_and_celebrations',
                'muutto': 'moving_and_housing',
                'remontti': 'construction_and_maintenance',
                'mokkipalvelut': 'cottage_services',
                'taloyhtion-huolto': 'housing_company_and_contracts',
                'hautajaiset': 'funerals_and_memorials',
                'yrityksen-perustaminen': 'startup_services',
                'yrityksen-kehittaminen': 'business_growth',
                'terveys-ja-hyvinvointi': 'wellbeing_and_beauty'
            };

            const currentProfilingKey = needToProfilingMap[currentNeedId] || 'vapaa-aika';
            let requestedCapacity = 0;
            const featureOptions = [];

            selectedOptions.forEach(opt => {
                if (opt.capacity_req) requestedCapacity = Math.max(requestedCapacity, opt.capacity_req);
                
                // Lisätään featureOptionseihin jos siinä on merkityksellistä suodatettavaa 
                // (tägejä, node_linkki tai filtteri) - vaikka olisi myös kapasiteettivaatimus.
                if ((opt.tags && opt.tags.length > 0) || opt.node_link || opt.node_links || opt.profilointi_filter) {
                    featureOptions.push(opt);
                }
            });

            if (featureOptions.length === 0 && requestedCapacity > 0) {
                featureOptions.push({ label: "Sopivat tilat", tags: [] });
            }

            const requestedFeatures = {
                sauna: selectedOptions.some(o => o.label?.toLowerCase().includes('sauna')),
                accessible: selectedOptions.some(o => o.label?.toLowerCase().includes('esteetön') || o.label?.toLowerCase().includes('vammais')),
                home_service: selectedOptions.some(o => o.label?.toLowerCase().includes('kotiin') || o.label?.toLowerCase().includes('kotona'))
            };

            globalProfilingKey = currentProfilingKey;
            globalRequestedCapacity = requestedCapacity;
            globalRequestedFeatures = requestedFeatures;

            const allMatchingCompanies = new Set();
            const matchingGroups = [];

            activeSteps.forEach(step => {
                if (step.id.startsWith('_')) return;
                
                // Ohitetaan kapasiteetti-askeleet tulosryhmien luonnissa, koska ne yhdistetään muihin
                if (step.id === 'kapasiteetti' || step.id === 'henkilomaara') return;

                const stepSelection = selections[step.id];
                if (!stepSelection) return;

                const options = Array.isArray(stepSelection) ? stepSelection : [stepSelection];

                options.forEach(opt => {
                    const companiesForOpt = window.allCompanies.filter((c, idx) => {
                        const isMediazoo = (c.id === 'company-2' || c.nimi === 'Mediazoo');
                        const fitsScore = getFitsForScore(c, currentProfilingKey);
                        
                        if (isMediazoo) console.log(`DEBUG: Checking Mediazoo for option "${opt.label}"`, { currentProfilingKey, fitsScore, selections });

                        // Tarkista not_suitable_for: hylkää yritys jos se on merkitty sopimattomaksi tähän hakuun
                        if (c.profiling?.core?.not_suitable_for?.length > 0) {
                            const notSuitable = c.profiling.core.not_suitable_for.map(s => s.toLowerCase());
                            
                            // A. Tarkistus tageilla
                            if (opt.tags && opt.tags.length > 0) {
                                const optTagsLower = opt.tags.map(t => t.toLowerCase());
                                if (optTagsLower.some(tag => notSuitable.includes(tag))) return false;
                            }
                            
                            // B. Tarkistus labelilla (mahdollistaa suoran tekstipohjaisen hylkäyksen)
                            if (opt.label) {
                                const labelLower = opt.label.toLowerCase();
                                if (notSuitable.some(s => labelLower.includes(s))) {
                                    if (isMediazoo) console.log(`DEBUG: Mediazoo excluded by label match in not_suitable_for: "${opt.label}"`);
                                    return false;
                                }
                            }
                        }

                        if (selections._sub_contexts && selections._sub_contexts.length > 0) {
                            // Yritykset joilla ei ole profilointidataa pääsevät läpi tagitarkistukseen
                            if (!c.profiling) {
                                // Ei profilointia — sallitaan, tagitarkistus ratkaisee
                            } else {
                                const companySubContexts = c.profiling?.core?.sub_contexts || [];
                                let isSubContextMatch = false;
                                
                                const underscoreKey = currentProfilingKey.replace(/-/g, '_');
                                const finnishMap = {
                                    'events_and_celebrations': 'häät',
                                    'business_events': 'yritysjuhlat',
                                    'funerals_and_memorials': 'hautajaiset',
                                    'startup_services': 'yrityksen perustaminen',
                                    'business_growth': 'yrityksen kehittäminen'
                                };
                                const finKey = finnishMap[underscoreKey];

                                if (Array.isArray(companySubContexts)) {
                                    if (companySubContexts.length === 0) isSubContextMatch = true;
                                    else isSubContextMatch = selections._sub_contexts.some(sc => companySubContexts.includes(sc));
                                } else if (typeof companySubContexts === 'object' && companySubContexts !== null) {
                                    const relevantSubContexts = companySubContexts[underscoreKey] || companySubContexts[currentProfilingKey] || (finKey ? companySubContexts[finKey] : null);
                                    if (relevantSubContexts) isSubContextMatch = selections._sub_contexts.some(sc => relevantSubContexts.includes(sc));
                                    else isSubContextMatch = true; 
                                } else {
                                    isSubContextMatch = true;
                                }

                                if (!isSubContextMatch) {
                                    // NEW: Pehmeämpi vertailu jos kyseessä on saman pääkontekstin sisäinen haku
                                    const hasCommonBase = selections._sub_contexts.some(sc => {
                                        const scLower = sc.toLowerCase();
                                        // Etsitään yhteisiä sanoja tai alkuosia (hää, yritys, juhla, hautajais)
                                        const bases = ['hää', 'yrity', 'juhla', 'hautaja', 'kokous', 'syntymä'];
                                        return bases.some(b => scLower.includes(b) && companySubContexts.some(csc => csc.toLowerCase().includes(b)));
                                    });
                                    if (hasCommonBase) isSubContextMatch = true;
                                }

                                if (!isSubContextMatch) {
                                    const mainFitsScore = getFitsForScore(c, currentProfilingKey);
                                    const hasAnySubContexts = Array.isArray(companySubContexts) ? companySubContexts.length > 0 : !!companySubContexts;
                                    // Hylätään vain jos yrityksellä ON sub_contexts JA fits_score on korkea (eli se on profiloitu muihin konteksteihin)
                                    // Mutta jos fitsScore on erittäin korkea (>80), sallitaan silti
                                    if (hasAnySubContexts && mainFitsScore >= 70 && mainFitsScore < 80) return false; 
                                }
                            }
                        }

                        if (opt.require_fits_for) {
                            const rfKey = opt.require_fits_for.key;
                            const rfMin = opt.require_fits_for.min || 20;
                            const rfScore = getFitsForScore(c, rfKey);
                            if (rfScore < rfMin) return false;
                        }

                        let isProfiledMatch = false;
                        if (opt.node_link) {
                            const links = c.profiling?.core?.node_links || [];
                            if (links.includes(opt.node_link)) isProfiledMatch = true;
                        }
                        if (opt.node_links) {
                            const links = c.profiling?.core?.node_links || [];
                            if (opt.node_links.some(l => links.includes(l))) isProfiledMatch = true;
                        }

                        if (opt.profilointi_filter) {
                            const pf = opt.profilointi_filter;
                            const catData = getCategoryData(c, pf.section);
                            let match = false;

                            const checkFuzzyMatch = (target, query) => {
                                if (!target || !query) return false;
                                const t = String(target).toLowerCase();
                                const q = String(query).toLowerCase();
                                return t === q || t.includes(q) || q.includes(t);
                            };

                            if (catData) {
                                const actualVal = catData[pf.field];
                                if (Array.isArray(actualVal)) {
                                    match = actualVal.some(v => checkFuzzyMatch(v, pf.value));
                                } else if (typeof actualVal === 'object' && actualVal !== null) {
                                    match = Object.values(actualVal).flat().some(v => checkFuzzyMatch(v, pf.value));
                                } else {
                                    match = checkFuzzyMatch(actualVal, pf.value);
                                }

                                // Automaattinen fallback refinement_tagsiin jos ei matchia
                                if (!match && Array.isArray(catData.refinement_tags)) {
                                    match = catData.refinement_tags.some(v => checkFuzzyMatch(v, pf.value));
                                }
                            }

                            // FALLBACK: Tarkista sub_contexts (Taso 2)
                            if (!match && c.profiling?.core?.sub_contexts) {
                                const subContexts = c.profiling.core.sub_contexts;
                                if (Array.isArray(subContexts)) {
                                    match = subContexts.some(v => checkFuzzyMatch(v, pf.value));
                                } else if (typeof subContexts === 'object' && subContexts !== null) {
                                    match = Object.values(subContexts).flat().some(v => checkFuzzyMatch(v, pf.value));
                                }
                            }

                            if (match) isProfiledMatch = true;
                        }

                        if (!isProfiledMatch && opt.tags) {
                            if (opt.tags.includes('digitointi')) {
                                const catData = getCategoryData(c, currentProfilingKey);
                                if (catData && fitsScore > 0 && Array.isArray(catData.digitization_features) && catData.digitization_features.length > 0) isProfiledMatch = true;
                            }
                            if (opt.tags.includes('juhlatila')) {
                                const catData = getCategoryData(c, 'events_and_celebrations');
                                if (catData && fitsScore > 0 && (catData.capacity_max > 0 || catData.seated_capacity > 0)) isProfiledMatch = true;
                            }
                        }

                        if (isProfiledMatch) return true;

                        const hasVenueTag = (c.tags || '').toLowerCase().includes('juhlatila') || 
                                           (c.kategoria || '').toLowerCase().includes('juhlatila');

                        if (opt.capacity_req > 0 || requestedCapacity > 0) {
                            const cap = getCompanyCapacity(c, currentProfilingKey);
                            if (cap === 0 && !hasVenueTag && opt.capacity_req > 0) return false;
                        }

                        // Jos optiolla ei ole tägejä, node-linkkejä tai suodattimia, se ei saa näyttää "kaikkia" 
                        // paitsi jos se on pelkkä kapasiteettivaatimus
                        if (!opt.tags || opt.tags.length === 0) {
                            if (!opt.node_link && !opt.node_links && !opt.profilointi_filter && opt.capacity_req <= 0) {
                                return false; 
                            }
                            return fitsScore > 10;
                        }

                        // Laajennettu haku: Nimi + Tägit + Kategoria + Profiloinnin sub_contexts + Node_links
                        const companyContent = (
                            (c.tags || '') + ' ' + 
                            (c.kategoria || '') + ' ' + 
                            (c.nimi || '') + ' ' +
                            (c.profiling?.core?.sub_contexts?.join(' ') || '') + ' ' +
                            (c.profiling?.core?.node_links?.join(' ') || '')
                        ).toLowerCase();
                        
                        const tagMatch = opt.tags.some(tag => companyContent.includes(tag.toLowerCase()));
                        
                        if (isMediazoo) console.log(`DEBUG: Mediazoo final match for "${opt.label}": ${tagMatch}`);
                        return tagMatch;
                    });
                    
                    console.log(`Option "${opt.label}" found ${companiesForOpt.length} companies.`);
                    
                    if (companiesForOpt.length > 0) {
                        companiesForOpt.forEach(c => allMatchingCompanies.add(c));
                        matchingGroups.push({ opt, companies: companiesForOpt });
                    }
                });
            });

            // Tallennetaan tilamuuttujiin renderöintiä varten
            matchingGroupsData = matchingGroups;
            selectedAnchorCompanyId = null;
            
            globalActiveCollaboratorsSet = new Set();
            allMatchingCompanies.forEach(c => {
                const partners = getCompanyCollaborators(c);
                partners.forEach(p => globalActiveCollaboratorsSet.add(p));
            });

            renderResultsView();
        }

        function selectAnchor(companyId) {
            if (selectedAnchorCompanyId === companyId) {
                // Poistetaan valinta
                selectedAnchorCompanyId = null;
                // Palautetaan kaikki kumppanit
                globalActiveCollaboratorsSet = new Set();
                matchingGroupsData.forEach(g => {
                    g.companies.forEach(c => {
                        const partners = getCompanyCollaborators(c);
                        partners.forEach(p => globalActiveCollaboratorsSet.add(p));
                    });
                });
            } else {
                // Asetetaan valinta
                selectedAnchorCompanyId = companyId;
                globalActiveCollaboratorsSet = new Set();
                let anchorCompany = null;
                matchingGroupsData.forEach(g => {
                    const found = g.companies.find(c => c.id === companyId);
                    if (found) anchorCompany = found;
                });
                if (anchorCompany) {
                    const partners = getCompanyCollaborators(anchorCompany);
                    partners.forEach(p => globalActiveCollaboratorsSet.add(p));
                    // Lisätään myös ankkuri itse
                    globalActiveCollaboratorsSet.add(anchorCompany.id);
                    globalActiveCollaboratorsSet.add(anchorCompany.nimi);
                }
            }
            renderResultsView();
        }

        function renderResultsView() {
            const list = document.getElementById('results-list');
            const countEl = document.getElementById('results-count');
            const resultsContainer = document.getElementById('results-container');
            currentResultsGroups = [];
            
            if (matchingGroupsData.length === 0) {
                if (countEl) countEl.textContent = "Ei löytynyt sopivia yrityksiä.";
                if (list) list.innerHTML = '<div class="no-results"><h3>Hups!</h3><p>Kokeile eri valintoja.</p></div>';
                return;
            }

            let totalFoundCount = 0;
            let htmlResults = "";

            // Tunnistetaan ensimmäinen ryhmä "ankkuriryhmäksi" (voidaan valita)
            let anchorGroupIndex = 0;
            matchingGroupsData.forEach((group, idx) => {
                if (group.opt.capacity_req > 0 && !(matchingGroupsData[anchorGroupIndex].opt.capacity_req > 0)) {
                    anchorGroupIndex = idx;
                }
            });

            matchingGroupsData.forEach((group, idx) => {
                const opt = group.opt;
                const companiesForOpt = [...group.companies];
                const isAnchorGroup = (idx === anchorGroupIndex);
                
                totalFoundCount += companiesForOpt.length;
                htmlResults += `<div class="group-title"><span>📍</span> ${opt.label}</div>`;

                currentResultsGroups.push({
                    title: opt.label,
                    companies: companiesForOpt
                });

                // Haetaan valitun ankkurin koordinaatit, jos sellainen on ja olemme MUIDEN ryhmien kohdalla
                let anchorLat = null;
                let anchorLon = null;
                if (selectedAnchorCompanyId && !isAnchorGroup) {
                    let anchorCompany = null;
                    matchingGroupsData[anchorGroupIndex].companies.forEach(c => {
                        if (c.id === selectedAnchorCompanyId) anchorCompany = c;
                    });
                    if (anchorCompany && anchorCompany.lat && (anchorCompany.lon || anchorCompany.lng)) {
                        anchorLat = parseFloat(anchorCompany.lat);
                        anchorLon = parseFloat(anchorCompany.lon || anchorCompany.lng);
                    }
                }

                companiesForOpt.sort((a, b) => {
                    let scoreA = getFitsForScore(a, globalProfilingKey);
                    let scoreB = getFitsForScore(b, globalProfilingKey);

                    if (globalActiveCollaboratorsSet.has(a.id) || globalActiveCollaboratorsSet.has(a.nimi)) scoreA += 45;
                    if (globalActiveCollaboratorsSet.has(b.id) || globalActiveCollaboratorsSet.has(b.nimi)) scoreB += 45;

                    if (globalRequestedCapacity > 0) {
                        const capA = getCompanyCapacity(a, globalProfilingKey);
                        const capB = getCompanyCapacity(b, globalProfilingKey);
                        
                        if (capA > 0) {
                            if (capA >= globalRequestedCapacity) {
                                scoreA += 60;
                                if (capA <= globalRequestedCapacity * 2.5) scoreA += 40;
                            } else {
                                scoreA -= 50; 
                            }
                        }

                        if (capB > 0) {
                            if (capB >= globalRequestedCapacity) {
                                scoreB += 60;
                                if (capB <= globalRequestedCapacity * 2.5) scoreB += 40;
                            } else {
                                scoreB -= 50;
                            }
                        }
                    }

                    const dataA = getCategoryData(a, globalProfilingKey);
                    const dataB = getCategoryData(b, globalProfilingKey);
                    if (globalRequestedFeatures.sauna && dataA?.has_sauna) scoreA += 50;
                    if (globalRequestedFeatures.sauna && dataB?.has_sauna) scoreB += 50;
                    if (globalRequestedFeatures.accessible && dataA?.is_accessible) scoreA += 50;
                    if (globalRequestedFeatures.accessible && dataB?.is_accessible) scoreB += 50;
                    if (globalRequestedFeatures.home_service && a.profiling?.core?.home_service) scoreA += 50;
                    if (globalRequestedFeatures.home_service && b.profiling?.core?.home_service) scoreB += 50;

                    // Etäisyyslaskenta (Ankkuri TAI Käyttäjä)
                    let distA = Infinity;
                    let distB = Infinity;
                    let hasLocation = false;

                    if (anchorLat !== null && anchorLon !== null) {
                        distA = getHaversineDistance(anchorLat, anchorLon, parseFloat(a.lat), parseFloat(a.lon || a.lng));
                        distB = getHaversineDistance(anchorLat, anchorLon, parseFloat(b.lat), parseFloat(b.lon || b.lng));
                        hasLocation = true;
                    } else {
                        const userCoordsRaw = localStorage.getItem('userCoords');
                        if (userCoordsRaw) {
                            try {
                                const u = JSON.parse(userCoordsRaw);
                                distA = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(a.lat), parseFloat(a.lon || a.lng));
                                distB = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(b.lat), parseFloat(b.lon || b.lng));
                                hasLocation = true;
                            } catch(e) {}
                        }
                    }

                    // "Lähin ensin" periaate - jos sijainti tiedetään ja kummallakin on validi etäisyys
                    if (hasLocation && !isNaN(distA) && !isNaN(distB)) {
                        // Jos etäisyysero on yli 500 metriä, lajitellaan etäisyyden mukaan.
                        // Näin lähin on varmasti ensimmäisenä.
                        if (Math.abs(distA - distB) > 0.5) {
                            return distA - distB;
                        }
                        // Jos ovat hyvin lähekkäin (alle 500m toisistaan), annetaan premiumille ja pisteille painoarvoa
                        if (distA < distB) scoreA += 10;
                        else if (distB < distA) scoreB += 10;
                    } else if (hasLocation) {
                        // Jos toisella ei ole sijaintia määritetty, näytetään se, jolla on sijainti, ensin
                        if (!isNaN(distA) && isNaN(distB)) return -1;
                        if (isNaN(distA) && !isNaN(distB)) return 1;
                    }

                    if (scoreA !== scoreB) return scoreB - scoreA;
                    
                    const aIsPremium = (a.paketti || a.tyyppi || '').toLowerCase().match(/premium|pro/);
                    const bIsPremium = (b.paketti || b.tyyppi || '').toLowerCase().match(/premium|pro/);
                    if (aIsPremium && !bIsPremium) return -1;
                    if (!aIsPremium && bIsPremium) return 1;

                    return 0;
                });

                // Rajoitetaan näytettävien määrää (max 9 ellei laajennettu)
                const groupId = opt.id || opt.label;
                const isExpanded = expandedGroups[groupId];
                const visibleCompanies = isExpanded ? companiesForOpt : companiesForOpt.slice(0, 9);
                const hasMore = companiesForOpt.length > 9;

                currentResultsGroups.push({
                    title: opt.label,
                    companies: visibleCompanies
                });

                visibleCompanies.forEach(c => {
                    let anchorCoords = null;
                    if (anchorLat !== null && anchorLon !== null) anchorCoords = { lat: anchorLat, lng: anchorLon };
                    const isSelected = (selectedAnchorCompanyId === c.id);
                    let cardHtml = renderCompanyCard(c, globalRequestedCapacity, globalProfilingKey, globalActiveCollaboratorsSet, anchorCoords, isAnchorGroup, isSelected);
                    htmlResults += cardHtml;
                });

                if (hasMore && !isExpanded) {
                    htmlResults += `
                        <div class="show-more-container">
                            <button class="btn-show-more" onclick="toggleGroupExpansion('${groupId.replace(/'/g, "\\'")}')">
                                <i>➕</i><span>Näytä lisää (${companiesForOpt.length - 9} kohdetta)</span>
                            </button>
                        </div>
                    `;
                }
            });

            if (totalFoundCount === 0) {
                if (countEl) countEl.textContent = "Ei löytynyt sopivia yrityksiä.";
                if (list) list.innerHTML = '<div class="no-results"><h3>Hups!</h3><p>Kokeile eri valintoja.</p></div>';
            } else {
                if (countEl) countEl.textContent = `Löysimme ${totalFoundCount} ehdotusta.`;
                if (list) list.innerHTML = htmlResults;
                renderNextSteps(globalProfilingKey);
                renderTips(currentNeedId);
            }
            // Vältetään selauksen hyppäämistä ylimmäs renderöinnin yhteydessä, ellei tämä ole ensimmäinen lataus
            // Jos valitaan ankkuri, käyttäjä todennäköisesti haluaa pysyä samassa kohdassa
        }

        function toggleGroupExpansion(groupId) {
            expandedGroups[groupId] = true;
            renderResultsView();
        }

        function renderNextSteps(context) {
            const nextStepsContainer = document.getElementById('next-steps-container');
            const nextStepsList = document.getElementById('next-steps-list');
            const recommendations = new Set();
            const topCompanies = window.allCompanies.filter(c => (c.profiling?.core?.fits_for?.[context] || 0) >= 70);

            topCompanies.forEach(c => {
                const paired = c.profiling?.core?.paired_with_by_context?.[context] || [];
                paired.forEach(p => recommendations.add(p));
            });

            if (recommendations.size > 0) {
                nextStepsContainer.style.display = 'block';
                nextStepsList.innerHTML = Array.from(recommendations).map(rec => `
                    <div class="next-step-card" onclick="searchNextStep('${rec}')">
                        <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">🔍</div>
                        <div style="font-weight: 700; color: var(--primary-blue);">${rec}</div>
                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">Etsi palveluntarjoajia</div>
                    </div>
                `).join('');
            }
        }

        function searchNextStep(query) {
            window.location.href = `asiahaku.html?haku=${encodeURIComponent(query)}`;
        }

        function renderTips(needId) {
            const tipsContainer = document.getElementById('tips-container');
            if (!tipsContainer) return;
            tipsContainer.innerHTML = '';

            const themeTips = {
                'haat': ['sauna', 'hyvinvointi'],
                'yritysjuhlat': ['sauna', 'menokohteet-jyvas'],
                'yritystilaisuudet': ['sauna', 'menokohteet-jyvas'],
                'syntymapaivat': ['sauna'],
                'mokkipalvelut': ['sauna', 'menokohteet-jyvas'],
                'terveys-ja-hyvinvointi': ['hyvinvointi']
            };

            const tipsFiles = themeTips[needId];
            if (!tipsFiles || tipsFiles.length === 0) {
                tipsContainer.style.display = 'none';
                return;
            }

            const tipsQuery = tipsFiles.join(',');
            const iframeUrl = `vinkit/pienetvinkit.html?files=${tipsQuery}&limit=3`;

            tipsContainer.innerHTML = `<iframe src="${iframeUrl}" style="width: 100%; border: none; min-height: 250px; overflow: hidden;" id="tips-iframe" scrolling="no"></iframe>`;
            tipsContainer.style.display = 'block';

            if (!window.tipsIframeListenerAdded) {
                window.addEventListener('message', function(e) {
                    if (e.data && e.data.type === 'resizeTipsIframe') {
                        const iframe = document.getElementById('tips-iframe');
                        if (iframe) {
                            iframe.style.height = e.data.height + 'px';
                        }
                    }
                });
                window.tipsIframeListenerAdded = true;
            }
        }

        function getCompanyCapacity(c, profilingKey) {
            const data = getCategoryData(c, profilingKey);
            if (!data) return 0;
            return data.capacity_max || 
                   data.meeting_capacity || 
                   data.seminar_capacity || 
                   data.seated_capacity || 
                   data.memorial_service_capacity || 
                   data.outdoor_capacity || 
                   data.catering_max_capacity || 0;
        }

        function renderCompanyCard(c, requestedCapacity, profilingKey, collaboratorsSet, anchorCoords = null, isAnchorGroup = false, isSelected = false) {
            const slug = typeof slugify === 'function' ? slugify(c.nimi) : c.nimi.toLowerCase().replace(/\s+/g, '-');
            const isPremium = (c.paketti || c.tyyppi || '').toLowerCase().match(/premium|pro/);
            const cardUrl = isPremium ? `yritys/${slug}.html` : `yrityskortti.html?id=${slug}`;
            const icons = window.categoryIcons || {};
            const icon = icons[c.kategoria] || '🏢';

            let badges = '';
            let isTopMatch = (getFitsForScore(c, profilingKey) >= 80);
            let isPartner = collaboratorsSet && (collaboratorsSet.has(c.id) || collaboratorsSet.has(c.nimi));
            let capacityNote = '';
            let distanceHtml = '';

            if (anchorCoords && c.lat && (c.lon || c.lng)) {
                const dist = getHaversineDistance(anchorCoords.lat, anchorCoords.lng, parseFloat(c.lat), parseFloat(c.lon || c.lng));
                const distStr = dist < 1 ? `${Math.round(dist * 1000)} m` : `${dist.toFixed(1)} km`;
                distanceHtml = `<div class="dist-badge" style="background:#1e40af;color:white;">📍 ${distStr} valitusta tilasta</div>`;
            } else {
                const userCoordsRaw = localStorage.getItem('userCoords');
                if (userCoordsRaw && c.lat && (c.lon || c.lng)) {
                    try {
                        const u = JSON.parse(userCoordsRaw);
                        const dist = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(c.lat), parseFloat(c.lon || c.lng));
                        const distStr = dist < 1 ? `${Math.round(dist * 1000)} m` : `${dist.toFixed(1)} km`;
                        distanceHtml = `<div class="dist-badge">🚗 ${distStr}</div>`;
                    } catch(e) {}
                }
            }

            if (c.profiling) {
                const core = c.profiling.core || {};
                if (requestedCapacity > 0) {
                    const cap = getCompanyCapacity(c, profilingKey);
                    if (cap > 0) {
                        if (cap >= requestedCapacity) capacityNote = `<div style="font-size:0.85rem; color:#16a34a; font-weight:700; margin-bottom:10px;">✅ Sopii: max n. ${cap} hlö</div>`;
                        else capacityNote = `<div style="font-size:0.85rem; color:#d97706; font-weight:700; margin-bottom:10px;">⚠️ Huom: Tilaan mahtuu n. ${cap} hlö</div>`;
                    }
                }
                const catData = getCategoryData(c, profilingKey);
                if (catData?.is_accessible) badges += '<span title="Esteetön pääsy">♿</span>';
                if (catData?.has_sauna) badges += '<span title="Sauna saatavilla">🧖</span>';
                if (core.home_service) badges += '<span title="Kotipalvelu">🏠</span>';
                if (core.emergency_available) badges += '<span title="Päivystys">🚨</span>';
            }

            const btnAnchorText = isSelected ? 'Poista valinta' : 'Valitse kohde';
            const actionGridClass = isAnchorGroup ? 'card-actions has-three' : 'card-actions';

            let actionHtml = `<div class="${actionGridClass}">
                <button type="button" class="btn-action primary-action" onclick="event.preventDefault(); event.stopPropagation(); openInquiryModal('${c.id}', '${c.nimi.replace(/'/g, "\\'")}')">
                    <i>✉️</i><span>Lähetä kysely</span>
                </button>
                <a href="${cardUrl}" class="btn-action">
                    <i>📄</i><span>Avaa yrityskortti</span>
                </a>`;
                
            if (isAnchorGroup) {
                actionHtml += `
                <button type="button" class="btn-action ${isSelected ? 'primary-action' : ''}" onclick="event.preventDefault(); event.stopPropagation(); selectAnchor('${c.id}')">
                    <i>🎯</i><span>${btnAnchorText}</span>
                </button>`;
            }
            actionHtml += `</div>`;

            let wrapperClass = isSelected ? 'company-result-card selected-anchor' : 'company-result-card';

            const addressLower = (c.osoite || '').toLowerCase();
            const isLaukaa = addressLower.includes('laukaa') || 
                             addressLower.includes('lievestuore') || 
                             addressLower.includes('vihtavuori') || 
                             addressLower.includes('leppävesi') || 
                             addressLower.includes('vehniä') ||
                             (c.alue_slug && c.alue_slug.length > 0);

            const fallbackSlogan = isLaukaa ? 'Paikallinen palveluntarjoaja Laukaassa.' : 'Palveluntarjoaja LaukaaInfo-verkostossa.';

            return `
                <div class="${wrapperClass} ${isTopMatch ? 'top-match' : ''} ${isPartner ? 'partner-boost' : ''}">
                    ${isPartner ? '<div class="result-badge badge-partner">YHTEISTYÖKUMPPANI</div>' : ''}
                    ${isTopMatch && !isPartner ? '<div class="result-badge badge-top">TOP MATCH</div>' : ''}
                    ${isPremium && !isTopMatch && !isPartner ? '<div class="result-badge badge-premium">PREMIUM</div>' : ''}
                    <div class="result-icon">${icon}</div>
                    <h3>${c.nimi}</h3>
                    <div class="slogan">${c.mainoslause || (c.esittely ? c.esittely.substring(0, 100) + '...' : fallbackSlogan)}</div>
                    ${capacityNote}
                    <div class="card-meta">${distanceHtml}<div class="feature-badges">${badges}</div></div>
                    <div class="match-explanation">${getMatchExplanation(c, requestedCapacity, profilingKey)}</div>
                    ${actionHtml}
                </div>
            `;
        }

        function getHaversineDistance(lat1, lon1, lat2, lon2) {
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return 6371 * c; // Distance in km
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        function getMatchExplanation(c, requestedCapacity, profilingKey) {
            const reasons = [];
            if (c.profiling) {
                const core = c.profiling.core || {};
                const fits = core.fits_for || {};
                
                // Taso 1: Pääkontekstin soveltuvuus
                if (fits[profilingKey] >= 80) reasons.push("Pääasiallinen palvelualue");
                else if (fits[profilingKey] >= 40) reasons.push("Sopii hyvin tilaisuuteen");

                // Taso 2: Sub-context match (Erikoistuminen)
                if (selections._sub_contexts && selections._sub_contexts.length > 0) {
                    const companySubContexts = core.sub_contexts || [];
                    let isSubMatch = false;
                    if (Array.isArray(companySubContexts)) {
                        isSubMatch = selections._sub_contexts.some(sc => companySubContexts.includes(sc));
                    } else if (typeof companySubContexts === 'object' && companySubContexts !== null) {
                        // Tarkistetaan kaikki objektin avaimet
                        const allSubContexts = Object.values(companySubContexts).flat();
                        isSubMatch = selections._sub_contexts.some(sc => allSubContexts.includes(sc));
                    }
                    
                    if (isSubMatch) {
                        reasons.push("Erikoistunut tähän tarpeeseen");
                    }
                }

                // Taso 3: Kapasiteetti ja ominaisuudet
                if (requestedCapacity > 0) {
                    const cap = getCompanyCapacity(c, profilingKey);
                    if (cap >= requestedCapacity) reasons.push("Kapasiteetti riittää");
                }

                const events = c.profiling.events_and_celebrations || {};
                if (events.is_accessible && selections.palvelut?.some(s => s.label?.toLowerCase()?.includes('esteetön'))) reasons.push("Esteetön tila");
                if (events.has_sauna && selections.palvelut?.some(s => s.label?.toLowerCase()?.includes('sauna'))) reasons.push("Saunatilat");
            }

            if (reasons.length === 0) return "Sopii annettuihin kriteereihin";
            // Palautetaan enintään kaksi parasta perustelua
            return reasons.slice(0, 2).join(" • ");
        }

        function resetPalvelu() {
            currentStepIndex = 0;
            selections = {};
            document.getElementById('step-section').style.display = 'block';
            document.getElementById('results-container').style.display = 'none';
            renderStep();
        }

        function initUserLocation() {
            const locationInput = document.getElementById('user-location-input');
            const locateMeBtn = document.getElementById('locate-me-btn');
            const statusEl = document.getElementById('location-status');

            if (!locationInput) return;

            // Palauta tallennettu sijainti
            const savedName = localStorage.getItem('userLocationName');
            const savedCoordsRaw = localStorage.getItem('userCoords');

            if (savedName) locationInput.value = savedName;
            
            // Jos tuli URL-parametrina (esim. etusivulta)
            const urlParams = new URLSearchParams(window.location.search);
            const urlLat = urlParams.get('lat');
            const urlLon = urlParams.get('lon');
            const urlLoc = urlParams.get('loc');

            if (urlLat && urlLon) {
                const coords = { lat: parseFloat(urlLat), lng: parseFloat(urlLon) };
                localStorage.setItem('userCoords', JSON.stringify(coords));
                if (urlLoc) {
                    localStorage.setItem('userLocationName', urlLoc);
                    locationInput.value = urlLoc;
                }
                window.userCoords = coords;
            } else if (savedCoordsRaw) {
                try {
                    window.userCoords = JSON.parse(savedCoordsRaw);
                } catch(e) {}
            }

            // Enter-painikkeen tuki tekstikentälle (helpottaa manuaalista hakua)
            locationInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    locationInput.blur(); // Laukaisee change-tapahtuman automaattisesti
                }
            });

            // Kuuntele manuaalista syöttöä (yksinkertainen paikkahaku tai pelkkä tallennus)
            locationInput.addEventListener('change', async () => {
                const val = locationInput.value.trim();
                if (!val) {
                    localStorage.removeItem('userCoords');
                    localStorage.removeItem('userLocationName');
                    window.userCoords = null;
                    if (document.getElementById('results-container').style.display !== 'none') showResults();
                    return;
                }

                localStorage.setItem('userLocationName', val);
                statusEl.textContent = "Haetaan koordinaatteja...";

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val + ', Laukaa')}&limit=1`);
                    const data = await response.json();
                    if (data && data.length > 0) {
                        const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                        localStorage.setItem('userCoords', JSON.stringify(coords));
                        window.userCoords = coords;
                        statusEl.textContent = "Sijainti päivitetty ✅";
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    } else {
                        statusEl.textContent = "Sijaintia ei löytynyt. Kokeile tarkempaa osoitetta.";
                    }
                } catch(e) {
                    statusEl.textContent = "Virhe sijainnin haussa.";
                }
            });

            if (locateMeBtn) {
                locateMeBtn.addEventListener('click', () => {
                    if (!navigator.geolocation) {
                        statusEl.textContent = "Selaimesi ei tue sijaintia.";
                        return;
                    }

                    statusEl.textContent = "Paikannetaan...";
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        window.userCoords = coords;
                        localStorage.setItem('userCoords', JSON.stringify(coords));

                        // Hae osoite käänteisellä geokoodauksella
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lng}`);
                            const data = await res.json();
                            const name = data.display_name.split(',')[0] || "Oma sijainti";
                            locationInput.value = name;
                            localStorage.setItem('userLocationName', name);
                            statusEl.textContent = "Sijainti päivitetty ✅";
                        } catch(e) {
                            locationInput.value = "Oma sijainti";
                            statusEl.textContent = "Sijainti päivitetty ✅";
                        }
                        
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    }, () => {
                        statusEl.textContent = "Sijainnin haku epäonnistui.";
                    });
                });
            }
        }

            html += `

                    </div>
                    <div class="no-print" style="margin-top: 30px; text-align: center;">
                        <button onclick="window.print()" style="padding: 10px 20px; background: #1e40af; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Tulosta nyt</button>
                    </div>
                </body>
                </html>
            `;

            printWindow.document.write(html);
            printWindow.document.close();
        }
        function openInquiryModal(id, name) {
            document.getElementById('inquiry-company-id').value = id;
            document.getElementById('inquiry-title').textContent = 'Pyydä tarjous: ' + name;
            document.getElementById('inquiry-overlay').classList.add('active');
        }

            document.getElementById('inquiry-overlay').classList.remove('active');

        function submitInquiry(e) {
            e.preventDefault();
            alert("Kiitos! Tarjouspyyntö on lähetetty (demo). Oikeassa versiossa tämä tieto menisi suoraan palveluntarjoajalle.");
            closeInquiryModal();
            document.getElementById('inquiry-form').reset();
        }

        // Käynnistys
        document.addEventListener('DOMContentLoaded', () => {
            initPalvelu();
            initUserLocation();
        });
    </script>
