        function initUserLocation() {
            const locationInput = document.getElementById('user-location-input');
            const locateMeBtn = document.getElementById('locate-me-btn');
            const statusEl = document.getElementById('location-status');

            if (!locationInput) return;

            // Palauta tallennettu sijainti
            const savedName = localStorage.getItem('userLocationName');
            const savedCoordsRaw = localStorage.getItem('userCoords');

            if (savedName) locationInput.value = savedName;
            
            // Jos tuli URL-parametrina (esim. etusivulta)
            const urlParams = new URLSearchParams(window.location.search);
            const urlLat = urlParams.get('lat');
            const urlLon = urlParams.get('lon');
            const urlLoc = urlParams.get('loc');

            if (urlLat && urlLon) {
                const coords = { lat: parseFloat(urlLat), lng: parseFloat(urlLon) };
                localStorage.setItem('userCoords', JSON.stringify(coords));
                if (urlLoc) {
                    localStorage.setItem('userLocationName', urlLoc);
                    locationInput.value = urlLoc;
                }
                window.userCoords = coords;
            } else if (savedCoordsRaw) {
                try {
                    window.userCoords = JSON.parse(savedCoordsRaw);
                } catch(e) {}
            }

            // Enter-painikkeen tuki tekstikentälle (helpottaa manuaalista hakua)
            locationInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    locationInput.blur(); // Laukaisee change-tapahtuman automaattisesti
                }
            });

            // Kuuntele manuaalista syöttöä (yksinkertainen paikkahaku tai pelkkä tallennus)
            locationInput.addEventListener('change', async () => {
                const val = locationInput.value.trim();
                if (!val) {
                    localStorage.removeItem('userCoords');
                    localStorage.removeItem('userLocationName');
                    window.userCoords = null;
                    if (document.getElementById('results-container').style.display !== 'none') showResults();
                    return;
                }

                localStorage.setItem('userLocationName', val);
                statusEl.textContent = "Haetaan koordinaatteja...";

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val + ', Laukaa')}&limit=1`);
                    const data = await response.json();
                    if (data && data.length > 0) {
                        const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                        localStorage.setItem('userCoords', JSON.stringify(coords));
                        window.userCoords = coords;
                        statusEl.textContent = i18n.t('status_location_updated');
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    } else {
                        statusEl.textContent = i18n.t('status_address_not_found_precise');
                    }
                } catch(e) {
                    statusEl.textContent = i18n.t('status_search_error');
                }
            });

            if (locateMeBtn) {
                locateMeBtn.addEventListener('click', () => {
                    if (!navigator.geolocation) {
                        statusEl.textContent = "Selaimesi ei tue sijaintia.";
                        return;
                    }

                    statusEl.textContent = i18n.t('status_locating');
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        window.userCoords = coords;
                        localStorage.setItem('userCoords', JSON.stringify(coords));

                        // Hae osoite käänteisellä geokoodauksella
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lng}`);
                            const data = await res.json();
                            const name = data.display_name.split(',')[0] || "Oma sijainti";
                            locationInput.value = name;
                            localStorage.setItem('userLocationName', name);
                            statusEl.textContent = i18n.t('status_location_updated');
                        } catch(e) {
                            locationInput.value = i18n.t('label_my_location');
                            statusEl.textContent = i18n.t('status_location_updated');
                        }
                        
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    }, () => {
                        statusEl.textContent = i18n.t('status_geo_failed');
                    });
                });
            }
        }

        function printResults() {
            if (currentResultsGroups.length === 0) {
                alert("Ei tuloksia tulostettavaksi. Valitse ensin palveluita.");
                return;
            }

            const printWindow = window.open('', '_blank');
            const needTitle = document.getElementById('hero-title').textContent;
            
            let html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${i18n.t('print_recommendations_title').replace('{title}', needTitle)}</title>
                    <style>
                        body { font-family: 'Inter', sans-serif; padding: 40px; color: #333; line-height: 1.5; }
                        h1 { color: #1e40af; border-bottom: 2px solid #1e40af; padding-bottom: 10px; }
                        .group { margin-top: 30px; }
                        .group-title { font-size: 1.4rem; font-weight: 800; color: #1e40af; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; }
                        .company { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; break-inside: avoid; }
                        .company-name { font-size: 1.2rem; font-weight: 700; margin: 0 0 5px 0; color: #000; }
                        .company-slogan { font-style: italic; color: #64748b; margin-bottom: 10px; font-size: 0.9rem; }
                        .contact-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.95rem; }
                        .info-item { display: flex; align-items: center; gap: 8px; }
                        .footer { margin-top: 50px; font-size: 0.8rem; color: #94a3b8; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
                        @media print { .no-print { display: none; } }
                    </style>
                </head>
                <body>
                    <h1>${i18n.t('print_header')}</h1>
                    <p><strong>${i18n.t('print_need')}:</strong> ${needTitle}</p>
                    <p>${i18n.t('print_date').replace('{date}', new Date().toLocaleDateString(i18n.currentLang === 'fi' ? 'fi-FI' : 'en-GB')).replace('{time}', new Date().toLocaleTimeString(i18n.currentLang === 'fi' ? 'fi-FI' : 'en-GB'))}</p>
            `;

            currentResultsGroups.forEach(group => {
                html += `<div class="group">
                    <div class="group-title">${group.title}</div>`;
                
                group.companies.forEach(c => {
                    const core = c.profiling?.core || {};
                    
                    const cleanContact = (str) => {
                        if (!str || str === '-') return '';
                        let s = str.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1'); // Markdown linkit pois
                        s = s.replace(/mailto:/gi, ''); // mailto: pois
                        s = s.replace(/[<>[\]()]/g, ''); // sulut pois
                        return s.trim();
                    };
                    
                    const phone = cleanContact(core.phone || c.puhelin || c.phone) || i18n.t('print_no_phone');
                    const email = cleanContact(core.email || c.email) || i18n.t('print_no_email');
                    const website = cleanContact(core.website || c.nettisivu || c.website) || i18n.t('print_no_website');
                    
                    html += `
                        <div class="company">
                            <div class="company-name">${c.nimi}</div>
                            <div class="company-slogan">${c.mainoslause || ''}</div>
                            <div class="contact-info">
                                <div class="info-item">📞 ${phone}</div>
                                <div class="info-item">📧 ${email}</div>
                                <div class="info-item">🌐 ${website}</div>
                                <div class="info-item">📍 ${c.kategoria || ''}</div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });

            html += `
                    <div class="footer">
                        © 2026 LaukaaInfo – www.laukaainfo.fi – Palvelua ylläpitää Mediazoo.fi
                    </div>
                    <div class="no-print" style="margin-top: 30px; text-align: center;">
                        <button onclick="window.print()" style="padding: 10px 20px; background: #1e40af; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">${i18n.t('print_now')}</button>
                    </div>
                </body>
                </html>
            `;

            printWindow.document.write(html);
            printWindow.document.close();
        }
        function openInquiryModal(id, name) {
            document.getElementById('inquiry-company-id').value = id;
            document.getElementById('inquiry-title').textContent = i18n.t('inquiry_request_quote') + name;
            document.getElementById('inquiry-overlay').classList.add('active');
        }

        function closeInquiryModal() {
            document.getElementById('inquiry-overlay').classList.remove('active');
        }

        function submitInquiry(e) {
            e.preventDefault();
            alert(i18n.t('alert_inquiry_sent'));
            closeInquiryModal();
            document.getElementById('inquiry-form').reset();
        }

        // Käynnistys
        document.addEventListener('DOMContentLoaded', () => {
            initPalvelu();
            initUserLocation();
            // Translate static elements
            if (window.i18n) window.i18n.translatePage();
        });
    </script>
</body>

</html>
