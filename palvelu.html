<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palveluohjaus | LaukaaInfo</title>
    <link rel="icon" href="logo.png">

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=20260426">
    <script src="translations.js?v=20260505"></script>
    <style>
        .palvelu-hero {
            background: linear-gradient(135deg, var(--secondary-blue) 0%, var(--primary-blue) 100%);
            color: white;
            padding: 4rem 1.5rem;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: 3rem;
        }

        .palvelu-hero h1 {
            font-family: var(--accent-font);
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .palvelu-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        #results-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }


        .back-nav {
            max-width: 1200px;
            margin: 2rem auto 0;
            padding: 0 1.5rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 700;
            transition: transform 0.2s;
        }

        .btn-back:hover {
            transform: translateX(-5px);
        }
        
        /* Multi-select styles */
        .option-checkbox {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 1.2rem;
            background: white;
            border-radius: 16px;
            border: 2px solid #eef2f6;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-weight: 600;
        }

        .option-checkbox:hover {
            border-color: var(--primary-blue);
            background: #f8fafc;
        }

        .option-checkbox input {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .option-checkbox.selected {
            background: #e0f2fe;
            border-color: var(--primary-blue);
        }

        .group-title {
            grid-column: 1 / -1;
            font-family: var(--accent-font);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin: 3rem 0 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #eef2f6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-title:first-child {
            margin-top: 0;
        }

        .btn-continue {
            margin-top: 2rem;
            width: 100%;
            max-width: 300px;
        }

        /* Step transition animation */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        
        /* Selection Summary */
        .selection-summary {
            max-width: 800px;
            margin: 0 auto 2rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .summary-tag {
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            color: var(--secondary-blue);
            font-weight: 600;
        }

        .next-steps-section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 32px;
            border: 2px dashed #cbd5e1;
        }

        .next-steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .next-step-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .next-step-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-blue);
        }

        .match-explanation {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 8px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Location Bar Styles */
        .location-bar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .location-bar input {
            background: transparent;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            width: 180px;
            outline: none;
        }

        .location-bar input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .location-bar .btn-locate {
            background: white;
            color: var(--primary-blue);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            font-size: 1.2rem;
        }

        .location-bar .btn-locate:hover {
            transform: scale(1.1);
        }

        #location-status {
            font-size: 0.75rem;
            margin-top: 8px;
            opacity: 0.8;
            min-height: 1.2em;
        }

        /* Interactive Categorization Styles */
        .selected-anchor {
            border: 3px solid var(--primary-blue) !important;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 102, 204, 0.3) !important;
            transition: all 0.3s ease;
        }

        .btn-select-anchor {
            display: inline-block;
            margin: 10px;
            padding: 8px 16px;
            background: #e0f2fe;
            color: var(--primary-blue);
            font-weight: 700;
            border-radius: 8px;
            border: 1px solid var(--primary-blue);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.85rem;
            width: calc(100% - 20px);
        }

        .btn-select-anchor:hover {
            background: var(--primary-blue);
            color: white;
        }
        
        .selected-anchor .btn-select-anchor {
            background: var(--primary-blue);
            color: white;
        }

        /* Print styles */
        @media print {
            .top-nav, .palvelu-hero, .btn-back, .step-progress, 
            .selection-summary, .next-steps-section, footer, 
            .btn-radar, .card-arrow, .dist-badge {
                display: none !important;
            }
            
            body {
                background: white;
                color: black;
                padding: 0;
            }

            main {
                margin: 0;
                padding: 20px;
            }

            .group-title {
                border-bottom: 1px solid #ccc;
                margin-top: 20px;
                color: black;
            }

            .company-result-card {
                border: 1px solid #eee;
                break-inside: avoid;
                margin-bottom: 15px;
                box-shadow: none;
            }
            
            .solution-package {
                box-shadow: none;
                border: 1px solid #ccc;
                margin-bottom: 40px;
                break-inside: avoid;
            }
        }
        /* Card Actions */
        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eef2f6;
        }
        .card-actions.has-three {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .card-actions.has-one {
            grid-template-columns: 1fr;
        }
        .btn-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 5px;
            background: #f8fafc;
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary-blue);
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-action:hover {
            background: #e0f2fe;
            border-color: var(--primary-blue);
        }
        .btn-action.primary-action {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        .btn-action.primary-action:hover {
            background: var(--secondary-blue);
        }
        .btn-action i {
            font-size: 1.1rem;
            font-style: normal;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }
        .inquiry-modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .inquiry-modal h2 {
            margin-top: 0;
            color: var(--primary-blue);
            font-family: var(--accent-font);
        }
        .close-modal {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: #64748b;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; box-sizing: border-box;
        }

        /* Show more button styles */
        .show-more-container {
            grid-column: 1 / -1;
            text-align: center;
            margin: 20px 0 40px;
            padding-top: 10px;
        }

        .btn-show-more {
            background: white;
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-show-more:hover {
            background: var(--primary-blue);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 102, 204, 0.2);
        }

        .btn-show-more i {
            font-style: normal;
            font-size: 1.2rem;
        }

        /* Taxonomy / Service Chain Info Styles */
        .taxonomy-info-box {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1.5rem;
            background: #f0f9ff;
            border-radius: 20px;
            border: 1px solid #bae6fd;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            animation: fadeIn 0.5s ease-out;
        }
        .taxonomy-info-icon {
            font-size: 2rem;
        }
        .taxonomy-info-content h4 {
            margin: 0 0 5px 0;
            color: #0369a1;
            font-family: var(--accent-font);
        }
        .taxonomy-info-content p {
            margin: 0;
            font-size: 0.9rem;
            color: #0c4a6e;
            line-height: 1.5;
        }
        .taxonomy-relation-tag {
            display: inline-block;
            padding: 2px 8px;
            background: #e0f2fe;
            border: 1px solid #7dd3fc;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #0369a1;
            margin-right: 5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="LaukaaInfo Logo">
                <span data-i18n="hero_title">LaukaaInfo</span>
            </a>
            <div class="lang-switcher">
                <button class="lang-btn" onclick="i18n.setLanguage('fi')" data-lang="fi">FI</button>
                <button class="lang-btn" onclick="i18n.setLanguage('en')" data-lang="en">EN</button>
            </div>
        </div>
    </nav>

    <div class="back-nav">
        <a href="index.html" class="btn-back" data-i18n="btn_back">&larr; Takaisin etusivulle</a>
    </div>

    <header id="palvelu-header" class="palvelu-hero">
        <div class="icon-large" id="hero-icon" style="font-size: 4rem; margin-bottom: 1rem;"></div>
        <h1 id="hero-title">Ladataan...</h1>
        <p id="hero-desc"></p>
        
        <div class="location-bar">
            <span>📍</span>
            <input type="text" id="user-location-input" data-i18n="[placeholder]placeholder_your_location" placeholder="Sijaintisi (esim. Laukaa)" autocomplete="off">
            <button class="btn-locate" id="locate-me-btn" title="Hae sijaintini">🎯</button>
        </div>

    </header>

    <main>
        <section id="step-section" class="step-container">
            <div id="selection-summary" class="selection-summary" style="display: none;"></div>

            <div id="step-content" class="fade-in">
                <!-- Dynaaminen sisältö -->
            </div>
        </section>

        <section id="results-container" style="display: none;">
            <div class="need-header">

                <p id="results-count"></p>
            </div>
            <div id="results-list" class="results-grid">

            <div id="next-steps-container" class="next-steps-section" style="display: none;">

            <div id="special-vinkit-container" style="display: none;"></div>

            <div id="tips-container" style="max-width: 1200px; margin: 3rem auto; display: none;"></div>
            
            <div id="taxonomy-info-container" style="display: none;"></div>

            <div style="text-align: center; margin-top: 4rem; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">

                <button onclick="printResults()" class="btn-radar" style="background: var(--primary-blue);" data-i18n="btn_print">Tulosta PDF / Paperille 🖨️</button>

    <!-- Inquiry Modal -->
    <div id="inquiry-overlay" class="modal-overlay">

            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;" data-i18n="palvelu_inquiry_unavailable">Tämä lomake ei ole vielä käytössä, kun yrityksellä on ilmaisnäkyvyys sivustolla.</p>

                <input type="hidden" id="inquiry-company-id">

                    <label data-i18n="label_name">Nimi</label>
                    <input type="text" required data-i18n="[placeholder]placeholder_name" placeholder="Matti Meikäläinen">
                </div>
                <div class="form-group">
                    <label data-i18n="label_email">Sähköposti</label>
                    <input type="email" required data-i18n="[placeholder]placeholder_email" placeholder="matti@esimerkki.fi">
                </div>
                <div class="form-group">
                    <label data-i18n="label_phone">Puhelin</label>
                    <input type="tel" data-i18n="[placeholder]placeholder_phone" placeholder="040 123 4567">
                </div>

                    <label data-i18n="label_event_date">Tilaisuuden ajankohta</label>
                    <input type="date" required>
                </div>
                <div class="form-group">
                    <label data-i18n="label_pax">Arvioitu henkilömäärä</label>
                    <input type="number" min="1" data-i18n="[placeholder]placeholder_pax" placeholder="Esim. 50">

    <footer style="margin-top: 6rem;">
        <div class="footer-content">
            <p data-i18n="footer_copyright">© 2026 LaukaaInfo – Palvelua ylläpitää Mediazoo.fi</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="needs_config.js?v=20260507"></script>
    <script src="script.js"></script>
    <script>
        let currentNeedId = new URLSearchParams(window.location.search).get('id');
        let currentStepIndex = 0;
        let selections = {};
        let taxonomyData = null;

        async function loadTaxonomy() {
            try {
                const response = await fetch('taxonomy.json');
                const data = await response.json();
                
                // Map new JSON structure to internal taxonomyData format for backward compatibility
                taxonomyData = {
                    intents: Object.keys(data.intents).map(id => ({
                        id: id,
                        label: i18n.getText(data.intents[id].label),
                        subcontexts: data.intents[id].tags || [], // Mapping tags to subcontexts
                        refinements: [],
                        nodeLinks: data.intents[id].node_links || [] // Read from taxonomy.json
                    })),
                    relations: [],
                    serviceTypes: []
                };

                // Populate relations from 'related' arrays
                Object.keys(data.intents).forEach(id => {
                    if (data.intents[id].related) {
                        data.intents[id].related.forEach(to => {
                            taxonomyData.relations.push({
                                from: id,
                                to: to,
                                type: 'related'
                            });
                        });
                    }
                });

                console.log("Taxonomy loaded from JSON:", taxonomyData);
            } catch (e) {
                console.warn("Could not load taxonomy JSON:", e);
                // Fallback to empty to prevent crashes
                taxonomyData = { intents: [], relations: [], serviceTypes: [] };
            }
        }

        async function initPalvelu() {
            console.log("initPalvelu started. currentNeedId:", currentNeedId);
            
            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            if (!config) {
                console.error("NEEDS_CONFIG not found!");
                return;
            }

            const need = config[currentNeedId];
            if (!need) {
                console.warn("Need not found in config:", currentNeedId);
                // window.location.href = 'index.html'; 
                return;
            }

            const title = i18n.getText(need.title);
            console.log("Found need:", title);
            document.getElementById('hero-title').textContent = title;
            document.getElementById('hero-desc').textContent = i18n.getText(need.description);
            document.getElementById('hero-icon').textContent = need.icon;
            document.title = `${title} | LaukaaInfo`;

            // Ladataan taksonomia ja yritysdata rinnakkain
            await loadTaxonomy();

            // Ladataan yritysdata jos sitä ei vielä ole
            try {
                // Odota että script.js on ladannut loadCompanyData-funktion
                let retries = 0;
                const maxRetries = 15;
                while (typeof loadCompanyData !== 'function' && retries < maxRetries) {
                    console.log("Waiting for loadCompanyData... retry:", retries);
                    await new Promise(r => setTimeout(r, 400));
                    retries++;
                }

                if (typeof loadCompanyData === 'function') {
                    // Käytetään window-etuliitettä selvyyden vuoksi
                    if (!window.allCompanies || window.allCompanies.length === 0) {
                        console.log("allCompanies is empty, starting loadCompanyData...");
                        await loadCompanyData();
                    }
                } else {
                    console.warn("loadCompanyData is still not available, trying to proceed anyway...");
                }
                
                console.log("Companies check:", (window.allCompanies) ? window.allCompanies.length : 'null/undefined');
            } catch (e) {
                console.error("Error loading companies in initPalvelu:", e);
            }

            const filterProfiling = new URLSearchParams(window.location.search).get('filter_profiling');
            if (filterProfiling) {
                showResults();
            } else {
                renderStep();
            }
        }

        function renderStep() {
            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            const need = config[currentNeedId];
            if (!need || !need.steps) return;
            
            const step = need.steps[currentStepIndex];
            
            if (!step) {
                console.error("Step not found at index:", currentStepIndex);
                return;
            }

            const content = document.getElementById('step-content');
            const progress = document.getElementById('step-progress');

            // Render summary
            updateSelectionSummary();

            // Render progress
            progress.innerHTML = '';
            need.steps.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${i === currentStepIndex ? 'active' : ''}`;
                progress.appendChild(dot);
            });

            // Render step content
            if (step.multiple) {
                content.innerHTML = `
                    <div class="step-header">
                        <h2>${i18n.getText(step.question)}</h2>
                        <p data-i18n="search_multiple_desc">Voit valita useamman vaihtoehdon.</p>
                    </div>
                    <div class="step-options" style="grid-template-columns: 1fr;">
                        ${step.options.map((opt, i) => `
                            <label class="option-checkbox ${selections[step.id]?.some(s => i18n.getText(s.label) === i18n.getText(opt.label)) ? 'selected' : ''}" id="label-${i}">
                                <input type="checkbox" onchange="toggleOption(${i})" ${selections[step.id]?.some(s => i18n.getText(s.label) === i18n.getText(opt.label)) ? 'checked' : ''}>
                                ${i18n.getText(opt.label)}
                            </label>
                        `).join('')}
                    </div>
                    <div style="text-align: center;">
                        <button class="btn-radar btn-continue" onclick="nextStep()" style="background: var(--primary-blue);" data-i18n="btn_continue">Jatka &raquo;</button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="step-header">

        function toggleOption(optionIndex) {
            const need = NEEDS_CONFIG[currentNeedId];
            const step = need.steps[currentStepIndex];
            const option = step.options[optionIndex];
            
            if (!selections[step.id]) selections[step.id] = [];
            
            const idx = selections[step.id].findIndex(s => s.label === option.label);
            if (idx > -1) {
                selections[step.id].splice(idx, 1);
                document.getElementById(`label-${optionIndex}`).classList.remove('selected');
                // Poistetaan sub_context jos vaihtoehto poistetaan
                if (option.sub_context && selections._sub_contexts) {
                    const scIdx = selections._sub_contexts.indexOf(option.sub_context);
                    if (scIdx > -1) selections._sub_contexts.splice(scIdx, 1);
                }
            } else {
                selections[step.id].push(option);
                document.getElementById(`label-${optionIndex}`).classList.add('selected');
                // Tallennetaan sub_context jos se on määritelty (TASO 2)
                if (option.sub_context) {
                    if (!selections._sub_contexts) selections._sub_contexts = [];
                    if (!selections._sub_contexts.includes(option.sub_context)) {
                        selections._sub_contexts.push(option.sub_context);
                    }
                }
            }
        }

        function selectOption(optionIndex) {
            const need = NEEDS_CONFIG[currentNeedId];
            const step = need.steps[currentStepIndex];
            const option = step.options[optionIndex];

            selections[step.id] = option;
            
            // Tallenneteaan sub_context jos se on määritelty (TASO 2)
            if (option.sub_context) {
                if (!selections._sub_contexts) selections._sub_contexts = [];
                if (!selections._sub_contexts.includes(option.sub_context)) {
                    selections._sub_contexts.push(option.sub_context);
                }
            }
            
            nextStep();
        }

        function nextStep() {
            const need = NEEDS_CONFIG[currentNeedId];
            if (currentStepIndex < need.steps.length - 1) {
                currentStepIndex++;
                // Tarkistetaan skipIf — hypytään askel jos ehto täyttyy
                const step = need.steps[currentStepIndex];
                if (step && step.skipIf) {
                    try {
                        // Evaluoidaan skipIf-lauseke turvallisesti
                        const shouldSkip = evaluateSkipIf(step.skipIf);
                        if (shouldSkip) {
                            console.log(`Skipping step '${step.id}': ${i18n.getText(step.skipMessage) || 'skipIf condition met'}`);
                            showSkipNotice(i18n.getText(step.skipMessage));
                            setTimeout(() => nextStep(), 1200);
                            return;
                        }
                    } catch(e) {
                        console.warn('skipIf evaluation failed:', e);
                    }
                }
                renderStep();
            } else {
                showResults();
            }
        }

        // Arvioi skipIf-lauseke tukien loogisia operaattoreita ja profilointitarkistuksia
        function evaluateSkipIf(skipIfStr) {
            if (!skipIfStr) return false;
            
            let evalStr = skipIfStr;
            
            // 1. Korvataan getSelectedCompanyProfilointi-kutsut niiden tuloksilla
            const profilointiRegex = /getSelectedCompanyProfilointi\('([^']+)',\s*'([^']+)',\s*'([^']+)'\)/g;
            evalStr = evalStr.replace(profilointiRegex, (match, stepId, section, field) => {
                return getSelectedCompanyProfilointi(stepId, section, field);
            });

            // 2. Lisätään tuki isSelected('stepId', 'label') -kutsulle
            const selectedRegex = /isSelected\('([^']+)',\s*'([^']+)'\)/g;
            evalStr = evalStr.replace(selectedRegex, (match, stepId, label) => {
                const sel = selections[stepId];
                if (!sel) return false;
                if (Array.isArray(sel)) {
                    return sel.some(s => (i18n.getText(s.label) || '').toLowerCase().includes(label.toLowerCase()));
                }
                return (i18n.getText(sel.label) || '').toLowerCase().includes(label.toLowerCase());
            });
            
            // 3. Korvataan selections.stepId-viittaukset (onko jotain valittu kyseisessä stepissä)
            evalStr = evalStr.replace(/selections\.(\w+)/g, (match, stepId) => {
                return !!selections[stepId];
            });

            // 3.5 Lisätään tuki hasNodeLink('stepId', 'nodeId') -kutsulle
            const nodeLinkRegex = /hasNodeLink\('([^']+)',\s*'([^']+)'\)/g;
            evalStr = evalStr.replace(nodeLinkRegex, (match, stepId, nodeId) => {
                return hasSelectedCompanyNodeLink(stepId, nodeId);
            });

            // 4. Suoritetaan looginen arviointi turvallisesti
            try {
                // Sallitaan vain perus-boolean-logiikka
                const safeEval = new Function('return ' + evalStr);
                return safeEval();
            } catch(e) {
                console.warn('evaluateSkipIf failed for:', evalStr, e);
                return false;
            }
        }

        // Hakee valitun yrityksen profilointiarvo tietystä osiosta
        function getSelectedCompanyProfilointi(stepId, section, field) {
            const sel = selections[stepId];
            if (!sel) return false;
            const opt = Array.isArray(sel) ? sel[0] : sel;
            if (!opt || !opt._companyRef) return false;
            return opt._companyRef?.profiling?.[section]?.[field] === true;
        }

        // Tarkistaa onko valitulla yrityksellä tietty node_link
        function hasSelectedCompanyNodeLink(stepId, nodeId) {
            const sel = selections[stepId];
            if (!sel) return false;
            const opt = Array.isArray(sel) ? sel[0] : sel;
            const company = opt._companyRef;
            if (!company || !company.profiling || !company.profiling.core) return false;
            const links = company.profiling.core.node_links || [];
            return links.includes(nodeId);
        }

        // Helper to get profiling data correctly (mapping legacy keys to new schema)
        function getCategoryData(c, key) {
            if (!c || !c.profiling) return null;
            const keyMap = {
                'weddings_and_parties': 'events_and_celebrations',
                'corporate_parties_and_events': 'events_and_celebrations',
                'meetings_and_seminars': 'business_events',
                'starting_a_business': 'startup_services',
                'business_growth_and_dev': 'business_growth',
                'construction_and_renovation': 'construction_and_maintenance',
                'housing_companies_and_real_estate': 'housing_company_and_contracts'
            };
            const mappedKey = keyMap[key] || key;
            const underscoreKey = mappedKey.replace(/-/g, '_');
            const hyphenKey = mappedKey.replace(/_/g, '-');
            
            // Profiling data v5 has categories under a 'categories' property
            const categories = c.profiling.categories || {};
            return categories[underscoreKey] || categories[hyphenKey] || categories[mappedKey] || 
                   c.profiling[underscoreKey] || c.profiling[hyphenKey] || c.profiling[mappedKey] || c.profiling[key];
        }

        function getFitsForScore(c, profilingKey) {
            if (!c || !c.profiling || !c.profiling.core) return 0;
            
            // 1. Check intent_scores first (new standardized system)
            if (c.profiling.core.intent_scores) {
                const intentScore = c.profiling.core.intent_scores[profilingKey];
                if (intentScore !== undefined) return intentScore;
            }

            if (!c.profiling.core.fits_for) return 0;
            const fits = c.profiling.core.fits_for;
            
            const finnishMap = {
                'events_and_celebrations': 'häät',
                'business_events': 'yritysjuhlat',
                'funerals_and_memorials': 'hautajaiset',
                'startup_services': 'yrityksen perustaminen',
                'business_growth': 'yrityksen kehittäminen',
                'wellbeing-and-beauty': 'vapaa-aika'
            };
            
            let score = fits[profilingKey] || fits[profilingKey.replace(/_/g, '-')] || 0;
            
            if (score === 0 && finnishMap[profilingKey]) {
                const finKey = finnishMap[profilingKey];
                score = fits[finKey] || fits[finKey.replace(/ /g, '-')] || 0;
            }
            
            // Fallback for wellbeing-and-beauty to hyvinvointipalvelut
            if (score === 0 && (profilingKey === 'wellbeing-and-beauty' || profilingKey === 'wellbeing_and_beauty')) {
                score = fits['hyvinvointipalvelut'] || fits['wellbeing-services'] || 0;
            }
            
            return score;
        }

        function getIntentScore(c, intentCode) {
            if (!c || !c.profiling || !c.profiling.core || !c.profiling.core.intent_scores) return 0;
            return c.profiling.core.intent_scores[intentCode] || 0;
        }

        // Helper to get all collaborators of a company across all profiling categories
        function getCompanyCollaborators(c) {
            if (!c || !c.profiling) return [];
            let collaborators = [];
            for (let k in c.profiling) {
                if (c.profiling[k] && Array.isArray(c.profiling[k].collaborated_with)) {
                    collaborators = collaborators.concat(c.profiling[k].collaborated_with);
                }
            }
            return collaborators;
        }

                            const rfMin = opt.require_fits_for.min || 20;
                            const rfScore = getFitsForScore(c, rfKey);
                            if (rfScore < rfMin) return false;
                        }

                        let isProfiledMatch = false;
                        if (opt.node_link) {
                            const links = c.profiling?.core?.node_links || [];
                            if (links.includes(opt.node_link)) isProfiledMatch = true;
                        }
                        if (opt.node_links) {
                            const links = c.profiling?.core?.node_links || [];
                            if (opt.node_links.some(l => links.includes(l))) isProfiledMatch = true;
                        }

                        if (opt.profilointi_filter) {
                            const pf = opt.profilointi_filter;
                            const catData = getCategoryData(c, pf.section);
                            let match = false;

                            const checkFuzzyMatch = (target, query) => {
                                if (target === undefined || target === null || query === undefined || query === null) return false;
                                const t = String(target).toLowerCase();
                                const q = String(query).toLowerCase();
                                const isPluralMatch = (t === q + 't' || q === t + 't');
                                return t === q || t.includes(q) || q.includes(t) || isPluralMatch;
                            };

                            if (catData) {
                                const actualVal = catData[pf.field];
                                if (Array.isArray(actualVal)) {
                                    match = actualVal.some(v => checkFuzzyMatch(v, pf.value));
                                } else if (typeof actualVal === 'object' && actualVal !== null) {
                                    match = Object.values(actualVal).flat().some(v => checkFuzzyMatch(v, pf.value));
                                } else {
                                    match = checkFuzzyMatch(actualVal, pf.value);
                                }

                                // Automaattinen fallback refinement_tagsiin jos ei matchia
                                if (!match && Array.isArray(catData.refinement_tags)) {
                                    match = catData.refinement_tags.some(v => checkFuzzyMatch(v, pf.value));
                                }
                            }

                            // FALLBACK: Tarkista sub_contexts (Taso 2)
                            if (!match && c.profiling?.core?.sub_contexts) {
                                const subContexts = c.profiling.core.sub_contexts;
                                if (Array.isArray(subContexts)) {
                                    match = subContexts.some(v => checkFuzzyMatch(v, pf.value));
                                } else if (typeof subContexts === 'object' && subContexts !== null) {
                                    match = Object.values(subContexts).flat().some(v => checkFuzzyMatch(v, pf.value));
                                }
                            }

                            // TÄRKEÄ KORJAUS: Jos optiolla on node_link-vaatimus JA profilointisuodatin,
                            // molempien on täytyttävä (AND). Muuten pelkkä profilointisuodatin riittää.
                            if (opt.node_link || opt.node_links) {
                                isProfiledMatch = isProfiledMatch && match;
                            } else {
                                isProfiledMatch = match;
                            }
                        }
                        
                        // INTENT-CODE TÄSMÄYS (UUSI)
                        if (opt.intent_codes && c.profiling?.core?.intent_codes) {
                            const hasIntent = opt.intent_codes.some(code => c.profiling.core.intent_codes.includes(code));
                            if (hasIntent) {
                                isProfiledMatch = true;
                            }
                        }

                        // TAKSONOMIA-TÄSMÄYS (UUSI)
                        // TÄRKEÄ KORJAUS: Jos optiolla on profilointisuodatin (esim. omilla tarjoiluilla), 
                        // ei sallita taksonomia-fallbackia, jotta vältetään vääriä osumia yrityksille 
                        // jotka on jo kertaalleen hylätty (esim. catering-vaatimuksen takia).
                        if (taxonomyData && !isProfiledMatch && !opt.profilointi_filter) {
                            const targetIntentId = (opt.intent_codes && opt.intent_codes.length > 0) ? opt.intent_codes[0] : currentProfilingKey;
                            const intent = taxonomyData.intents.find(i => i.id === targetIntentId || i.id === targetIntentId.replace(/_/g, '-'));
                            if (intent) {
                                const labelLower = i18n.getText(opt.label || '').toLowerCase();
                                const isTaxonomyTerm = intent.refinements.some(r => labelLower.includes(r.toLowerCase())) ||
                                                       intent.subcontexts.some(s => labelLower.includes(s.toLowerCase()));
                                
                                if (isTaxonomyTerm) {
                                    const companyContent = (
                                        (c.tags || '') + ' ' + 
                                        (c.kategoria || '') + ' ' + 
                                        (c.nimi || '') + ' ' +
                                        (c.profiling?.core?.sub_contexts?.join(' ') || '') + ' ' +
                                        (c.profiling?.core?.node_links?.join(' ') || '')
                                    ).toLowerCase();
                                    
                                    const taxonomyMatch = intent.refinements.concat(intent.subcontexts).some(term => {
                                        const t = term.toLowerCase();
                                        return labelLower.includes(t) && companyContent.includes(t);
                                    });
                                    if (taxonomyMatch) isProfiledMatch = true;
                                }

                                if (!isProfiledMatch && intent.nodeLinks) {
                                    const links = c.profiling?.core?.node_links || [];
                                    if (intent.nodeLinks.some(nl => links.includes(nl))) {
                                        const isTila = labelLower.includes('tila') && !labelLower.includes('tilaisuus');
                                        const isVenueIntent = targetIntentId.startsWith('VENUE_');
                                        if (isTila || isVenueIntent || (opt.tags && opt.tags.some(t => {
                                            const tl = t.toLowerCase();
                                            return tl.includes('tila') && !tl.includes('tilaisuus');
                                        }))) {
                                            isProfiledMatch = true;
                                        }
                                    }
                                }
                            }
                        }

                        // NEW: Broaden photography/videography match
                        if (!isProfiledMatch && opt.tags) {
                            const isPhotoSearch = opt.tags.some(t => t.includes('valokuva'));
                            const isVideoSearch = opt.tags.some(t => t.includes('video') || t === 'videotuotanto');
                            const isFloristSearch = opt.tags.some(t => t.includes('kukka'));
                            
                            const coreNodeLinks = c.profiling?.core?.node_links || [];
                            if ((isPhotoSearch && coreNodeLinks.includes('VALOKUVAUS')) || 
                                (isVideoSearch && coreNodeLinks.includes('VIDEOTUOTANTO')) ||
                                (isFloristSearch && coreNodeLinks.includes('KUKAT'))) {
                                isProfiledMatch = true;
                            }
                        }

                        if (!isProfiledMatch && opt.tags) {
                            if (opt.tags.includes('digitointi')) {
                                const catData = getCategoryData(c, currentProfilingKey);
                                const hasDigitizationFeatures = catData && Array.isArray(catData.digitization_features) && catData.digitization_features.length > 0;
                                
                                // Jos on profilointi-dataa, käytetään sitä
                                if (hasDigitizationFeatures && fitsScore > 0) {
                                    isProfiledMatch = true;
                                } else {
                                    // Muutoin tarkistetaan tägit ja lisätiedot (varasysteemi)
                                    const companyContent = (
                                        (c.tags || '') + ' ' + 
                                        (c.searchExtraInfo || '') + ' ' + 
                                        (c.kategoria || '') + ' ' + 
                                        (c.nimi || '') + ' ' +
                                        (c.profiling?.core?.sub_contexts?.join(' ') || '')
                                    ).toLowerCase();
                                    if (companyContent.includes('digitointi')) {
                                        isProfiledMatch = true;
                                    }
                                }
                            }
                            if (opt.tags.includes('juhlatila')) {
                                const catData = getCategoryData(c, 'events_and_celebrations');
                                if (catData && fitsScore > 0 && (catData.capacity_max > 0 || catData.seated_capacity > 0)) isProfiledMatch = true;
                            }
                        }

                        const hasVenueTag = (c.tags || '').toLowerCase().includes('juhlatila') || 
                                           (c.kategoria || '').toLowerCase().includes('juhlatila') ||
                                           (c.tags || '').toLowerCase().includes('kokoustila') ||
                                           (c.tags || '').toLowerCase().includes('edustustila');

                        if (opt.capacity_req > 0 || requestedCapacity > 0) {
                            const cap = getCompanyCapacity(c, currentProfilingKey);
                            
                            // Jos optio vaatii kapasiteettia (esim. juhlatila-valinta), yrityksellä on oltava kapasiteetti.
                            if (opt.capacity_req > 0 && cap === 0) {
                                return false;
                            }
                            
                            // Jos kyseessä on tilatyyppinen optio tai yritys, ja hakuun liittyy kapasiteettivaatimus, piilotetaan nollakapasiteetin kohteet.
                            const isVenueType = hasVenueTag || 
                                               (opt.label && (
                                                   (i18n.getText(opt.label).toLowerCase().includes('tila') && !i18n.getText(opt.label).toLowerCase().includes('tilaisuus')) || 
                                                   i18n.getText(opt.label).toLowerCase().includes('muistotilaisuus') ||
                                                   i18n.getText(opt.label).toLowerCase().includes('juhla')
                                               )) || 
                                               (opt.tags && opt.tags.includes('juhlatila')) ||
                                               opt.node_link === 'JUHLATILA';
                            if (requestedCapacity > 0 && isVenueType && cap === 0) {
                                return false;
                            }
                        }

                        if (isProfiledMatch) return true;
                        
                        // Jos yrityksellä on profilointi tälle kontekstille mutta arvosana on 0, 
                        // ei sallita täsmäystä tägeillä (estää esim. juhlatilojen osumisen siivous-hakuihin)
                        if (c.profiling && c.profiling.core && c.profiling.core.fits_for) {
                            const fitsScore = getFitsForScore(c, currentProfilingKey);
                            const hasProfiling = (currentProfilingKey in c.profiling.core.fits_for) || (currentProfilingKey.replace(/_/g, '-') in c.profiling.core.fits_for);
                            // Jos profilointi on tehty (löytyy fits_for:sta) ja arvosana on 0, hylätään
                            if (hasProfiling && fitsScore === 0) {
                                return false;
                            }
                        }

                        // Jos optiolla ei ole tägejä, node-linkkejä tai suodattimia, se ei saa näyttää "kaikkia" 
                        // paitsi jos se on pelkkä kapasiteettivaatimus
                        if (!opt.tags || opt.tags.length === 0) {
                            if (!opt.node_link && !opt.node_links && !opt.profilointi_filter && opt.capacity_req <= 0) {
                                return false; 
                            }
                            return getFitsForScore(c, currentProfilingKey) > 10;
                        }

                        // TÄRKEÄ KORJAUS: Jos optiolla on profilointisuodatin (liikunta-ja-vapaaaika), 
                        // EI sallita fallbackia tägeihin, jos suodatin ei täsmännyt.
                        // Tämä estää esim. Revontuli Resortin (jolla on 'avantouinti' sub_contextina) 
                        // osumisen 'Uinti'-optioon (jolla on tägi 'uinti').
                        if (opt.profilointi_filter) {
                            return isProfiledMatch;
                        }

                        // Laajennettu haku: Nimi + Tägit + Kategoria + Profiloinnin sub_contexts + Node_links
                        const companyContent = (
                            (c.tags || '') + ' ' + 
                            (c.kategoria || '') + ' ' + 
                            (c.nimi || '') + ' ' +
                            (c.profiling?.core?.sub_contexts?.join(' ') || '') + ' ' +
                            (c.profiling?.core?.node_links?.join(' ') || '')
                        ).toLowerCase();
                        
                        const tagMatch = opt.tags.some(tag => companyContent.includes(tag.toLowerCase()));
                        
                        if (isMediazoo) console.log(`DEBUG: Mediazoo final match for "${i18n.getText(opt.label)}": ${tagMatch}`);
                        return tagMatch;
                    });
                    
                    console.log(`Option "${i18n.getText(opt.label)}" found ${companiesForOpt.length} companies.`);
                    
                    // Aina mukaan, vaikka yrityksiä ei löytyisi (käyttäjän toive)
                    companiesForOpt.forEach(c => {
                        allMatchingCompanies.add(c);
                        suggestedCompanyIds.add(c.id);
                    });
                    matchingGroups.push({ opt, companies: companiesForOpt });
                });
            });

            // Specialized grouping for Corporate Events + Accommodation
            if ((currentNeedId === 'yritysjuhlat' || currentNeedId === 'yritystilaisuudet') && matchingGroups.length > 1) {
                const venueGroup = matchingGroups.find(g => g.opt.tags && (g.opt.tags.includes('juhlatila') || g.opt.tags.includes('kokoustilat') || g.opt.tags.includes('juhlasali')));
                const stayGroup = matchingGroups.find(g => g.opt.label === 'Majoitus');

                if (venueGroup && stayGroup) {
                    const allVenues = venueGroup.companies;
                    const allStays = stayGroup.companies; // Currently only contains stay-only due to deduplication
                    
                    const venuesWithoutStay = allVenues.filter(c => {
                        const catData = getCategoryData(c, 'events_and_celebrations');
                        return !catData || !catData.accommodation_beds || catData.accommodation_beds === 0;
                    });
                    
                    const venuesWithStay = allVenues.filter(c => {
                        const catData = getCategoryData(c, 'events_and_celebrations');
                        return catData && catData.accommodation_beds > 0;
                    });
                    
                    // Mark venuesWithStay so they can be sorted first in Group 2
                    venuesWithStay.forEach(c => c._isBothMatch = true);
                    
                    // Group 1: Juhlatila yritykselle
                    const newGroup1 = {
                        opt: { ...venueGroup.opt, label: "Juhlatila yritykselle" },
                        companies: venuesWithoutStay
                    };
                    
                    // Group 2: Majoitus ja/tai juhlatila
                    const newGroup2 = {
                        opt: { ...stayGroup.opt, label: "Majoitus ja/tai juhlatila" },
                        companies: [...venuesWithStay, ...allStays]
                    };
                    
                    // Replace the old groups in the list, maintaining overall order
                    const newMatchingGroups = [];
                    matchingGroups.forEach(g => {
                        if (g === venueGroup) {
                            if (newGroup1.companies.length > 0) newMatchingGroups.push(newGroup1);
                        } else if (g === stayGroup) {
                            if (newGroup2.companies.length > 0) newMatchingGroups.push(newGroup2);
                        } else {
                            newMatchingGroups.push(g);
                        }
                    });
                    matchingGroups = newMatchingGroups;
                }
            }

            // Tallennetaan tilamuuttujiin renderöintiä varten
            matchingGroupsData = matchingGroups;
            selectedAnchorCompanyId = null;
            
            globalActiveCollaboratorsSet = new Set();
            renderResultsView();
        }

        function selectAnchor(companyId) {
            if (selectedAnchorCompanyId === companyId) {
                // Poistetaan valinta
                selectedAnchorCompanyId = null;
                // Tyhjennetään kumppanit
                globalActiveCollaboratorsSet = new Set();
            } else {
                // Asetetaan valinta
                selectedAnchorCompanyId = companyId;
                globalActiveCollaboratorsSet = new Set();
                let anchorCompany = null;
                matchingGroupsData.forEach(g => {
                    const found = g.companies.find(c => c.id === companyId);
                    if (found) anchorCompany = found;
                });
                if (anchorCompany) {
                    const partners = getCompanyCollaborators(anchorCompany);
                    partners.forEach(p => globalActiveCollaboratorsSet.add(p));
                    
                    // NEW: Bidirectional partnership lookup. 
                    // Also include companies that list the anchor as their partner.
                    if (window.allCompanies) {
                        window.allCompanies.forEach(c => {
                            const cPartners = getCompanyCollaborators(c);
                            if (cPartners.includes(anchorCompany.id) || cPartners.includes(anchorCompany.nimi)) {
                                globalActiveCollaboratorsSet.add(c.id);
                                globalActiveCollaboratorsSet.add(c.nimi);
                            }
                        });
                    }

                    // Lisätään myös ankkuri itse
                    globalActiveCollaboratorsSet.add(anchorCompany.id);
                    globalActiveCollaboratorsSet.add(anchorCompany.nimi);
                }
            }
            renderResultsView();
        }

        function renderResultsView() {
            const list = document.getElementById('results-list');
            const countEl = document.getElementById('results-count');
            const resultsContainer = document.getElementById('results-container');
            currentResultsGroups = [];
            
            if (matchingGroupsData.length === 0) {
                if (countEl) countEl.textContent = i18n.t('error_no_companies');
                if (list) list.innerHTML = `<div class="no-results"><h3>${i18n.t('palvelu_no_results_title')}</h3><p>${i18n.t('palvelu_no_results_desc')}</p></div>`;
                return;
            }

            let totalFoundCount = 0;
            let htmlResults = "";

            // Tunnistetaan ensimmäinen ryhmä "ankkuriryhmäksi" (voidaan valita)
            let anchorGroupIndex = 0;
            matchingGroupsData.forEach((group, idx) => {
                if (group.opt.capacity_req > 0 && !(matchingGroupsData[anchorGroupIndex].opt.capacity_req > 0)) {
                    anchorGroupIndex = idx;
                }
            });

            matchingGroupsData.forEach((group, idx) => {
                const opt = group.opt;
                const companiesForOpt = [...group.companies];
                const isAnchorGroup = (idx === anchorGroupIndex);
                
                totalFoundCount += companiesForOpt.length;
                htmlResults += `<div class="group-title"><span>📍</span> ${i18n.getText(opt.label)}</div>`;


                // Haetaan valitun ankkurin koordinaatit, jos sellainen on ja olemme MUIDEN ryhmien kohdalla
                let anchorLat = null;
                let anchorLon = null;
                if (selectedAnchorCompanyId && !isAnchorGroup) {
                    let anchorCompany = null;
                    matchingGroupsData[anchorGroupIndex].companies.forEach(c => {
                        if (c.id === selectedAnchorCompanyId) anchorCompany = c;
                    });
                    if (anchorCompany && anchorCompany.lat && (anchorCompany.lon || anchorCompany.lng)) {
                        anchorLat = parseFloat(anchorCompany.lat);
                        anchorLon = parseFloat(anchorCompany.lon || anchorCompany.lng);
                    }
                }

                companiesForOpt.sort((a, b) => {
                    let scoreA = getFitsForScore(a, globalProfilingKey);
                    let scoreB = getFitsForScore(b, globalProfilingKey);

                    if (globalActiveCollaboratorsSet.has(a.id) || globalActiveCollaboratorsSet.has(a.nimi)) scoreA += 45;
                    if (globalActiveCollaboratorsSet.has(b.id) || globalActiveCollaboratorsSet.has(b.nimi)) scoreB += 45;

                    // NEW: Prioritize "Both" matches (Stay + Venue) in the combined Corporate group
                    if (a._isBothMatch) scoreA += 5000;
                    if (b._isBothMatch) scoreB += 5000;

                    if (globalRequestedCapacity > 0) {
                        const capA = getCompanyCapacity(a, globalProfilingKey);
                        const capB = getCompanyCapacity(b, globalProfilingKey);
                        
                        if (capA > 0) {
                            if (capA >= globalRequestedCapacity) {
                                scoreA += 60;
                                if (capA <= globalRequestedCapacity * 2.5) scoreA += 40;
                            } else {
                                scoreA -= 50; 
                            }
                        }

                        if (capB > 0) {
                            if (capB >= globalRequestedCapacity) {
                                scoreB += 60;
                                if (capB <= globalRequestedCapacity * 2.5) scoreB += 40;
                            } else {
                                scoreB -= 50;
                            }
                        }
                    }

                    const dataA = getCategoryData(a, globalProfilingKey);
                    const dataB = getCategoryData(b, globalProfilingKey);
                    if (globalRequestedFeatures.sauna && dataA?.has_sauna) scoreA += 50;
                    if (globalRequestedFeatures.sauna && dataB?.has_sauna) scoreB += 50;
                    if (globalRequestedFeatures.accessible && dataA?.is_accessible) scoreA += 50;
                    if (globalRequestedFeatures.accessible && dataB?.is_accessible) scoreB += 50;
                    if (globalRequestedFeatures.home_service && a.profiling?.core?.home_service) scoreA += 50;
                    if (globalRequestedFeatures.home_service && b.profiling?.core?.home_service) scoreB += 50;

                    // Etäisyyslaskenta (Ankkuri TAI Käyttäjä)
                    let distA = Infinity;
                    let distB = Infinity;
                    let hasLocation = false;

                    if (anchorLat !== null && anchorLon !== null) {
                        distA = getHaversineDistance(anchorLat, anchorLon, parseFloat(a.lat), parseFloat(a.lon || a.lng));
                        distB = getHaversineDistance(anchorLat, anchorLon, parseFloat(b.lat), parseFloat(b.lon || b.lng));
                        hasLocation = true;
                    } else {
                        const userCoordsRaw = localStorage.getItem('userCoords');
                        if (userCoordsRaw) {
                            try {
                                const u = JSON.parse(userCoordsRaw);
                                distA = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(a.lat), parseFloat(a.lon || a.lng));
                                distB = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(b.lat), parseFloat(b.lon || b.lng));
                                hasLocation = true;
                            } catch(e) {}
                        }
                    }

                    // "Lähin ensin" periaate - jos sijainti tiedetään ja kummallakin on validi etäisyys
                    if (hasLocation && !isNaN(distA) && !isNaN(distB)) {
                        // Jos etäisyysero on yli 500 metriä, lajitellaan etäisyyden mukaan.
                        // Näin lähin on varmasti ensimmäisenä.
                        if (Math.abs(distA - distB) > 0.5) {
                            return distA - distB;
                        }
                        // Jos ovat hyvin lähekkäin (alle 500m toisistaan), annetaan premiumille ja pisteille painoarvoa
                        if (distA < distB) scoreA += 10;
                        else if (distB < distA) scoreB += 10;
                    } else if (hasLocation) {
                        // Jos toisella ei ole sijaintia määritetty, näytetään se, jolla on sijainti, ensin
                        if (!isNaN(distA) && isNaN(distB)) return -1;
                        if (isNaN(distA) && !isNaN(distB)) return 1;
                    }

                    if (scoreA !== scoreB) return scoreB - scoreA;
                    
                    const aIsPremium = (a.paketti || a.tyyppi || '').toLowerCase().match(/premium|pro/);
                    const bIsPremium = (b.paketti || b.tyyppi || '').toLowerCase().match(/premium|pro/);
                    if (aIsPremium && !bIsPremium) return -1;
                    if (!aIsPremium && bIsPremium) return 1;

                    return 0;
                });

                // Rajoitetaan näytettävien määrää (max 9 ellei laajennettu)
                const groupId = opt.id || i18n.getText(opt.label);
                const isExpanded = expandedGroups[groupId];
                const visibleCompanies = isExpanded ? companiesForOpt : companiesForOpt.slice(0, 9);
                const hasMore = companiesForOpt.length > 9;

                currentResultsGroups.push({
                    title: i18n.getText(opt.label),
                    companies: visibleCompanies
                });

                if (visibleCompanies.length === 0) {
                    htmlResults += `
                        <div style="grid-column: 1 / -1; padding: 2.5rem; background: #f8fafc; border-radius: 24px; border: 2px dashed #cbd5e1; text-align: center; color: #64748b;">
                            <div style="font-size: 2rem; margin-bottom: 0.5rem;">🏢</div>
                            <div style="font-weight: 700; color: var(--primary-blue); font-size: 1.1rem; margin-bottom: 5px;">${i18n.t('error_no_companies')}</div>
                            <p style="margin: 0; font-size: 0.9rem; opacity: 0.8;">${i18n.t('palvelu_no_results_desc')}</p>
                        </div>
                    `;
                } else {
                    visibleCompanies.forEach(c => {
                        let anchorCoords = null;
                        if (anchorLat !== null && anchorLon !== null) anchorCoords = { lat: anchorLat, lng: anchorLon };
                        const isSelected = (selectedAnchorCompanyId === c.id);
                        let cardHtml = renderCompanyCard(c, globalRequestedCapacity, globalProfilingKey, globalActiveCollaboratorsSet, anchorCoords, isAnchorGroup, isSelected, i18n.getText(opt.label));
                        htmlResults += cardHtml;
                    });
                }

                if (hasMore && !isExpanded) {
                    const moreCount = companiesForOpt.length - 9;
                    htmlResults += `
                        <div class="show-more-container">
                            <button class="btn-show-more" onclick="toggleGroupExpansion('${groupId.replace(/'/g, "\\'")}')">
                                <i>➕</i><span>${i18n.t('btn_show_more_count').replace('{count}', moreCount)}</span>
                            </button>
                        </div>
                    `;
                }
            });

            if (totalFoundCount === 0) {
                if (countEl) countEl.textContent = i18n.t('error_no_companies');
                if (list) list.innerHTML = htmlResults;
            } else {
                if (countEl) countEl.textContent = i18n.t('palvelu_found_count').replace('{count}', totalFoundCount);
                if (list) list.innerHTML = htmlResults;
                renderTaxonomyInfo(globalProfilingKey);
                renderNextSteps(globalProfilingKey);
                renderTips(currentNeedId);
                renderSpecialVinkit(currentNeedId);
            }
            // Vältetään selauksen hyppäämistä ylimmäs renderöinnin yhteydessä, ellei tämä ole ensimmäinen lataus
            // Jos valitaan ankkuri, käyttäjä todennäköisesti haluaa pysyä samassa kohdassa
        }

        function toggleGroupExpansion(groupId) {
            expandedGroups[groupId] = true;
            renderResultsView();
        }

        function renderNextSteps(context) {
            const nextStepsContainer = document.getElementById('next-steps-container');
            const nextStepsList = document.getElementById('next-steps-list');
            const recommendations = [];
            const seenNormalized = new Set();
            
            function addRec(rec) {
                if (!rec) return;
                const text = typeof rec === 'string' ? rec : i18n.getText(rec);
                if (!text || text.length < 2) return;
                
                const normalized = text.trim().toLowerCase();
                if (!seenNormalized.has(normalized)) {
                    seenNormalized.add(normalized);
                    // Capitalize first letter for consistent display
                    const display = text.trim().charAt(0).toUpperCase() + text.trim().slice(1);
                    recommendations.push(display);
                }
            }
            
            // Normalize context for data lookup (handles underscore vs hyphen)
            const contextHyphenated = context.replace(/_/g, '-');
            
            // 1. Taksonomiapohjaiset suositukset (sub-kontekstit ja tarkennukset)
            if (taxonomyData) {
                const intent = taxonomyData.intents.find(i => i.id === context || i.id === contextHyphenated);
                if (intent) {
                    // Lisätään taksonomian sub-kontekstit ja tarkennukset (nämä ovat "virallisia" tageja)
                    const taxonomyTags = [...(intent.subcontexts || []), ...(intent.refinements || [])];
                    
                    // Suodatetaan pois ne, jotka on jo valittu tässä haussa
                    const currentSubs = (selections._sub_contexts || []).map(s => s.toLowerCase());
                    
                    taxonomyTags.forEach(tag => {
                        if (!currentSubs.includes(tag.toLowerCase())) {
                            addRec(tag);
                        }
                    });

                    // Lisätään myös suhteet (relations)
                    const relations = taxonomyData.relations.filter(r => r.from === intent.id);
                    relations.forEach(r => {
                        const targetIntent = taxonomyData.intents.find(i => i.id === r.to);
                        if (targetIntent) addRec(targetIntent.label);
                        else addRec(r.to);
                    });
                }

                // New: also look at intent_codes from active selections
                for (let stepId in selections) {
                    const sel = selections[stepId];
                    if (!sel) continue;
                    const opts = Array.isArray(sel) ? sel : [sel];
                    opts.forEach(opt => {
                        if (opt.intent_codes) {
                            opt.intent_codes.forEach(code => {
                                const relIntents = taxonomyData.relations.filter(r => r.from === code);
                                relIntents.forEach(r => {
                                    const target = taxonomyData.intents.find(i => i.id === r.to);
                                    if (target) addRec(target.label);
                                    else addRec(r.to);
                                });
                            });
                        }
                    });
                }
            }

            // 2. Profilointipohjaiset suositukset (yritysten omat ristiinmyyntiehdotukset)
            const topCompanies = (window.allCompanies || []).filter(c => {
                const fits = c.profiling?.core?.fits_for || {};
                const score = fits[context] || fits[contextHyphenated] || 0;
                return score >= 70;
            });
            
            topCompanies.forEach(c => {
                const pairedObj = c.profiling?.core?.paired_with_by_context || {};
                const paired = pairedObj[context] || pairedObj[contextHyphenated] || [];
                paired.forEach(p => addRec(p));
            });

            // 3. Konfiguraatiopohjaiset suositukset (NEEDS_CONFIGin omat vaihtoehdot)
            const currentNeedId = new URLSearchParams(window.location.search).get('id');
            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            if (currentNeedId && config && config[currentNeedId]) {
                const need = config[currentNeedId];
                (need.steps || []).forEach(step => {
                    (step.options || []).forEach(opt => {
                        addRec(opt.label);
                    });
                });
            }
            
            // Limit to max 12 recommendations
            const limitedRecs = recommendations.slice(0, 12);

            if (limitedRecs.length > 0) {
                nextStepsContainer.style.display = 'block';
                nextStepsList.innerHTML = limitedRecs.map(recText => {
                    return `
                    <div class="next-step-card" onclick="searchNextStep('${recText.replace(/'/g, "\\'")}')">
                        <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">🔍</div>
                        <div style="font-weight: 700; color: var(--primary-blue);">${recText}</div>
                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">${i18n.t('btn_search_providers')}</div>
                    </div>
                `}).join('');
            } else {
                nextStepsContainer.style.display = 'none';
            }
        }

        function searchNextStep(query) {
            if (!query) return;

            // Check if the query matches a top-level "Need" in NEEDS_CONFIG
            // We check both the key and the title (case-insensitive)
            const lowerQuery = query.toLowerCase();
            let foundNeedId = null;

            if (typeof NEEDS_CONFIG !== 'undefined') {
                for (const [id, config] of Object.entries(NEEDS_CONFIG)) {
                    if (id.toLowerCase() === lowerQuery || (config.title && i18n.getText(config.title).toLowerCase() === lowerQuery)) {
                        foundNeedId = id;
                        break;
                    }
                }
            }

            if (foundNeedId) {
                // Stay in palvelu.html but switch to the new need
                window.location.href = `palvelu.html?id=${foundNeedId}`;
            } else {
                // Go to the general company/service search (index.html or koko-laukaa.html)
                // In this project, koko-laukaa.html handles the free-text results.
                window.location.href = `koko-laukaa.html?q=${encodeURIComponent(query)}`;
            }
        }

        function getHaversineDistance(lat1, lon1, lat2, lon2) {
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return 6371 * c; // Distance in km
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        function getMatchExplanation(c, requestedCapacity, profilingKey) {
            const reasons = [];
            if (c.profiling) {
                const core = c.profiling.core || {};
                const fits = core.fits_for || {};
                
                // Taso 1: Pääkontekstin soveltuvuus
                if (fits[profilingKey] >= 80) reasons.push(i18n.t('match_main_area'));
                else if (fits[profilingKey] >= 40) reasons.push(i18n.t('match_fits_well'));

                // Taso 2: Sub-context match (Erikoistuminen)
                if (selections._sub_contexts && selections._sub_contexts.length > 0) {
                    const companySubContexts = core.sub_contexts || [];
                    let isSubMatch = false;
                    if (Array.isArray(companySubContexts)) {
                        isSubMatch = selections._sub_contexts.some(sc => companySubContexts.includes(sc));
                    } else if (typeof companySubContexts === 'object' && companySubContexts !== null) {
                        // Tarkistetaan kaikki objektin avaimet
                        const allSubContexts = Object.values(companySubContexts).flat();
                        isSubMatch = selections._sub_contexts.some(sc => allSubContexts.includes(sc));
                    }
                    
                    if (isSubMatch) {
                        reasons.push(i18n.t('match_specialized'));
                    }
                }

                // Taso 3: Kapasiteetti ja ominaisuudet
                const isFoodService = ((c.kategoria || '') + ' ' + (c.tags || '') + ' ' + (c.nimi || '')).toLowerCase().includes('pitopalvelu');
                if (requestedCapacity > 0 && !isFoodService) {
                    const cap = getCompanyCapacity(c, profilingKey);
                    if (cap >= requestedCapacity) reasons.push(i18n.t('match_capacity_ok'));
                }

                const events = getCategoryData(c, 'events_and_celebrations') || {};
                if (events.is_accessible && selections.palvelut?.some(s => (i18n.getText(s.label) || '').toLowerCase().includes('esteetön') || (i18n.getText(s.label) || '').toLowerCase().includes('accessible'))) reasons.push(i18n.t('match_accessible'));
                if (events.has_sauna && selections.palvelut?.some(s => (i18n.getText(s.label) || '').toLowerCase().includes('sauna'))) reasons.push(i18n.t('match_sauna'));
            }

            if (reasons.length === 0) return i18n.t('match_default');
            // Palautetaan enintään kaksi parasta perustelua
            return reasons.slice(0, 2).join(" • ");
        }
