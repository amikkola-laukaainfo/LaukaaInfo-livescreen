        function initUserLocation() {
            const locationInput = document.getElementById('user-location-input');
            const locateMeBtn = document.getElementById('locate-me-btn');
            const statusEl = document.getElementById('location-status');

            if (!locationInput) return;

            // Palauta tallennettu sijainti
            const savedName = localStorage.getItem('userLocationName');
            const savedCoordsRaw = localStorage.getItem('userCoords');

            if (savedName) locationInput.value = savedName;
            
            // Jos tuli URL-parametrina (esim. etusivulta)
            const urlParams = new URLSearchParams(window.location.search);
            const urlLat = urlParams.get('lat');
            const urlLon = urlParams.get('lon');
            const urlLoc = urlParams.get('loc');

            if (urlLat && urlLon) {
                const coords = { lat: parseFloat(urlLat), lng: parseFloat(urlLon) };
                localStorage.setItem('userCoords', JSON.stringify(coords));
                if (urlLoc) {
                    localStorage.setItem('userLocationName', urlLoc);
                    locationInput.value = urlLoc;
                }
                window.userCoords = coords;
            } else if (savedCoordsRaw) {
                try {
                    window.userCoords = JSON.parse(savedCoordsRaw);
                } catch(e) {}
            }

            // Enter-painikkeen tuki tekstikentälle (helpottaa manuaalista hakua)
            locationInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    locationInput.blur(); // Laukaisee change-tapahtuman automaattisesti
                }
            });

            // Kuuntele manuaalista syöttöä (yksinkertainen paikkahaku tai pelkkä tallennus)
            locationInput.addEventListener('change', async () => {
                const val = locationInput.value.trim();
                if (!val) {
                    localStorage.removeItem('userCoords');
                    localStorage.removeItem('userLocationName');
                    window.userCoords = null;
                    if (document.getElementById('results-container').style.display !== 'none') showResults();
                    return;
                }

                localStorage.setItem('userLocationName', val);
                statusEl.textContent = "Haetaan koordinaatteja...";

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val + ', Laukaa')}&limit=1`);
                    const data = await response.json();
                    if (data && data.length > 0) {
                        const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                        localStorage.setItem('userCoords', JSON.stringify(coords));
                        window.userCoords = coords;
                        statusEl.textContent = i18n.t('status_location_updated');
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    } else {
                        statusEl.textContent = i18n.t('status_address_not_found_precise');
                    }
                } catch(e) {
                    statusEl.textContent = i18n.t('status_search_error');
                }
            });

            if (locateMeBtn) {
                locateMeBtn.addEventListener('click', () => {
                    if (!navigator.geolocation) {
                        statusEl.textContent = "Selaimesi ei tue sijaintia.";
                        return;
                    }

                    statusEl.textContent = i18n.t('status_locating');
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        window.userCoords = coords;
                        localStorage.setItem('userCoords', JSON.stringify(coords));

                        // Hae osoite käänteisellä geokoodauksella
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lng}`);
                            const data = await res.json();
                            const name = data.display_name.split(',')[0] || "Oma sijainti";
                            locationInput.value = name;
                            localStorage.setItem('userLocationName', name);
                            statusEl.textContent = i18n.t('status_location_updated');
                        } catch(e) {
                            locationInput.value = i18n.t('label_my_location');
                            statusEl.textContent = i18n.t('status_location_updated');
                        }
                        
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    }, () => {
                        statusEl.textContent = i18n.t('status_geo_failed');
                    });
                });
            }
        }

            document.getElementById('inquiry-overlay').classList.remove('active');
        }

        function submitInquiry(e) {
            e.preventDefault();
            alert(i18n.t('alert_inquiry_sent'));
            closeInquiryModal();
            document.getElementById('inquiry-form').reset();
        }

        // Käynnistys
        document.addEventListener('DOMContentLoaded', () => {
            initPalvelu();
            initUserLocation();
            // Translate static elements
            if (window.i18n) window.i18n.translatePage();
        });
    </script>
</body>

</html>
