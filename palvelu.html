<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palveluohjaus | LaukaaInfo</title>
    <link rel="icon" href="logo.png">

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=20260426">
    <style>
        .palvelu-hero {
            background: linear-gradient(135deg, var(--secondary-blue) 0%, var(--primary-blue) 100%);
            color: white;
            padding: 4rem 1.5rem;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: 3rem;
        }

        .palvelu-hero h1 {
            font-family: var(--accent-font);
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .palvelu-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        #results-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .back-nav {
            max-width: 1200px;
            margin: 2rem auto 0;
            padding: 0 1.5rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 700;
            transition: transform 0.2s;
        }

        .btn-back:hover {
            transform: translateX(-5px);
        }
        
        /* Multi-select styles */
        .option-checkbox {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 1.2rem;
            background: white;
            border-radius: 16px;
            border: 2px solid #eef2f6;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-weight: 600;
        }

        .option-checkbox:hover {
            border-color: var(--primary-blue);
            background: #f8fafc;
        }

        .option-checkbox input {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .option-checkbox.selected {
            background: #e0f2fe;
            border-color: var(--primary-blue);
        }

        .group-title {
            grid-column: 1 / -1;
            font-family: var(--accent-font);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin: 3rem 0 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #eef2f6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-title:first-child {
            margin-top: 0;
        }

        .btn-continue {
            margin-top: 2rem;
            width: 100%;
            max-width: 300px;
        }

        /* Step transition animation */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        
        /* Selection Summary */
        .selection-summary {
            max-width: 800px;
            margin: 0 auto 2rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .summary-tag {
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            color: var(--secondary-blue);
            font-weight: 600;
        }

        .next-steps-section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 32px;
            border: 2px dashed #cbd5e1;
        }

        .next-steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .next-step-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .next-step-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-blue);
        }

        .match-explanation {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 8px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Location Bar Styles */
        .location-bar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .location-bar input {
            background: transparent;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            width: 180px;
            outline: none;
        }

        .location-bar input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .location-bar .btn-locate {
            background: white;
            color: var(--primary-blue);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            font-size: 1.2rem;
        }

        .location-bar .btn-locate:hover {
            transform: scale(1.1);
        }

        #location-status {
            font-size: 0.75rem;
            margin-top: 8px;
            opacity: 0.8;
            min-height: 1.2em;
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="LaukaaInfo Logo">
                <span>LaukaaInfo</span>
            </a>
        </div>
    </nav>

    <div class="back-nav">
        <a href="index.html" class="btn-back">&larr; Takaisin etusivulle</a>
    </div>

    <header id="palvelu-header" class="palvelu-hero">
        <div class="icon-large" id="hero-icon" style="font-size: 4rem; margin-bottom: 1rem;"></div>
        <h1 id="hero-title">Ladataan...</h1>
        <p id="hero-desc"></p>
        
        <div class="location-bar">
            <span>📍</span>
            <input type="text" id="user-location-input" placeholder="Sijaintisi (esim. Laukaa)" autocomplete="off">
            <button class="btn-locate" id="locate-me-btn" title="Hae sijaintini">🎯</button>
        </div>
        <div id="location-status"></div>
    </header>

    <main>
        <section id="step-section" class="step-container">
            <div id="selection-summary" class="selection-summary" style="display: none;"></div>
            <div class="step-progress" id="step-progress"></div>
            <div id="step-content" class="fade-in">
                <!-- Dynaaminen sisältö -->
            </div>
        </section>

        <section id="results-container" style="display: none;">
            <div class="need-header">
                <h2>Suositellut palvelut</h2>
                <p id="results-count"></p>
            </div>
            <div id="results-list" class="results-grid">
                <!-- Tulokset ladataan tästän -->
            </div>

            <div id="next-steps-container" class="next-steps-section" style="display: none;">
                <h3 style="text-align: center; font-family: var(--accent-font); font-size: 1.5rem;">Seuraavaksi saatat tarvita myös näitä:</h3>
                <div id="next-steps-list" class="next-steps-grid"></div>
            </div>
            
            <div style="text-align: center; margin-top: 4rem;">
                <button onclick="resetPalvelu()" class="btn-radar" style="background: var(--primary-blue);">Aloita alusta</button>
            </div>
        </section>
    </main>

    <footer style="margin-top: 6rem;">
        <div class="footer-content">
            <p>© 2026 LaukaaInfo – Palvelua ylläpitää Mediazoo.fi</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="needs_config.js"></script>
    <script src="script.js"></script>
    <script>
        let currentNeedId = new URLSearchParams(window.location.search).get('id');
        let currentStepIndex = 0;
        let selections = {};
        let filteredCompanies = [];

        async function initPalvelu() {
            console.log("initPalvelu started. currentNeedId:", currentNeedId);
            
            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            if (!config) {
                console.error("NEEDS_CONFIG not found!");
                return;
            }

            const need = config[currentNeedId];
            if (!need) {
                console.warn("Need not found in config:", currentNeedId);
                // window.location.href = 'index.html'; 
                return;
            }

            console.log("Found need:", need.title);
            document.getElementById('hero-title').textContent = need.title;
            document.getElementById('hero-desc').textContent = need.description;
            document.getElementById('hero-icon').textContent = need.icon;
            document.title = `${need.title} | LaukaaInfo`;

            // Ladataan yritysdata jos sitä ei vielä ole
            try {
                // Odota että script.js on ladannut loadCompanyData-funktion
                let retries = 0;
                const maxRetries = 15;
                while (typeof loadCompanyData !== 'function' && retries < maxRetries) {
                    console.log("Waiting for loadCompanyData... retry:", retries);
                    await new Promise(r => setTimeout(r, 400));
                    retries++;
                }

                if (typeof loadCompanyData === 'function') {
                    // Käytetään window-etuliitettä selvyyden vuoksi
                    if (!window.allCompanies || window.allCompanies.length === 0) {
                        console.log("allCompanies is empty, starting loadCompanyData...");
                        await loadCompanyData();
                    }
                } else {
                    console.warn("loadCompanyData is still not available, trying to proceed anyway...");
                }
                
                console.log("Companies check:", (window.allCompanies) ? window.allCompanies.length : 'null/undefined');
            } catch (e) {
                console.error("Error loading companies in initPalvelu:", e);
            }

            const filterProfiling = new URLSearchParams(window.location.search).get('filter_profiling');
            if (filterProfiling) {
                showResults();
            } else {
                renderStep();
            }
        }

        function renderStep() {
            const config = window.NEEDS_CONFIG || (typeof NEEDS_CONFIG !== 'undefined' ? NEEDS_CONFIG : null);
            const need = config[currentNeedId];
            if (!need || !need.steps) return;
            
            const step = need.steps[currentStepIndex];
            
            if (!step) {
                console.error("Step not found at index:", currentStepIndex);
                return;
            }

            const content = document.getElementById('step-content');
            const progress = document.getElementById('step-progress');

            // Render summary
            updateSelectionSummary();

            // Render progress
            progress.innerHTML = '';
            need.steps.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${i === currentStepIndex ? 'active' : ''}`;
                progress.appendChild(dot);
            });

            // Render step content
            if (step.multiple) {
                content.innerHTML = `
                    <div class="step-header">
                        <h2>${step.question}</h2>
                        <p>Voit valita useamman vaihtoehdon.</p>
                    </div>
                    <div class="step-options" style="grid-template-columns: 1fr;">
                        ${step.options.map((opt, i) => `
                            <label class="option-checkbox ${selections[step.id]?.some(s => s.label === opt.label) ? 'selected' : ''}" id="label-${i}">
                                <input type="checkbox" onchange="toggleOption(${i})" ${selections[step.id]?.some(s => s.label === opt.label) ? 'checked' : ''}>
                                ${opt.label}
                            </label>
                        `).join('')}
                    </div>
                    <div style="text-align: center;">
                        <button class="btn-radar btn-continue" onclick="nextStep()" style="background: var(--primary-blue);">Jatka &raquo;</button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="step-header">
                        <h2>${step.question}</h2>
                    </div>
                    <div class="step-options">
                        ${step.options.map((opt, i) => `
                            <button class="option-btn" onclick="selectOption(${i})">
                                ${opt.label}
                                <span>&rarr;</span>
                            </button>
                        `).join('')}
                    </div>
                `;
            }
            
            content.classList.remove('fade-in');
            void content.offsetWidth; // Trigger reflow
            content.classList.add('fade-in');
        }

        function updateSelectionSummary() {
            const summaryEl = document.getElementById('selection-summary');
            const summaryTags = [];
            
            for (let stepId in selections) {
                if (stepId.startsWith('_')) continue;
                const val = selections[stepId];
                if (Array.isArray(val)) {
                    val.forEach(v => summaryTags.push(v.label));
                } else if (val && val.label) {
                    summaryTags.push(val.label);
                }
            }

            if (summaryTags.length > 0) {
                summaryEl.innerHTML = summaryTags.map(tag => `<span class="summary-tag">${tag}</span>`).join('');
                summaryEl.style.display = 'flex';
            } else {
                summaryEl.style.display = 'none';
            }
        }

        function toggleOption(optionIndex) {
            const need = NEEDS_CONFIG[currentNeedId];
            const step = need.steps[currentStepIndex];
            const option = step.options[optionIndex];
            
            if (!selections[step.id]) selections[step.id] = [];
            
            const idx = selections[step.id].findIndex(s => s.label === option.label);
            if (idx > -1) {
                selections[step.id].splice(idx, 1);
                document.getElementById(`label-${optionIndex}`).classList.remove('selected');
            } else {
                selections[step.id].push(option);
                document.getElementById(`label-${optionIndex}`).classList.add('selected');
            }
        }

        function selectOption(optionIndex) {
            const need = NEEDS_CONFIG[currentNeedId];
            const step = need.steps[currentStepIndex];
            const option = step.options[optionIndex];

            selections[step.id] = option;
            
            // Tallenneteaan sub_context jos se on määritelty (TASO 2)
            if (option.sub_context) {
                if (!selections._sub_contexts) selections._sub_contexts = [];
                if (!selections._sub_contexts.includes(option.sub_context)) {
                    selections._sub_contexts.push(option.sub_context);
                }
            }
            
            nextStep();
        }

        function nextStep() {
            const need = NEEDS_CONFIG[currentNeedId];
            if (currentStepIndex < need.steps.length - 1) {
                currentStepIndex++;
                // Tarkistetaan skipIf — hypytään askel jos ehto täyttyy
                const step = need.steps[currentStepIndex];
                if (step && step.skipIf) {
                    try {
                        // Evaluoidaan skipIf-lauseke turvallisesti
                        const shouldSkip = evaluateSkipIf(step.skipIf);
                        if (shouldSkip) {
                            console.log(`Skipping step '${step.id}': ${step.skipMessage || 'skipIf condition met'}`);
                            showSkipNotice(step.skipMessage);
                            setTimeout(() => nextStep(), 1200);
                            return;
                        }
                    } catch(e) {
                        console.warn('skipIf evaluation failed:', e);
                    }
                }
                renderStep();
            } else {
                showResults();
            }
        }

        // Arvioi skipIf-lauseke tukien loogisia operaattoreita ja profilointitarkistuksia
        function evaluateSkipIf(skipIfStr) {
            if (!skipIfStr) return false;
            
            let evalStr = skipIfStr;
            
            // 1. Korvataan getSelectedCompanyProfilointi-kutsut niiden tuloksilla
            const profilointiRegex = /getSelectedCompanyProfilointi\('([^']+)',\s*'([^']+)',\s*'([^']+)'\)/g;
            evalStr = evalStr.replace(profilointiRegex, (match, stepId, section, field) => {
                return getSelectedCompanyProfilointi(stepId, section, field);
            });
            
            // 2. Korvataan selections.stepId-viittaukset (onko jotain valittu kyseisessä stepissä)
            evalStr = evalStr.replace(/selections\.(\w+)/g, (match, stepId) => {
                return !!selections[stepId];
            });

            // 3. Suoritetaan looginen arviointi turvallisesti
            try {
                // Sallitaan vain perus-boolean-logiikka
                const safeEval = new Function('return ' + evalStr);
                return safeEval();
            } catch(e) {
                console.warn('evaluateSkipIf failed for:', evalStr, e);
                return false;
            }
        }

        // Hakee valitun yrityksen profilointiarvo tietystä osiosta
        function getSelectedCompanyProfilointi(stepId, section, field) {
            const sel = selections[stepId];
            if (!sel) return false;
            const opt = Array.isArray(sel) ? sel[0] : sel;
            if (!opt || !opt._companyRef) return false;
            return opt._companyRef?.profiling?.[section]?.[field] === true;
        }

        // Näytetään lyhyt ilmoitus kun askel hypytään
        function showSkipNotice(message) {
            const content = document.getElementById('step-content');
            if (!message) return;
            content.innerHTML = `
                <div class="step-header fade-in" style="text-align:center;">
                    <div style="font-size:2.5rem;margin-bottom:1rem;">✅</div>
                    <h2 style="color:var(--primary-blue);">${message}</h2>
                    <p style="opacity:0.7;">Jatketaan automaattisesti...</p>
                </div>
            `;
        }

        async function showResults() {
            console.log("showResults() active. Selections:", selections);
            
            const stepSection = document.getElementById('step-section');
            const resultsContainer = document.getElementById('results-container');
            const list = document.getElementById('results-list');
            const countEl = document.getElementById('results-count');

            if (stepSection) stepSection.style.display = 'none';
            if (resultsContainer) resultsContainer.style.display = 'block';
            if (list) list.innerHTML = '';
            document.getElementById('next-steps-container').style.display = 'none';

            // Varmistetaan vielä kerran että meillä on dataa
            if (!window.allCompanies || window.allCompanies.length === 0) {
                console.error("allCompanies is empty in showResults!");
                // Viimeinen yritys ladata
                if (typeof loadCompanyData === 'function') {
                    console.log("Attempting last-minute loadCompanyData...");
                    await loadCompanyData();
                }
                
                if (!window.allCompanies || window.allCompanies.length === 0) {
                    if (countEl) countEl.textContent = "Virhe: Yritystietoja ei voitu ladata palvelimelta juuri nyt. Yritä päivittää sivu.";
                    return;
                }
            }

            // Kerätään kaikki valitut vaihtoehdot yhteen listaan
            let selectedOptions = [];
            for (let stepId in selections) {
                if (stepId.startsWith('_')) continue;
                const val = selections[stepId];
                if (Array.isArray(val)) {
                    selectedOptions = selectedOptions.concat(val);
                } else if (val && typeof val === 'object') {
                    selectedOptions.push(val);
                }
            }

            let filterProfiling = new URLSearchParams(window.location.search).get('filter_profiling');
            if (filterProfiling && selectedOptions.length === 0) {
                // If skipped steps directly from front page
                selectedOptions.push({ label: "Tarkennettu haku", tags: [] });
            }

            console.log("Processing selected options:", selectedOptions);

            let totalFound = 0;
            let html = '';

            // Kartta nykyisestä polusta profilointiavaimiin (fits_for)
            const needToProfilingMap = {
                'haat': 'häät',
                'yritysjuhlat': 'yritysjuhlat',
                'yritystilaisuudet': 'kokoukset',
                'syntymapaivat': 'syntymäpäivät',
                'muutto': 'muutto',
                'remontti': 'remontti',
                'mokkipalvelut': 'mökkipalvelut',
                'taloyhtion-huolto': 'taloyhtiö',
                'hautajaiset': 'hautajaiset',
                'yrityksen-perustaminen': 'yrityksen-perustaminen',
                'yrityksen-kehittaminen': 'yrityksen-kehittäminen',
                'terveys-ja-hyvinvointi': 'terveys',
                'liikunta-ja-vapaaaika': 'vapaa-aika',
                'elaimet': 'vapaa-aika',
                'lapset-ja-perhe': 'vapaa-aika'
            };

            const currentProfilingKey = needToProfilingMap[currentNeedId] || 'vapaa-aika';

            // Poimitaan valinnoista mahdolliset ominaisuusvaatimukset ja erikoiskentät (esim. kapasiteetti)
            let requestedCapacity = 0;
            const featureOptions = [];

            selectedOptions.forEach(opt => {
                if (opt.capacity_req) {
                    requestedCapacity = Math.max(requestedCapacity, opt.capacity_req);
                } else {
                    featureOptions.push(opt);
                }
            });

            // Jos kaikki valinnat olivat pelkkää kapasiteettia, lisätään "Tulokset" -ryhmä jotta ne näytetään
            if (featureOptions.length === 0 && requestedCapacity > 0) {
                featureOptions.push({ label: "Sopivat tilat", tags: [] });
            }

            const requestedFeatures = {
                sauna: selectedOptions.some(o => o.label?.toLowerCase().includes('sauna')),
                accessible: selectedOptions.some(o => o.label?.toLowerCase().includes('esteetön') || o.label?.toLowerCase().includes('vammais')),
                emergency: currentNeedId === 'paivystavat-palvelut',
                home_service: selectedOptions.some(o => o.label?.toLowerCase().includes('kotiin') || o.label?.toLowerCase().includes('kotona'))
            };

            featureOptions.forEach(opt => {
                console.log(`Filtering for option: ${opt.label}`, opt.tags);

                const companiesForOpt = allCompanies.filter(c => {
                    // EHDOTON ESTO: not_suitable_for (context gate)
                        const needIdToContextName = {
                            'haat': 'häät',
                            'yritysjuhlat': 'yritysjuhlat',
                            'yritystilaisuudet': 'kokoukset',
                            'syntymapaivat': 'syntymäpäivät',
                            'hautajaiset': 'hautajaiset',
                            'muutto': 'muutto',
                            'remontti': 'remontti',
                            'mokkipalvelut': 'mökkipalvelut',
                            'taloyhtion-huolto': 'taloyhtiö',
                            'yrityksen-perustaminen': 'yrityksen-perustaminen',
                            'yrityksen-kehittaminen': 'yrityksen-kehittäminen',
                            'terveys-ja-hyvinvointi': 'terveys'
                        };
                        const currentContextName = needIdToContextName[currentNeedId] || currentNeedId;
                        const notSuitable = c.profiling?.core?.not_suitable_for;
                        if (Array.isArray(notSuitable) && notSuitable.includes(currentContextName)) {
                            return false;
                        }

                        // TASO 2: Sub-contexts filter (Siltana)
                        if (selections._sub_contexts && selections._sub_contexts.length > 0) {
                            const companySubContexts = c.profiling?.core?.sub_contexts || [];
                            const hasSelectedSubContext = selections._sub_contexts.some(sc => companySubContexts.includes(sc));
                            if (companySubContexts.length > 0 && !hasSelectedSubContext) {
                                return false; 
                            }
                        }

                    // HARD FILTER from front page
                    if (filterProfiling) {
                        let hasProp = false;
                        if (c.profiling?.core && c.profiling.core[filterProfiling]) hasProp = true;
                        else {
                            for (let k in c.profiling || {}) {
                                if (c.profiling[k] && c.profiling[k][filterProfiling]) {
                                    hasProp = true;
                                    break;
                                }
                            }
                        }
                        if (!hasProp) return false;
                    }

                    // Tapa 1: Profilointipisteet polkuun
                    let score = 0;
                    if (c.profiling && c.profiling.core && c.profiling.core.fits_for) {
                        score = c.profiling.core.fits_for[currentProfilingKey] || 0;
                    }

                    // require_fits_for: minimipisteraja (ehdoton) — vain hautajaiset-tyyppisille poluille
                    if (opt.require_fits_for) {
                        const rfKey = opt.require_fits_for.key;
                        const rfMin = opt.require_fits_for.min || 20;
                        const rfScore = c.profiling?.core?.fits_for?.[rfKey] || 0;
                        if (rfScore < rfMin) return false; // Ehdoton: liian pieni soveltuvuus
                    }

                    // profilointi_filter: schema-pohjainen hard filter
                    if (opt.profilointi_filter) {
                        const pf = opt.profilointi_filter;
                        const actualVal = c.profiling?.[pf.section]?.[pf.field];
                        // Jos yritysellä on profilointi mutta arvo ei täsmää → suljetaan pois
                        if (c.profiling && c.profiling[pf.section] !== undefined) {
                            if (actualVal !== pf.value) return false;
                        }
                        // Jos ei profilointia lainkaan, jatketaan tagi-haulla
                    }

                    // Jos tultiin suoraan etusivulta ilman steppejä tai valittiin vaihtoehto ilman tageja (esim. "Vain tilat")
                    if (!opt.tags || opt.tags.length === 0) {
                        if (filterProfiling) return true;
                        return score > 10;
                    }

                    // Tapa 2: Tagit (toissijainen fallback, mutta pakollinen tarkemmissa askeleissa)
                    const companyContent = ((c.tags || '') + ' ' + (c.kategoria || '') + ' ' + (c.nimi || '')).toLowerCase();
                    return opt.tags.some(tag => companyContent.includes(tag.toLowerCase()));
                });

                console.log(`Found ${companiesForOpt.length} matches for ${opt.label}`);

                if (companiesForOpt.length > 0) {
                    totalFound += companiesForOpt.length;

                    // Lisätään ryhmän otsikko
                    html += `<div class="group-title"><span>📍</span> ${opt.label}</div>`;

                    // Lajitellaan: Profilointipisteet + kapasiteetti ensin, sitten Premiumit
                    companiesForOpt.sort((a, b) => {
                        let scoreA = (a.profiling?.core?.fits_for?.[currentProfilingKey] || 0);
                        let scoreB = (b.profiling?.core?.fits_for?.[currentProfilingKey] || 0);

                        // Kapasiteettibonukset: täysin sopiva tila saa lisäpisteitä
                        if (requestedCapacity > 0) {
                            const capA = getCompanyCapacity(a, currentProfilingKey);
                            const capB = getCompanyCapacity(b, currentProfilingKey);
                            if (capA >= requestedCapacity) scoreA += 40;
                            if (capB >= requestedCapacity) scoreB += 40;
                            // Liian pieni tila saa miinusta
                            if (capA > 0 && capA < requestedCapacity) scoreA -= 20;
                            if (capB > 0 && capB < requestedCapacity) scoreB -= 20;
                        }

                        if (requestedFeatures.sauna && a.profiling?.events_and_celebrations?.has_sauna) scoreA += 50;
                        if (requestedFeatures.sauna && b.profiling?.events_and_celebrations?.has_sauna) scoreB += 50;
                        if (requestedFeatures.accessible && a.profiling?.events_and_celebrations?.is_accessible) scoreA += 50;
                        if (requestedFeatures.accessible && b.profiling?.events_and_celebrations?.is_accessible) scoreB += 50;
                        if (requestedFeatures.home_service && a.profiling?.core?.home_service) scoreA += 50;
                        if (requestedFeatures.home_service && b.profiling?.core?.home_service) scoreB += 50;

                        if (scoreA !== scoreB) return scoreB - scoreA;

                        const aType = (a.paketti || a.tyyppi || '').toLowerCase();
                        const bType = (b.paketti || b.tyyppi || '').toLowerCase();
                        const aIsPremium = aType.includes('premium') || aType.includes('pro');
                        const bIsPremium = bType.includes('premium') || bType.includes('pro');
                        if (aIsPremium && !bIsPremium) return -1;
                        if (!aIsPremium && bIsPremium) return 1;

                        // Etäisyys tie-breakerina
                        const userCoordsRaw = localStorage.getItem('userCoords');
                        if (userCoordsRaw) {
                            try {
                                const u = JSON.parse(userCoordsRaw);
                                const distA = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(a.lat), parseFloat(a.lon || a.lng));
                                const distB = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(b.lat), parseFloat(b.lon || b.lng));
                                return distA - distB;
                            } catch(e) {}
                        }

                        return 0;
                    });

                    // Lisätään yritykset
                    companiesForOpt.forEach(c => {
                        html += renderCompanyCard(c, requestedCapacity, currentProfilingKey);
                    });
                }
            });

            // Lajitellaan lopullinen lista vielä etäisyyden mukaan, jos käyttäjällä on sijainti
            // (Tämä on hieman monimutkaista, koska html on jo generoitu ryhmittäin)
            // Muutetaan showResults logiikkaa niin, että se generoi koko listan ja lajittelee sen jos halutaan,
            // mutta pidetään ryhmittely toistaiseksi.

            if (totalFound === 0) {
                if (countEl) countEl.textContent = "Valitettavasti valintoihisi sopivia yrityksiä ei löytynyt juuri nyt.";
                if (list) list.innerHTML = '<div class="no-results"><h3>Hups!</h3><p>Kokeile aloittaa alusta ja valita eri vaihtoehtoja.</p></div>';
            } else {
                if (countEl) countEl.textContent = `Löysimme yhteensä ${totalFound} ehdotusta valintoihisi perustuen.`;
                if (list) list.innerHTML = html;
                
                // Näytetään seuraavat askeleet (Next Steps)
                renderNextSteps(currentProfilingKey);
            }
            
            window.scrollTo({ top: resultsContainer ? resultsContainer.offsetTop - 100 : 0, behavior: 'smooth' });
        }

        function renderNextSteps(context) {
            const nextStepsContainer = document.getElementById('next-steps-container');
            const nextStepsList = document.getElementById('next-steps-list');
            
            // Kerätään suositukset yrityksiltä, jotka ovat Top Match tai Premium
            const recommendations = new Set();
            const topCompanies = window.allCompanies.filter(c => {
                const score = c.profiling?.core?.fits_for?.[context] || 0;
                return score >= 70;
            });

            topCompanies.forEach(c => {
                const paired = c.profiling?.core?.paired_with_by_context?.[context] || [];
                paired.forEach(p => recommendations.add(p));
            });

            if (recommendations.size > 0) {
                nextStepsContainer.style.display = 'block';
                nextStepsList.innerHTML = Array.from(recommendations).map(rec => `
                    <div class="next-step-card" onclick="searchNextStep('${rec}')">
                        <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">🔍</div>
                        <div style="font-weight: 700; color: var(--primary-blue);">${rec}</div>
                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">Etsi palveluntarjoajia</div>
                    </div>
                `).join('');
            }
        }

        function searchNextStep(query) {
            // Ohjataan yleiseen hakuun tai asiahakuun kyseisellä sanalla
            window.location.href = `asiahaku.html?haku=${encodeURIComponent(query)}`;
        }

        // Apufunktio: haetaan yrityksen kapasiteetti oikeasta osiosta kontekstin perusteella
        function getCompanyCapacity(c, profilingKey) {
            if (!c.profiling) return 0;
            if (profilingKey === 'kokoukset') {
                return c.profiling.business_events?.meeting_capacity ||
                       c.profiling.business_events?.seminar_capacity || 0;
            }
            return c.profiling.events_and_celebrations?.capacity_max ||
                   c.profiling.events_and_celebrations?.seated_capacity || 0;
        }

        function renderCompanyCard(c, requestedCapacity, profilingKey) {
            const slug = typeof slugify === 'function' ? slugify(c.nimi) : c.nimi.toLowerCase().replace(/\s+/g, '-');
            const isPremium = (c.paketti || c.tyyppi || '').toLowerCase().includes('premium');
            const isPro = (c.paketti || c.tyyppi || '').toLowerCase().includes('pro');
            
            const cardUrl = (isPremium || isPro) 
                ? `yritys/${slug}.html`
                : `yrityskortti.html?id=${slug}`;

            const icons = window.categoryIcons || (typeof categoryIcons !== 'undefined' ? categoryIcons : {});
            const icon = icons[c.kategoria] || '🏢';

            // Profilointi-lisätiedot
            let badges = '';
            let isTopMatch = false;
            let capacityNote = '';
            let distanceHtml = '';

            // Etäisyyslaskenta
            const userCoordsRaw = localStorage.getItem('userCoords');
            if (userCoordsRaw && c.lat && (c.lon || c.lng)) {
                try {
                    const u = JSON.parse(userCoordsRaw);
                    const dist = getHaversineDistance(u.lat, u.lng || u.lon, parseFloat(c.lat), parseFloat(c.lon || c.lng));
                    const distStr = dist < 1 ? `${Math.round(dist * 1000)} m` : `${dist.toFixed(1)} km`;
                    distanceHtml = `<div class="dist-badge" style="font-size: 0.7rem; background: #f1f5f9; padding: 2px 8px; border-radius: 10px; color: #475569; font-weight: 600; display: inline-block; margin-top: 5px;">🚗 ${distStr}</div>`;
                } catch(e) {}
            }

            if (c.profiling) {
                const core = c.profiling.core || {};
                const fits = core.fits_for || {};
                
                // Tarkistetaan onko "Top Match" (pisteet yli 80)
                for (let key in fits) {
                    if (fits[key] >= 80) {
                        isTopMatch = true;
                        break;
                    }
                }

                // Kapasiteettimerkki — näytetään vain jos käyttäjä kysyi tilaa
                if (requestedCapacity > 0) {
                    const cap = getCompanyCapacity(c, profilingKey);
                    if (cap > 0) {
                        if (cap >= requestedCapacity) {
                            capacityNote = `<div style="font-size:0.75rem; color:#16a34a; font-weight:600; margin-bottom:6px;">✅ Sopii: max n. ${cap} hlö</div>`;
                        } else {
                            capacityNote = `<div style="font-size:0.75rem; color:#d97706; font-weight:600; margin-bottom:6px;">⚠️ Huom: Tilaan mahtuu arviolta n. ${cap} hlö</div>`;
                        }
                    }
                }

                // Ominaisuus-badget
                if (c.profiling.events_and_celebrations?.is_accessible) badges += '<span title="Esteetön pääsy" style="margin-right:5px;">♿</span>';
                if (c.profiling.events_and_celebrations?.has_sauna) badges += '<span title="Sauna saatavilla" style="margin-right:5px;">🧖</span>';
                if (core.home_service) badges += '<span title="Kotipalvelu" style="margin-right:5px;">🏠</span>';
                if (core.emergency_available) badges += '<span title="Päivystys / 24h" style="margin-right:5px;">🚨</span>';
            }

            return `
                <a href="${cardUrl}" class="need-card" style="height: 100%; border-top: 4px solid ${isTopMatch ? '#ff9900' : 'transparent'};">
                    ${isTopMatch ? '<div style="position:absolute; top:10px; right:10px; font-size:0.6rem; background:#ff9900; color:white; padding:2px 6px; border-radius:10px; font-weight:bold; z-index:10;">TOP MATCH</div>' : ''}
                    ${(isPremium || isPro) && !isTopMatch ? '<div style="position:absolute; top:10px; right:10px; font-size:0.6rem; background:gold; padding:2px 6px; border-radius:10px; font-weight:bold; z-index:10;">PREMIUM</div>' : ''}
                    <div class="need-icon" style="font-size: 2rem;">${icon}</div>
                    <h3>${c.nimi}</h3>
                    <p style="margin-bottom: 5px;">${c.mainoslause || (c.esittely ? c.esittely.substring(0, 80) + '...' : '')}</p>
                    ${distanceHtml}
                    <div style="margin-top: 8px;">
                        ${capacityNote}
                    </div>
                    <div class="feature-badges" style="font-size: 1.2rem; margin-bottom: 10px;">
                        ${badges}
                    </div>
                    <div class="match-explanation">
                        ${getMatchExplanation(c, requestedCapacity, profilingKey)}
                    </div>
                    <div class="arrow" style="opacity:1; transform:none;">Katso tiedot &raquo;</div>
                </a>
            `;
        }

        function getHaversineDistance(lat1, lon1, lat2, lon2) {
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return 6371 * c; // Distance in km
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        function getMatchExplanation(c, requestedCapacity, profilingKey) {
            const reasons = [];
            if (c.profiling) {
                const core = c.profiling.core || {};
                const fits = core.fits_for || {};
                if (fits[profilingKey] >= 80) reasons.push("Erinomainen soveltuvuus");
                
                if (requestedCapacity > 0) {
                    const cap = getCompanyCapacity(c, profilingKey);
                    if (cap >= requestedCapacity) reasons.push("Tilaan mahtuu tarvittava määrä");
                }

                // Taso 2: Sub-context match
                if (selections._sub_contexts && selections._sub_contexts.length > 0) {
                    const companySubContexts = core.sub_contexts || [];
                    if (selections._sub_contexts.some(sc => companySubContexts.includes(sc))) {
                        reasons.push("Erikoistunut toivottuun juhlatyyppiin");
                    }
                }

                // Taso 3: Feature matches
                if (c.profiling.events_and_celebrations?.is_accessible && selections.palvelut?.some(s => s.label?.toLowerCase().includes('esteetön'))) reasons.push("Esteetön tila");
                if (c.profiling.events_and_celebrations?.has_sauna && selections.palvelut?.some(s => s.label?.toLowerCase().includes('sauna'))) reasons.push("Saunatilat saatavilla");
            }

            if (reasons.length === 0) return "Sopii annettuihin kriteereihin";
            return reasons.slice(0, 2).join(" • ");
        }

        function resetPalvelu() {
            currentStepIndex = 0;
            selections = {};
            document.getElementById('step-section').style.display = 'block';
            document.getElementById('results-container').style.display = 'none';
            renderStep();
        }

        function resetPalvelu() {
            currentStepIndex = 0;
            selections = {};
            document.getElementById('step-section').style.display = 'block';
            document.getElementById('results-container').style.display = 'none';
            renderStep();
        }

        function initUserLocation() {
            const locationInput = document.getElementById('user-location-input');
            const locateMeBtn = document.getElementById('locate-me-btn');
            const statusEl = document.getElementById('location-status');

            if (!locationInput) return;

            // Palauta tallennettu sijainti
            const savedName = localStorage.getItem('userLocationName');
            const savedCoordsRaw = localStorage.getItem('userCoords');

            if (savedName) locationInput.value = savedName;
            
            // Jos tuli URL-parametrina (esim. etusivulta)
            const urlParams = new URLSearchParams(window.location.search);
            const urlLat = urlParams.get('lat');
            const urlLon = urlParams.get('lon');
            const urlLoc = urlParams.get('loc');

            if (urlLat && urlLon) {
                const coords = { lat: parseFloat(urlLat), lng: parseFloat(urlLon) };
                localStorage.setItem('userCoords', JSON.stringify(coords));
                if (urlLoc) {
                    localStorage.setItem('userLocationName', urlLoc);
                    locationInput.value = urlLoc;
                }
                window.userCoords = coords;
            } else if (savedCoordsRaw) {
                try {
                    window.userCoords = JSON.parse(savedCoordsRaw);
                } catch(e) {}
            }

            // Kuuntele manuaalista syöttöä (yksinkertainen paikkahaku tai pelkkä tallennus)
            locationInput.addEventListener('change', async () => {
                const val = locationInput.value.trim();
                if (!val) {
                    localStorage.removeItem('userCoords');
                    localStorage.removeItem('userLocationName');
                    window.userCoords = null;
                    if (document.getElementById('results-container').style.display !== 'none') showResults();
                    return;
                }

                localStorage.setItem('userLocationName', val);
                statusEl.textContent = "Haetaan koordinaatteja...";

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val + ', Laukaa')}&limit=1`);
                    const data = await response.json();
                    if (data && data.length > 0) {
                        const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                        localStorage.setItem('userCoords', JSON.stringify(coords));
                        window.userCoords = coords;
                        statusEl.textContent = "Sijainti päivitetty ✅";
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    } else {
                        statusEl.textContent = "Sijaintia ei löytynyt. Kokeile tarkempaa osoitetta.";
                    }
                } catch(e) {
                    statusEl.textContent = "Virhe sijainnin haussa.";
                }
            });

            if (locateMeBtn) {
                locateMeBtn.addEventListener('click', () => {
                    if (!navigator.geolocation) {
                        statusEl.textContent = "Selaimesi ei tue sijaintia.";
                        return;
                    }

                    statusEl.textContent = "Paikannetaan...";
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        window.userCoords = coords;
                        localStorage.setItem('userCoords', JSON.stringify(coords));

                        // Hae osoite käänteisellä geokoodauksella
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lng}`);
                            const data = await res.json();
                            const name = data.display_name.split(',')[0] || "Oma sijainti";
                            locationInput.value = name;
                            localStorage.setItem('userLocationName', name);
                            statusEl.textContent = "Sijainti päivitetty ✅";
                        } catch(e) {
                            locationInput.value = "Oma sijainti";
                            statusEl.textContent = "Sijainti päivitetty ✅";
                        }
                        
                        if (document.getElementById('results-container').style.display !== 'none') showResults();
                    }, () => {
                        statusEl.textContent = "Sijainnin haku epäonnistui.";
                    });
                });
            }
        }

        // Käynnistys
        document.addEventListener('DOMContentLoaded', () => {
            initPalvelu();
            initUserLocation();
        });
    </script>
