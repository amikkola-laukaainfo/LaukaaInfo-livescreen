name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Tai 'master' jos käytät sitä nimeä
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: |
          npm install
          node build.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # Julkaistaan vain dist-kansion sisältö

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
